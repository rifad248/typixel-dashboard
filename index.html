function getLM(u1,u2){const m=db.messages.filter(x=>(x.senderId===u1&&x.receiverId===u2)||(x.senderId===u2&&x.receiverId===u1)).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));return m[0];}
function openChat(cid,el){
  chatWith=cid;$$('.chat-c').forEach(e=>e.classList.remove('active'));if(el)el.classList.add('active');
  const other=db.users.find(u=>u.id===cid);if(!other)return;
  const msgs=db.messages.filter(m=>(m.senderId===user.id&&m.receiverId===cid)||(m.senderId===cid&&m.receiverId===user.id)).sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));
  $('#chatMain').innerHTML=`<div class="chat-top"><div class="sb-avatar" style="width:30px;height:30px;font-size:.65rem">${other.avatar}</div><div><div style="font-weight:500;font-size:.88rem">${other.name}</div><div class="text-sm text-muted">${other.role==='admin'?'Admin':'Editor'}</div></div></div><div class="chat-msgs" id="chatMsgs">${msgs.length?msgs.map(m=>`<div class="msg ${m.senderId===user.id?'mine':''}"><div><div class="msg-b">${m.text}</div><div class="msg-t">${fmtT(m.timestamp)}</div></div></div>`).join(''):'<div style="text-align:center;color:var(--fg3);padding:36px"><p>No messages yet</p><p class="text-sm">Say hello to ${other.name}</p></div>'}</div><div class="chat-iw"><input class="chat-input" id="chatInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendMsg('${cid}')"><button class="chat-send" onclick="sendMsg('${cid}')"><i class="fa-solid fa-paper-plane"></i></button></div>`;
  const el2=$('#chatMsgs');if(el2)el2.scrollTop=el2.scrollHeight;
}
async function sendMsg(rid){const inp=$('#chatInput');if(!inp)return;const txt=inp.value.trim();if(!txt)return;db.messages.push({id:genId(),senderId:user.id,receiverId:rid,text:txt,timestamp:new Date().toISOString()});await DB.save('messages');inp.value='';openChat(rid);}

/* ============ EDITOR DASHBOARD ============ */
function pgED(){
  const my=db.workAssignments.filter(w=>w.editorId===user.id);
  const pending=my.filter(w=>w.status==='pending').length;
  const inp=my.filter(w=>w.status==='in-progress').length;
  const done=my.filter(w=>w.status==='completed').length;
  const overdue=my.filter(w=>dlLeft(w.deadline)<=0&&w.status!=='completed').length;
  const recent=my.slice(-3).reverse();
  let alerts='';
  if(overdue)alerts+=`<div class="alert-bar alert-danger"><i class="fa-solid fa-triangle-exclamation"></i><span><strong>${overdue} overdue assignment${overdue>1?'s':''}</strong> — needs immediate attention</span></div>`;
  if(pending)alerts+=`<div class="alert-bar alert-warning"><i class="fa-solid fa-clock"></i><span><strong>${pending} new assignment${pending>1?'s':''}</strong> — accept or reject to proceed</span></div>`;

  return`<div class="ph"><div><h1>Dashboard</h1><p>Welcome back, ${user.name}</p></div></div>
  ${alerts}
  <div class="stats stats-primary">
    <div class="stat"><div class="stat-top"><span class="stat-label">Pending Salary</span><div class="stat-icon si-1"><i class="fa-solid fa-indian-rupee-sign"></i></div></div><div class="stat-val" style="color:var(--accent)">${fmtM(user.pendingSalary||0)}</div><div class="stat-sub">${user.totalWorkTime||0} hours logged</div></div>
    <div class="stat"><div class="stat-top"><span class="stat-label">Work Summary</span><div class="stat-icon si-4"><i class="fa-solid fa-list-check"></i></div></div><div class="stat-val">${done}<span style="font-size:1rem;color:var(--fg3)"> / ${my.length}</span></div><div class="stat-sub">${pending} pending, ${inp} in progress</div></div>
  </div>
  ${recent.length?`<div class="card"><div class="card-head"><h3>Recent Work</h3><button class="btn btn-sm btn-ghost" onclick="navigate('my-work')">View All</button></div><div class="card-body">${recent.map(rEWK).join('')}</div></div>`:''}`;
}
function rEWK(w){
  const p=db.projects.find(x=>x.id===w.projectId);const dl=dlLeft(w.deadline);const isOverdue=dl!==null&&dl<=0&&w.status!=='completed';
  return`<div class="wk" ${isOverdue?'style="border-left:3px solid var(--danger)"':''}><div class="wk-head"><div class="wk-title">${p?.name||'Unknown'}</div><div style="display:flex;gap:6px;align-items:center"><span class="badge bg-${w.status==='completed'?'green':w.status==='in-progress'?'blue':'yellow'}">${w.status}</span>${isOverdue?'<span class="overdue-badge"><i class="fa-solid fa-triangle-exclamation"></i>Overdue</span>':''}</div></div><div class="wk-desc">${w.description||'No description'}</div><div class="wk-meta"><span><i class="fa-solid fa-calendar"></i>${isOverdue?'<span style="color:var(--danger)">Overdue</span>':dl!==null?dl+'d left':fmtD(w.deadline)}</span></div>${w.status==='pending'?`<div class="wk-actions"><button class="btn btn-sm btn-primary" onclick="acceptW('${w.id}')"><i class="fa-solid fa-check"></i>Accept</button><button class="btn btn-sm btn-ghost" style="color:var(--danger);border-color:rgba(248,81,73,.2)" onclick="rejectW('${w.id}')"><i class="fa-solid fa-times"></i>Reject</button></div>`:w.status==='in-progress'?`<div class="wk-actions"><button class="btn btn-sm btn-primary" onclick="navigate('submit-work')"><i class="fa-solid fa-cloud-arrow-up"></i>Submit Work</button></div>`:''}</div>`;
}

/* ============ MY WORK ============ */
function pgMW(){
  const my=db.workAssignments.filter(w=>w.editorId===user.id);
  return`<div class="ph"><div><h1>My Work</h1><p>${my.length} assignment${my.length!==1?'s':''}</p></div></div>
  <div class="tabs"><button class="tab-btn active" onclick="filterMW('all',this)">All</button><button class="tab-btn" onclick="filterMW('pending',this)">Pending</button><button class="tab-btn" onclick="filterMW('in-progress',this)">In Progress</button><button class="tab-btn" onclick="filterMW('completed',this)">Completed</button></div>
  <div id="mwList">${my.length?my.slice().reverse().map(rEWK).join(''):'<div style="text-align:center;padding:60px;color:var(--fg3)"><i class="fa-solid fa-briefcase" style="font-size:2.5rem;opacity:.15;display:block;margin-bottom:16px"></i><p>No work assigned yet</p><p class="text-sm">The admin will assign projects to you</p></div>'}</div>`;
}
function filterMW(s,btn){$$('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');const my=db.workAssignments.filter(w=>w.editorId===user.id);const f=s==='all'?my:my.filter(w=>w.status===s);$('#mwList').innerHTML=f.length?f.slice().reverse().map(rEWK).join(''):'<div style="text-align:center;padding:48px;color:var(--fg3)">No assignments in this category</div>';}
async function acceptW(id){const w=db.workAssignments.find(x=>x.id===id);if(!w)return;w.status='in-progress';const pn=db.projects.find(p=>p.id===w.projectId)?.name||'';addNotif('u1','Work Accepted',user.name+' started: '+pn);DB.log('Accept',pn);await DB.save('workAssignments');render();toast('success','Accepted','Marked as in-progress');}
async function rejectW(id){const w=db.workAssignments.find(x=>x.id===id);if(!w)return;w.status='rejected';const pn=db.projects.find(p=>p.id===w.projectId)?.name||'';addNotif('u1','Work Rejected',user.name+' rejected: '+pn);DB.log('Reject',pn);await DB.save('workAssignments');render();toast('info','Rejected','Admin has been notified');}

/* ============ SUBMIT WORK ============ */
function pgSW(){
  const inp=db.workAssignments.filter(w=>w.editorId===user.id&&w.status==='in-progress');uploadedFiles=[];
  return`<div class="ph"><div><h1>Submit Work</h1><p>Upload completed deliverables</p></div></div>
  ${inp.length?`<div class="card"><div class="card-head"><h3>Select Assignment</h3></div><div class="card-body"><div class="fg"><select class="fi" id="swId">${inp.map(w=>{const p=db.projects.find(x=>x.id===w.projectId);return`<option value="${w.id}">${p?.name||'Unknown'}</option>`;}).join('')}</select></div></div></div>`:'<div class="card"><div class="card-body" style="text-align:center;padding:36px;color:var(--fg3)">No in-progress work to submit</div></div>'}
  <div class="card mt-4"><div class="card-head"><h3>Upload Files</h3></div><div class="card-body"><div class="upload-zone" onclick="$('#fInput').click()"><i class="fa-solid fa-cloud-arrow-up"></i><p>Click to upload or drag files here</p><span>PNG, JPG, PDF, PSD, AI — Max 50MB per file</span></div><input type="file" id="fInput" multiple accept=".png,.jpg,.jpeg,.pdf,.psd,.ai" style="display:none" onchange="handleFiles(this.files)"><div class="file-list" id="fList"></div></div></div>
  <div class="card mt-4"><div class="card-head"><h3>Submission Notes</h3></div><div class="card-body"><textarea class="fi" id="swNotes" rows="3" placeholder="Add any notes about the delivered work..."></textarea></div></div>
  <div class="mt-4"><button class="btn btn-primary btn-lg" onclick="submitWork()"><i class="fa-solid fa-paper-plane"></i>Submit Deliverables</button></div>`;
}
function handleFiles(files){Array.from(files).forEach(f=>{if(f.size>52428800){toast('error','Too Large',f.name+' exceeds 50MB');return;}uploadedFiles.push({name:f.name,size:f.size,type:f.type});});renderFL();}
function renderFL(){$('#fList').innerHTML=uploadedFiles.map((f,i)=>`<div class="file-item"><i class="fa-solid fa-file"></i><span class="fn">${f.name}</span><span class="text-muted text-sm">${(f.size/1024).toFixed(0)}KB</span><button class="fr" onclick="uploadedFiles.splice(${i},1);renderFL()"><i class="fa-solid fa-times"></i></button></div>`).join('');}
async function submitWork(){
  const wid=$('#swId')?.value;if(!wid){toast('error','Error','Select an assignment');return;}
  if(!uploadedFiles.length){toast('error','Error','Upload at least one file');return;}
  const w=db.workAssignments.find(x=>x.id===wid);if(!w)return;
  if(!db.files)db.files=[];
  uploadedFiles.forEach(f=>{db.files.push({id:genId(),assignmentId:wid,projectId:w.projectId,editorId:user.id,name:f.name,size:f.size,type:f.type,uploadedAt:new Date().toISOString()});});
  w.status='completed';
  const p=db.projects.find(x=>x.id===w.projectId);
  if(p)p.status='completed';
  db.invoices.push({id:genId(),clientId:p?.clientId,projectId:p?.id,editorId:user.id,amount:p?.budget||0,status:'unpaid',date:new Date().toISOString().split('T')[0],createdAt:new Date().toISOString()});
  addNotif('u1','Work Submitted',user.name+' completed: '+(p?.name||'')+' ('+uploadedFiles.length+' files)');
  DB.log('Submit',p?.name||'');await DB.saveAll();render();toast('success','Submitted','Admin has been notified');
}

/* ============ MY INVOICES ============ */
function pgMI(){
  const my=db.invoices.filter(i=>i.editorId===user.id);
  const total=my.reduce((s,i)=>s+i.amount,0);
  const paid=my.filter(i=>i.status==='paid').reduce((s,i)=>s+i.amount,0);
  return`<div class="ph"><div><h1>My Invoices</h1><p>${my.length} total — ${fmtM(paid)} collected</p></div></div>
  <div class="stats" style="grid-template-columns:1fr 1fr;margin-bottom:18px"><div class="stat"><div class="stat-top"><span class="stat-label">Total Value</span><div class="stat-icon si-1"><i class="fa-solid fa-indian-rupee-sign"></i></div></div><div class="stat-val">${fmtM(total)}</div></div><div class="stat"><div class="stat-top"><span class="stat-label">Collected</span><div class="stat-icon si-2"><i class="fa-solid fa-check-circle"></i></div></div><div class="stat-val" style="color:var(--accent2)">${fmtM(paid)}</div><div class="stat-sub">${fmtM(total-paid)} pending</div></div></div>
  <div class="card"><div class="card-body" style="padding:0;overflow-x:auto"><table class="tbl"><thead><tr><th>Invoice</th><th>Project</th><th>Amount</th><th>Date</th><th>Status</th><th></th></tr></thead><tbody>${my.length?my.map(inv=>{const pr=db.projects.find(p=>p.id===inv.projectId);return`<tr><td style="font-family:'Space Grotesk';font-weight:600">#${inv.id.slice(-5).toUpperCase()}</td><td>${pr?.name||'—'}</td><td style="font-weight:600">${fmtM(inv.amount)}</td><td class="text-muted">${fmtD(inv.date)}</td><td><span class="badge bg-${inv.status==='paid'?'green':'yellow'}">${inv.status}</span></td><td><button class="btn-icon" onclick="printInvoice('${inv.id}')" title="Print"><i class="fa-solid fa-print"></i></button></td></tr>`;}).join(''):'<tr class="empty-row"><td colspan="6">No invoices yet</td></tr>'}</tbody></table></div></div>`;
}

/* ============ SUPPORT ============ */
function pgSup(){
  const my=db.tickets.filter(t=>t.userId===user.id);
  return`<div class="ph"><div><h1>Get Help</h1><p>Submit a support ticket</p></div></div>
  <div class="card"><div class="card-head"><h3>New Ticket</h3></div><div class="card-body"><div class="fg"><label>Subject *</label><input class="fi" id="tSubj" placeholder="Brief description of your issue"></div><div class="frow"><div class="fg"><label>Priority</label><select class="fi" id="tPri"><option value="low">Low — General question</option><option value="medium" selected>Medium — Need help soon</option><option value="high">High — Blocking my work</option></select></div><div class="fg"></div></div><div class="fg"><label>Description *</label><textarea class="fi" id="tDesc" rows="4" placeholder="Describe your issue in detail..."></textarea></div><button class="btn btn-primary" onclick="submitTicket()"><i class="fa-solid fa-paper-plane"></i>Submit Ticket</button></div></div>
  ${my.length?`<div class="card mt-4"><div class="card-head"><h3>My Tickets (${my.length})</h3></div><div class="card-body">${my.slice().reverse().map(t=>`<div class="wk" style="border-left:3px solid ${t.priority==='high'?'var(--danger)':t.priority==='medium'?'var(--warning)':'var(--success)'}"><div class="wk-head"><div class="wk-title">${t.subject}</div><div style="display:flex;gap:6px"><span class="badge bg-${t.priority==='high'?'red':t.priority==='medium'?'yellow':'green'}">${t.priority}</span>${t.resolved?'<span class="badge bg-green">Resolved</span>':'<span class="badge bg-yellow">Open</span>'}</div></div><div class="wk-desc">${t.description}</div><div class="text-sm text-muted">${fmtT(t.createdAt)}</div></div>`).join('')}</div></div>`:''}`;
}
function submitTicket(){
  const s=$('#tSubj').value.trim(),p=$('#tPri').value,d=$('#tDesc').value.trim();
  if(!s||!d){toast('error','Error','Subject and description are required');return;}
  db.tickets.push({id:genId(),userId:user.id,subject:s,priority:p,description:d,resolved:false,createdAt:new Date().toISOString()});
  addNotif('u1','New Ticket',s+' ('+p+' priority)');
  DB.log('Ticket',s);DB.save('tickets');render();toast('success','Sent','Admin will respond shortly');
}

/* ============ PROFILE ============ */
function pgProf(){
  return`<div class="ph"><div><h1>Settings</h1><p>Manage your account</p></div></div>
  <div class="card"><div class="card-head"><h3>Profile Information</h3></div><div class="card-body"><form id="profileForm"><div class="frow"><div class="fg"><label>Name</label><input class="fi" value="${user.name}" ${user.role==='admin'?'readonly':''} id="pName"></div><div class="fg"><label>Email</label><input class="fi" value="${user.email}" readonly style="opacity:.6"><p class="text-sm text-muted mt-2">Email cannot be changed</p></div></div><div class="fg"><label>Phone</label><input class="fi" value="${user.phone||''}" id="pPhone" placeholder="Your phone number"></div>${user.role==='editor'?`<div class="fg"><label>Portfolio URL</label><input class="fi" value="${user.portfolio||''}" id="pPort" placeholder="https://..."></div><div class="fg"><label>Bio</label><textarea class="fi" id="pBio" rows="3" placeholder="Tell us about yourself...">${user.bio||''}</textarea></div>`:''}<button type="submit" class="btn btn-primary mt-4"><i class="fa-solid fa-save"></i>Save Changes</button></form></div></div>
  <div class="card mt-4"><div class="card-head"><h3>Change Password</h3></div><div class="card-body"><form id="pwForm"><div class="fg"><label>Current Password *</label><input class="fi" type="password" id="pwC" required></div><div class="frow"><div class="fg"><label>New Password *</label><input class="fi" type="password" id="pwN" required minlength="4"></div><div class="fg"><label>Confirm New *</label><input class="fi" type="password" id="pwF" required></div></div><button type="submit" class="btn btn-primary mt-4"><i class="fa-solid fa-key"></i>Update Password</button></form></div></div>
  <div class="card mt-4"><div class="card-head"><h3>Appearance</h3></div><div class="card-body"><div style="display:flex;align-items:center;justify-content:space-between"><div><div style="font-weight:500">Theme</div><div class="text-sm text-muted">Switch between dark and light mode</div></div><button class="btn btn-ghost" onclick="toggleTheme();render()"><i class="fa-solid ${document.documentElement.getAttribute('data-theme')==='dark'?'fa-sun':'fa-moon'}"></i>${document.documentElement.getAttribute('data-theme')==='dark'?'Light Mode':'Dark Mode'}</button></div></div></div>
  ${user.role==='admin'?`<div class="card mt-4" style="border-color:rgba(248,81,73,.2)"><div class="card-head"><h3 style="color:var(--danger)">Danger Zone</h3></div><div class="card-body"><p class="text-muted mb-4">Permanently reset all data. This cannot be undone.</p><button class="btn btn-danger" onclick="openModal('<div class=\\'modal-head\\'><h3 style=\\'color:var(--danger)\\'>Reset All Data</h3><button class=\\'modal-close\\' onclick=\\'closeModals()\\'>&times;</button></div><div class=\\'modal-body\\'><p class=\\'text-muted\\'>This will delete all clients, projects, invoices, editors, and settings.</p><p style=\\'color:var(--danger);margin-top:12px;font-weight:600\\'>Type RESET to confirm.</p><input class=\\'fi mt-4\\' id=\\'resetC\\' placeholder=\\'RESET\\'></div><div class=\\'modal-foot\\'><button class=\\'btn btn-ghost\\' onclick=\\'closeModals()\\'>Cancel</button><button class=\\'btn btn-danger\\' onclick=\\'if($(\\\"#resetC\\\").value===\"RESET\"){localStorage.removeItem(CACHE_KEY);db=null;init();closeModals();toast(\"success\",\"Reset\",\"All data cleared\")}else{toast(\"error\",\"Error\",\"Type RESET to confirm\")}\\'>Reset Everything</button></div>')"><i class="fa-solid fa-trash"></i>Reset All Data</button></div></div>`:''}`;
}
async function saveProfile(){const u=db.users.find(x=>x.id===user.id);if(!u)return;u.phone=$('#pPhone')?.value||'';if($('#pPort'))u.portfolio=$('#pPort').value;if($('#pBio'))u.bio=$('#pBio').value;u.avatar=ini(u.name);user=u;sessionStorage.setItem(AUTH_KEY,JSON.stringify(u));DB.log('Profile','Updated profile');await DB.save('users');render();toast('success','Saved','Profile updated');}
async function changePw(){const c=$('#pwC').value,n=$('#pwN').value,f=$('#pwF').value;if(c!==user.password){toast('error','Wrong Password','Current password is incorrect');return;}if(n!==f){toast('error','Mismatch','New passwords don\'t match');return;}if(n.length<4){toast('error','Too Short','Use at least 4 characters');return;}const u=db.users.find(x=>x.id===user.id);u.password=n;user=u;sessionStorage.setItem(AUTH_KEY,JSON.stringify(u));await DB.save('users');$('#pwForm').reset();toast('success','Updated','Password changed successfully');}

/* ============ LOGIN PAGE — REDESIGNED ============ */
function renderLogin(){
  $('#app').innerHTML=`<div class="login"><div class="login-left"><div class="login-box"><div class="login-logo"><div class="sb-logo-icon">T</div><span>Typixel</span></div><p class="tagline">Built for Designers Who Handle Multiple Clients</p><h2>Sign in to your studio</h2><p class="sub">Manage clients, projects, and payments in one place</p><form onsubmit="event.preventDefault();login($('#lE').value,$('#lP').value)"><div class="fg"><label>Email</label><input class="fi" type="email" id="lE" placeholder="you@example.com" required></div><div class="fg"><label>Password</label><input class="fi" type="password" id="lP" placeholder="Enter your password" required></div><button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center"><i class="fa-solid fa-right-to-bracket"></i>Sign In</button></form><div class="login-divider">or</div><button class="btn btn-ghost" style="width:100%;justify-content:center" onclick="modalJoin()"><i class="fa-solid fa-user-plus"></i>Join as an Editor</button></div></div><div class="login-right"><div class="login-right-content"><div class="hero-badge"><i class="fa-solid fa-bolt"></i>Freelance Design Studio OS</div><h1>Stop juggling spreadsheets.<br>Start <em>delivering.</em></h1><p class="hero-desc">Typixel replaces your scattered Google Sheets, WhatsApp chats, and sticky notes with one organized workspace built specifically for freelance designers.</p><div class="trust-row"><div class="trust-num"><div class="val">${(db?.projects?.length||4)+126}</div><div class="lbl">Projects Managed</div></div><div class="trust-sep"></div><div class="trust-num"><div class="val">${(db?.clients?.length||3)+47}</div><div class="lbl">Active Clients</div></div><div class="trust-sep"></div><div class="trust-num"><div class="val">${fmtM((db?.invoices?.filter(i=>i.status==='paid').reduce((s,i)=>s+i.amount,0)||80000)+2400000).replace('₹','')}</div><div class="lbl">Revenue Tracked</div></div></div><div class="login-features"><div class="login-feat"><i class="fa-solid fa-users"></i><span>Client & project management</span></div><div class="login-feat"><i class="fa-solid fa-file-invoice-dollar"></i><span>Invoice creation & tracking</span></div><div class="login-feat"><i class="fa-solid fa-clipboard-list"></i><span>Work assignment & deadlines</span></div><div class="login-feat"><i class="fa-solid fa-comments"></i><span>Team chat & notifications</span></div></div></div></div></div>`;
}
function modalJoin(){
  openModal(`<div class="modal-head"><h3>Join as an Editor</h3><button class="modal-close" onclick="closeModals()">&times;</button></div><div class="modal-body"><p class="text-muted mb-4">Apply to join the design team. Your account will need admin approval before you can access projects.</p><form id="jf"><div class="frow"><div class="fg"><label>Full Name *</label><input class="fi" name="name" required placeholder="Your name"></div><div class="fg"><label>Email *</label><input class="fi" type="email" name="email" required placeholder="you@example.com"></div></div><div class="fg"><label>Password *</label><input class="fi" type="password" name="password" required minlength="4" placeholder="Min 4 characters"></div><div class="fg"><label>Portfolio URL</label><input class="fi" name="portfolio" placeholder="https://dribbble.com/..."></div><div class="fg"><label>About You</label><textarea class="fi" name="bio" rows="3" placeholder="Your skills, experience, tools..."></textarea></div></form></div><div class="modal-foot"><button class="btn btn-ghost" onclick="closeModals()">Cancel</button><button class="btn btn-primary" onclick="const f=new FormData($('#jf'));register(f.get('name'),f.get('email'),f.get('password'),f.get('portfolio'),f.get('bio'))">Submit Application</button></div>`);
}

/* ============ GLOBAL EVENTS ============ */
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{e.preventDefault();if(e.target.closest('.upload-zone'))handleFiles(e.dataTransfer.files);});
document.addEventListener('click',e=>{
  if(!e.target.closest('.dropdown'))$$('.dd-menu.open').forEach(m=>m.classList.remove('open'));
  if(!e.target.closest('.notif-panel')&&!e.target.closest('[onclick*="toggleNotif"]')){const p=$('#notifPanel');if(p)p.classList.remove('open');}
});

/* ============ INIT ============ */
async function init(){
  db=await DB.load();
  if(user){const f=db.users.find(u=>u.id===user.id);if(f){user=f;sessionStorage.setItem(AUTH_KEY,JSON.stringify(f));}else{user=null;sessionStorage.removeItem(AUTH_KEY);}}
  render();
}
init();
</script>
</body>
</html>
