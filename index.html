<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typixel — Design Management</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2333;--sidebar:#010409;
  --accent:#FF6B35;--accent2:#00C9A7;--accent-glow:rgba(255,107,53,.15);
  --success:#2EA043;--warning:#D29922;--danger:#F85149;--info:#58A6FF;
  --fg:#E6EDF3;--fg2:#8B949E;--fg3:#484F58;
  --border:#30363D;--border2:#21262D;
  --shadow:0 2px 8px rgba(0,0,0,.4);
  --radius:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--fg);overflow:hidden;height:100vh}
h1,h2,h3,h4{font-family:'Space Grotesk',sans-serif}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--fg3);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--fg2)}

/* ── Layout ── */
.app{display:flex;height:100vh}
.sidebar{width:250px;background:var(--sidebar);border-right:1px solid var(--border2);display:flex;flex-direction:column;flex-shrink:0;z-index:50;transition:transform .3s}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:56px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
.page{flex:1;overflow-y:auto;padding:28px;background:var(--bg)}

/* ── Sidebar ── */
.sb-logo{padding:20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border2)}
.sb-logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),#ff9a5c);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk';font-weight:700;font-size:1.1rem;color:#fff}
.sb-logo span{font-family:'Space Grotesk';font-weight:700;font-size:1.2rem;color:var(--fg)}
.sb-nav{flex:1;padding:12px 0;overflow-y:auto}
.sb-section{padding:0 16px;margin-bottom:4px;font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--fg3);font-weight:600}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 20px;color:var(--fg2);cursor:pointer;transition:all .15s;border:none;background:none;width:100%;text-align:left;font-size:.88rem;font-family:inherit}
.sb-item:hover{color:var(--fg);background:rgba(255,255,255,.04)}
.sb-item.active{color:var(--accent);background:var(--accent-glow)}
.sb-item i{width:18px;text-align:center;font-size:.9rem}
.sb-item .sb-badge{margin-left:auto;background:var(--danger);color:#fff;font-size:.65rem;padding:2px 7px;border-radius:10px;font-weight:600}
.sb-footer{padding:16px;border-top:1px solid var(--border2)}
.sb-user{display:flex;align-items:center;gap:10px;padding:8px;border-radius:8px;background:rgba(255,255,255,.03)}
.sb-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.75rem;color:#fff;flex-shrink:0}
.sb-user-info{overflow:hidden}
.sb-user-name{font-weight:600;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user-role{font-size:.72rem;color:var(--fg2)}

/* ── Topbar ── */
.topbar-left{display:flex;align-items:center;gap:16px}
.topbar-title{font-family:'Space Grotesk';font-weight:600;font-size:1.05rem}
.topbar-search{display:flex;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 12px;width:280px;transition:border-color .2s}
.topbar-search:focus-within{border-color:var(--accent)}
.topbar-search i{color:var(--fg3);font-size:.85rem;margin-right:8px}
.topbar-search input{border:none;background:none;outline:none;color:var(--fg);font-size:.85rem;width:100%;font-family:inherit}
.topbar-right{display:flex;align-items:center;gap:8px}
.tb-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--fg2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;position:relative;font-size:.9rem}
.tb-btn:hover{background:var(--bg3);color:var(--fg);border-color:var(--fg3)}
.tb-btn .dot{position:absolute;top:6px;right:6px;width:8px;height:8px;background:var(--danger);border-radius:50%;border:2px solid var(--bg2)}

/* ── Page Header ── */
.ph{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;gap:16px;flex-wrap:wrap}
.ph h1{font-size:1.6rem;font-weight:700}
.ph p{color:var(--fg2);font-size:.9rem;margin-top:4px}
.ph-actions{display:flex;gap:8px;flex-wrap:wrap}

/* ── Buttons ── */
.btn{padding:8px 18px;border-radius:8px;font-weight:500;font-size:.85rem;border:1px solid transparent;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:all .15s;font-family:inherit;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#e55a28;transform:translateY(-1px);box-shadow:0 4px 12px rgba(255,107,53,.3)}
.btn-ghost{background:transparent;color:var(--fg2);border-color:var(--border)}
.btn-ghost:hover{background:var(--bg3);color:var(--fg)}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{opacity:.9}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{opacity:.9}
.btn-sm{padding:5px 12px;font-size:.78rem}
.btn-icon{width:32px;height:32px;padding:0;justify-content:center;border-radius:6px;background:transparent;color:var(--fg2);border:1px solid transparent}
.btn-icon:hover{background:var(--bg3);color:var(--fg)}

/* ── Cards ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.card-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.card-head h3{font-size:1rem;font-weight:600}
.card-body{padding:20px}

/* ── Stat Cards ── */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:24px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:all .25s;position:relative;overflow:hidden}
.stat::after{content:'';position:absolute;top:0;right:0;width:80px;height:80px;border-radius:50%;filter:blur(40px);opacity:.12;pointer-events:none}
.stat:nth-child(1)::after{background:var(--accent)}
.stat:nth-child(2)::after{background:var(--accent2)}
.stat:nth-child(3)::after{background:var(--warning)}
.stat:nth-child(4)::after{background:var(--info)}
.stat:hover{transform:translateY(-2px);border-color:var(--fg3)}
.stat-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.stat-label{font-size:.82rem;color:var(--fg2);font-weight:500}
.stat-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.9rem}
.stat-icon.c1{background:rgba(255,107,53,.12);color:var(--accent)}
.stat-icon.c2{background:rgba(0,201,167,.12);color:var(--accent2)}
.stat-icon.c3{background:rgba(210,153,34,.12);color:var(--warning)}
.stat-icon.c4{background:rgba(88,166,255,.12);color:var(--info)}
.stat-val{font-family:'Space Grotesk';font-size:1.75rem;font-weight:700;line-height:1}
.stat-change{font-size:.78rem;margin-top:6px;display:flex;align-items:center;gap:4px}
.stat-change.up{color:var(--success)}
.stat-change.down{color:var(--danger)}

/* ── Tables ── */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;padding:10px 16px;font-size:.75rem;font-weight:600;color:var(--fg2);text-transform:uppercase;letter-spacing:.04em;background:var(--bg3);border-bottom:1px solid var(--border)}
.tbl td{padding:12px 16px;border-bottom:1px solid var(--border2);font-size:.87rem;vertical-align:middle}
.tbl tr:hover td{background:rgba(255,255,255,.02)}
.tbl .cell-user{display:flex;align-items:center;gap:10px}
.tbl .cell-name{font-weight:500}
.tbl .cell-sub{font-size:.75rem;color:var(--fg2)}
.empty-row td{text-align:center;color:var(--fg3);padding:40px 16px !important}

/* ── Badges ── */
.badge{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:600;letter-spacing:.02em}
.badge-green{background:rgba(46,160,67,.15);color:var(--success)}
.badge-yellow{background:rgba(210,153,34,.15);color:var(--warning)}
.badge-red{background:rgba(248,81,73,.15);color:var(--danger)}
.badge-blue{background:rgba(88,166,255,.15);color:var(--info)}
.badge-orange{background:rgba(255,107,53,.15);color:var(--accent)}

/* ── Forms ── */
.fg{margin-bottom:16px}
.fg label{display:block;font-size:.82rem;font-weight:500;margin-bottom:6px;color:var(--fg2)}
.fi{width:100%;padding:9px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--fg);font-size:.88rem;font-family:inherit;transition:border-color .2s}
.fi:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,107,53,.1)}
select.fi{cursor:pointer}
textarea.fi{resize:vertical;min-height:80px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ── Modal ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-bg.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;width:92%;max-width:560px;max-height:85vh;overflow-y:auto;animation:mIn .25s ease}
@keyframes mIn{from{opacity:0;transform:translateY(-16px) scale(.97)}to{opacity:1;transform:none}}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-head h3{font-size:1.1rem;font-weight:600}
.modal-close{background:none;border:none;color:var(--fg2);font-size:1.3rem;cursor:pointer;padding:4px;line-height:1}
.modal-close:hover{color:var(--fg)}
.modal-body{padding:24px}
.modal-foot{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

/* ── Toast ── */
.toast-wrap{position:fixed;top:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 18px;display:flex;align-items:flex-start;gap:10px;min-width:300px;max-width:420px;box-shadow:0 8px 24px rgba(0,0,0,.4);animation:tIn .3s ease}
@keyframes tIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:none}}
.toast-icon{font-size:1.1rem;margin-top:1px;flex-shrink:0}
.toast.t-success .toast-icon{color:var(--success)}
.toast.t-error .toast-icon{color:var(--danger)}
.toast.t-warning .toast-icon{color:var(--warning)}
.toast.t-info .toast-icon{color:var(--info)}
.toast-body{flex:1;min-width:0}
.toast-title{font-weight:600;font-size:.85rem;margin-bottom:2px}
.toast-msg{font-size:.8rem;color:var(--fg2);line-height:1.4}
.toast-x{background:none;border:none;color:var(--fg3);cursor:pointer;font-size:.9rem;padding:2px;flex-shrink:0}

/* ── Work Cards ── */
.wk{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px;transition:all .2s}
.wk:hover{border-color:var(--fg3)}
.wk-head{display:flex;justify-content:space-between;align-items:start;margin-bottom:10px;gap:12px}
.wk-title{font-weight:600;font-size:1rem}
.wk-desc{color:var(--fg2);font-size:.85rem;line-height:1.5;margin-bottom:12px}
.wk-meta{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px;font-size:.82rem;color:var(--fg2)}
.wk-meta span{display:flex;align-items:center;gap:5px}
.wk-meta i{font-size:.78rem}
.wk-actions{display:flex;gap:8px;flex-wrap:wrap}
.deadline-soon{color:var(--danger) !important;font-weight:600}
.deadline-ok{color:var(--success) !important}

/* ── Chat ── */
.chat-wrap{display:flex;height:100%}
.chat-list{width:280px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.chat-list-head{padding:16px;border-bottom:1px solid var(--border)}
.chat-list-head h3{font-size:1rem;font-weight:600;margin-bottom:10px}
.chat-list-items{flex:1;overflow-y:auto}
.chat-contact{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border2)}
.chat-contact:hover{background:var(--bg3)}
.chat-contact.active{background:var(--accent-glow);border-left:3px solid var(--accent)}
.chat-contact-info{flex:1;min-width:0}
.chat-contact-name{font-weight:500;font-size:.88rem}
.chat-contact-prev{font-size:.76rem;color:var(--fg3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-contact-time{font-size:.7rem;color:var(--fg3);flex-shrink:0}
.chat-main{flex:1;display:flex;flex-direction:column;min-width:0}
.chat-top{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.chat-top-user{display:flex;align-items:center;gap:10px}
.chat-msgs{flex:1;padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.msg{display:flex}
.msg.mine{justify-content:flex-end}
.msg-bubble{max-width:65%;padding:10px 14px;border-radius:14px;font-size:.88rem;line-height:1.45}
.msg:not(.mine) .msg-bubble{background:var(--bg3);border-bottom-left-radius:4px}
.msg.mine .msg-bubble{background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.msg-time{font-size:.68rem;color:var(--fg3);margin-top:4px}
.msg.mine .msg-time{color:rgba(255,255,255,.6);text-align:right}
.chat-input-wrap{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px}
.chat-input{flex:1;padding:10px 16px;background:var(--bg);border:1px solid var(--border);border-radius:24px;color:var(--fg);font-size:.88rem;font-family:inherit;outline:none}
.chat-input:focus{border-color:var(--accent)}
.chat-send{width:40px;height:40px;border-radius:50%;background:var(--accent);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:.9rem}
.chat-send:hover{background:#e55a28;transform:scale(1.05)}

/* ── File Upload ── */
.upload-zone{border:2px dashed var(--border);border-radius:10px;padding:32px;text-align:center;cursor:pointer;transition:all .2s}
.upload-zone:hover{border-color:var(--accent);background:var(--accent-glow)}
.upload-zone i{font-size:2rem;color:var(--fg3);margin-bottom:10px}
.upload-zone p{color:var(--fg2);font-size:.88rem}
.upload-zone span{font-size:.78rem;color:var(--fg3)}
.file-list{margin-top:12px;display:flex;flex-direction:column;gap:6px}
.file-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg);border-radius:8px;font-size:.82rem}
.file-item i{color:var(--accent)}
.file-item .file-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-item .file-remove{background:none;border:none;color:var(--fg3);cursor:pointer;font-size:.8rem}
.file-item .file-remove:hover{color:var(--danger)}

/* ── Tabs ── */
.tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:0}
.tab-btn{padding:10px 18px;font-size:.85rem;font-weight:500;color:var(--fg2);cursor:pointer;border:none;background:none;font-family:inherit;border-bottom:2px solid transparent;transition:all .15s;margin-bottom:-1px}
.tab-btn:hover{color:var(--fg)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ── Notifications Panel ── */
.notif-panel{position:fixed;top:56px;right:24px;width:380px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;box-shadow:0 12px 32px rgba(0,0,0,.5);z-index:150;display:none;animation:mIn .2s ease}
.notif-panel.open{display:block}
.notif-panel-head{padding:16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.notif-panel-head h3{font-size:.95rem;font-weight:600}
.notif-list{max-height:360px;overflow-y:auto}
.notif-item{padding:14px 16px;border-bottom:1px solid var(--border2);cursor:pointer;transition:background .15s}
.notif-item:hover{background:var(--bg3)}
.notif-item.unread{border-left:3px solid var(--accent)}
.notif-item-title{font-weight:500;font-size:.85rem;margin-bottom:3px}
.notif-item-msg{font-size:.78rem;color:var(--fg2);line-height:1.4}
.notif-item-time{font-size:.7rem;color:var(--fg3);margin-top:6px}
.notif-empty{padding:32px;text-align:center;color:var(--fg3);font-size:.88rem}

/* ── Login ── */
.login{display:flex;height:100vh;background:var(--bg)}
.login-left{flex:1;display:flex;align-items:center;justify-content:center;padding:32px}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:36px;width:100%;max-width:420px}
.login-logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:28px}
.login-logo .sb-logo-icon{width:46px;height:46px;font-size:1.3rem;border-radius:12px}
.login-logo span{font-family:'Space Grotesk';font-weight:700;font-size:1.4rem}
.login-box h2{font-size:1.4rem;font-weight:700;text-align:center;margin-bottom:6px}
.login-box .sub{text-align:center;color:var(--fg2);font-size:.9rem;margin-bottom:24px}
.login-divider{display:flex;align-items:center;margin:20px 0;gap:12px;color:var(--fg3);font-size:.82rem}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.login-right{flex:1;display:flex;align-items:center;justify-content:center;padding:32px;position:relative;overflow:hidden}
.login-right::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,107,53,.08),rgba(0,201,167,.08));pointer-events:none}
.login-right-content{position:relative;z-index:1;max-width:480px;text-align:center}
.login-right h1{font-family:'Space Grotesk';font-size:2.5rem;font-weight:700;margin-bottom:16px;line-height:1.15}
.login-right p{font-size:1.05rem;color:var(--fg2);line-height:1.7}
.login-right .features{display:flex;flex-direction:column;gap:14px;margin-top:32px;text-align:left}
.login-right .feat{display:flex;align-items:center;gap:12px;color:var(--fg2);font-size:.92rem}
.login-right .feat i{color:var(--accent);width:20px;text-align:center}

/* ── Chart Container ── */
.chart-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.chart-box h3{font-size:1rem;font-weight:600;margin-bottom:16px}
.charts-row{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:24px}

/* ── Reports ── */
.report-stat{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border2)}
.report-stat:last-child{border-bottom:none}
.report-stat-label{font-size:.88rem;color:var(--fg2)}
.report-stat-val{font-family:'Space Grotesk';font-weight:700;font-size:1.05rem}

/* ── Dropdown ── */
.dropdown{position:relative;display:inline-block}
.dd-menu{position:absolute;top:100%;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:8px;min-width:180px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:100;display:none;padding:4px}
.dd-menu.open{display:block}
.dd-item{display:flex;align-items:center;gap:8px;padding:8px 12px;font-size:.84rem;color:var(--fg2);cursor:pointer;border-radius:6px;transition:all .1s;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.dd-item:hover{background:var(--bg3);color:var(--fg)}
.dd-item.danger{color:var(--danger)}
.dd-item.danger:hover{background:rgba(248,81,73,.1)}
.dd-sep{height:1px;background:var(--border);margin:4px 0}

/* ── Responsive ── */
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%)}
  .sidebar.open{transform:none}
  .stats{grid-template-columns:1fr 1fr}
  .charts-row{grid-template-columns:1fr}
  .frow{grid-template-columns:1fr}
  .chat-list{width:220px}
  .login{flex-direction:column}
  .login-right{display:none}
  .topbar-search{width:160px}
}
@media(max-width:480px){
  .stats{grid-template-columns:1fr}
  .page{padding:16px}
}

/* ── Misc ── */
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.text-accent{color:var(--accent)}
.text-muted{color:var(--fg2)}
.text-sm{font-size:.82rem}
.mt-2{margin-top:8px}.mt-4{margin-top:16px}.mb-4{margin-bottom:16px}
.flex{display:flex}.items-center{align-items:center}.gap-2{gap:8px}.gap-3{gap:12px}
.flex-1{flex:1}.justify-between{justify-content:space-between}
.hidden{display:none !important}
.progress-bar{height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .4s ease}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast-wrap" id="toasts"></div>
<div class="notif-panel" id="notifPanel"></div>

<script>
/* ═══════════════════════════════════════════════
   Typixel — Full Design Management System
   Data stored in localStorage (browser-only)
   ═══════════════════════════════════════════════ */

const DB_KEY = 'typixel_db';
const AUTH_KEY = 'typixel_auth';

// ── Utility helpers ──
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const uid = () => Date.now() + Math.random().toString(36).slice(2,8);
const initials = n => n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
const fmtDate = d => d ? new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '—';
const fmtMoney = n => '₹' + Number(n||0).toLocaleString('en-IN');
const fmtTime = t => {
  const d = new Date(t), now = new Date(), m = Math.floor((now-d)/60000);
  if(m<1) return 'Just now'; if(m<60) return m+'m ago';
  const h = Math.floor(m/60); if(h<24) return h+'h ago';
  return fmtDate(t);
};
const daysLeft = d => { if(!d) return null; const diff = Math.ceil((new Date(d)-new Date())/(86400000)); return diff; };

// ── Database Layer ──
function loadDB(){
  const raw = localStorage.getItem(DB_KEY);
  if(raw) return JSON.parse(raw);
  // Seed default data
  const db = {
    users:[
      {id:'u1',name:'Admin',email:'rifadwork@gmail.com',password:'123',role:'admin',approved:true,avatar:'AD',phone:'',bio:'',totalWorkTime:0,pendingSalary:0,createdAt:new Date().toISOString()}
    ],
    clients:[
      {id:'c1',name:'Priya Sharma',company:'Sharma Enterprises',email:'priya@example.com',phone:'9876543210',address:'Mumbai, India',avatar:'PS'},
      {id:'c2',name:'Rahul Mehta',company:'Mehta Designs',email:'rahul@example.com',phone:'9876543211',address:'Delhi, India',avatar:'RM'},
      {id:'c3',name:'Anita Desai',company:'Desai Media',email:'anita@example.com',phone:'9876543212',address:'Bangalore, India',avatar:'AD'}
    ],
    projects:[
      {id:'p1',name:'Brand Identity Package',description:'Complete brand identity including logo, colors, typography',clientId:'c1',budget:45000,assignedEditorId:null,status:'pending',deadline:getFutureDate(14),createdAt:new Date().toISOString()},
      {id:'p2',name:'Social Media Kit',description:'Instagram and Facebook post templates',clientId:'c2',budget:25000,assignedEditorId:null,status:'pending',deadline:getFutureDate(7),createdAt:new Date().toISOString()},
      {id:'p3',name:'Product Packaging',description:'Packaging design for organic food products',clientId:'c3',budget:60000,assignedEditorId:null,status:'in-progress',deadline:getFutureDate(21),createdAt:getPastDate(5)},
      {id:'p4',name:'Website Redesign',description:'Full website UI/UX redesign',clientId:'c1',budget:80000,assignedEditorId:null,status:'completed',deadline:getPastDate(2),createdAt:getPastDate(30)}
    ],
    workAssignments:[],
    messages:[],
    notifications:[],
    tickets:[],
    invoices:[
      {id:'inv1',clientId:'c1',projectId:'p4',amount:80000,status:'paid',date:getPastDate(2),createdAt:getPastDate(30)},
      {id:'inv2',clientId:'c2',projectId:'p2',amount:25000,status:'unpaid',date:getFutureDate(7),createdAt:getPastDate(10)},
      {id:'inv3',clientId:'c3',projectId:'p3',amount:60000,status:'unpaid',date:getFutureDate(21),createdAt:getPastDate(5)}
    ],
    files:[]
  };
  saveDB(db);
  return db;
}
function saveDB(db){ localStorage.setItem(DB_KEY, JSON.stringify(db)); }
function getFutureDate(days){ return new Date(Date.now()+days*86400000).toISOString().split('T')[0]; }
function getPastDate(days){ return new Date(Date.now()-days*86400000).toISOString().split('T')[0]; }

// ── App State ──
let db = loadDB();
let user = JSON.parse(sessionStorage.getItem(AUTH_KEY)||'null');
let page = user ? (user.role==='admin'?'dashboard':'editor-dashboard') : 'login';
let chatWith = null;
let chartInstances = {};
let uploadedFiles = [];

// ── Toast System ──
function toast(type, title, msg){
  const icons = {success:'fa-check-circle',error:'fa-times-circle',warning:'fa-exclamation-triangle',info:'fa-info-circle'};
  const el = document.createElement('div');
  el.className = `toast t-${type}`;
  el.innerHTML = `<i class="fa-solid ${icons[type]} toast-icon"></i><div class="toast-body"><div class="toast-title">${title}</div><div class="toast-msg">${msg}</div></div><button class="toast-x" onclick="this.parentElement.remove()"><i class="fa-solid fa-times"></i></button>`;
  $('#toasts').appendChild(el);
  setTimeout(()=>{ if(el.parentElement) el.remove(); },4500);
}

// ── Notifications ──
function addNotif(userId, title, msg){
  db.notifications.unshift({id:uid(),userId,title,msg,read:false,createdAt:new Date().toISOString()});
  saveDB(db);
}
function unreadCount(){ return db.notifications.filter(n=>n.userId===user?.id && !n.read).length; }
function toggleNotifPanel(){
  const p = $('#notifPanel');
  if(p.classList.contains('open')){
    p.classList.remove('open');
    db.notifications.filter(n=>n.userId===user?.id && !n.read).forEach(n=>n.read=true);
    saveDB(db);
    render();
  } else {
    const notifs = db.notifications.filter(n=>n.userId===user?.id).slice(0,20);
    p.innerHTML = `<div class="notif-panel-head"><h3>Notifications</h3><span class="text-sm text-muted">${notifs.length} total</span></div><div class="notif-list">${notifs.length?notifs.map(n=>`<div class="notif-item ${n.read?'':'unread'}"><div class="notif-item-title">${n.title}</div><div class="notif-item-msg">${n.msg}</div><div class="notif-item-time">${fmtTime(n.createdAt)}</div></div>`).join(''):'<div class="notif-empty">No notifications</div>'}</div>`;
    p.classList.add('open');
  }
}

// ── Modal System ──
function openModal(html){
  closeModals();
  const bg = document.createElement('div');
  bg.className='modal-bg open';
  bg.id='modalBg';
  bg.innerHTML=`<div class="modal">${html}</div>`;
  bg.addEventListener('click',e=>{ if(e.target===bg) closeModals(); });
  document.body.appendChild(bg);
}
function closeModals(){ const m=$('#modalBg'); if(m) m.remove(); }

// ── Auth ──
function login(email, pw){
  const u = db.users.find(x=>x.email===email && x.password===pw);
  if(!u){ toast('error','Login Failed','Invalid email or password'); return; }
  if(u.role==='editor' && !u.approved){ toast('warning','Pending Approval','Your account awaits admin approval'); return; }
  user = u; sessionStorage.setItem(AUTH_KEY, JSON.stringify(u));
  page = u.role==='admin'?'dashboard':'editor-dashboard';
  render(); toast('success','Welcome back',`Hi ${u.name}!`);
}
function logout(){ user=null; sessionStorage.removeItem(AUTH_KEY); page='login'; chatWith=null; render(); toast('info','Logged out','See you soon'); }
function register(name, email, pw, portfolio, bio){
  if(db.users.find(x=>x.email===email)){ toast('error','Email taken','This email is already registered'); return; }
  const u = {id:uid(),name,email,password:pw,role:'editor',approved:false,avatar:initials(name),phone:'',bio:bio||'',portfolio:portfolio||'',totalWorkTime:0,pendingSalary:0,createdAt:new Date().toISOString()};
  db.users.push(u); saveDB(db);
  addNotif('u1','New Editor Applied',`${name} applied to join the team`);
  toast('success','Application Sent','We\'ll review and get back to you');
}

// ── Navigation ──
function navigate(p){ page=p; chatWith=null; render(); }
function render(){ 
  if(!user){ renderLogin(); return; }
  $('#app').innerHTML = `<div class="app">${renderSidebar()}<div class="main">${renderTopbar()}<div class="page fade-in" id="pageContent">${renderPage()}</div></div></div>`;
  destroyCharts(); 
  setTimeout(initCharts,50);
}

// ── Sidebar ──
function renderSidebar(){
  const items = user.role==='admin' ? [
    {sec:'MAIN'},{id:'dashboard',icon:'fa-gauge-high',label:'Dashboard'},
    {sec:'MANAGE'},{id:'clients',icon:'fa-users',label:'Clients'},{id:'editors',icon:'fa-user-pen',label:'Editors'},{id:'projects',icon:'fa-briefcase',label:'Projects'},{id:'assignments',icon:'fa-clipboard-list',label:'Work Assignments'},
    {sec:'FINANCE'},{id:'invoices',icon:'fa-file-invoice-dollar',label:'Invoices'},{id:'reports',icon:'fa-chart-line',label:'Reports'},
    {sec:'SUPPORT'},{id:'tickets',icon:'fa-life-ring',label:'Tickets'},{id:'chat',icon:'fa-comments',label:'Chat'}
  ] : [
    {sec:'OVERVIEW'},{id:'editor-dashboard',icon:'fa-gauge-high',label:'Dashboard'},
    {sec:'WORK'},{id:'my-work',icon:'fa-briefcase',label:'My Work'},{id:'submit-work',icon:'fa-cloud-arrow-up',label:'Submit Work'},{id:'my-invoices',icon:'fa-file-invoice-dollar',label:'My Invoices'},
    {sec:'SUPPORT'},{id:'support',icon:'fa-life-ring',label:'Get Help'},{id:'chat',icon:'fa-comments',label:'Chat'}
  ];
  items.push({sec:''},{id:'profile',icon:'fa-user-gear',label:'Settings'});
  let html = `<div class="sb-logo"><div class="sb-logo-icon">T</div><span>Typixel</span></div><nav class="sb-nav">`;
  items.forEach(it=>{
    if(it.sec) html+=`<div class="sb-section">${it.sec}</div>`;
    else html+=`<button class="sb-item ${page===it.id?'active':''}" onclick="navigate('${it.id}')"><i class="fa-solid ${it.icon}"></i>${it.label}${it.id==='tickets'?`<span class="sb-badge">${db.tickets.filter(t=>!t.resolved).length||''}</span>`:''}</button>`;
  });
  html+=`</nav><div class="sb-footer"><div class="sb-user"><div class="sb-avatar">${user.avatar}</div><div class="sb-user-info"><div class="sb-user-name">${user.name}</div><div class="sb-user-role">${user.role==='admin'?'Administrator':'Editor'}</div></div></div></div>`;
  return `<aside class="sidebar" id="sidebar">${html}</aside>`;
}

// ── Topbar ──
function renderTopbar(){
  const titles = {dashboard:'Dashboard',clients:'Clients',editors:'Editors',projects:'Projects',assignments:'Work Assignments',invoices:'Invoices',reports:'Reports',tickets:'Support Tickets',chat:'Chat','editor-dashboard':'Dashboard','my-work':'My Work','submit-work':'Submit Work','my-invoices':'My Invoices',support:'Get Help',profile:'Settings'};
  const uc = unreadCount();
  return `<header class="topbar"><div class="topbar-left"><button class="tb-btn hidden" id="menuBtn" onclick="$('#sidebar').classList.toggle('open')" style="display:none"><i class="fa-solid fa-bars"></i></button><span class="topbar-title">${titles[page]||'Typixel'}</span></div><div class="topbar-right"><button class="tb-btn" onclick="toggleNotifPanel()"><i class="fa-solid fa-bell"></i>${uc?`<span class="dot"></span>`:''}</button><div class="dropdown"><button class="tb-btn" onclick="this.nextElementSibling.classList.toggle('open')"><i class="fa-solid fa-ellipsis-vertical"></i></button><div class="dd-menu"><button class="dd-item" onclick="navigate('profile');this.closest('.dd-menu').classList.remove('open')"><i class="fa-solid fa-user-gear"></i>Settings</button><div class="dd-sep"></div><button class="dd-item danger" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i>Logout</button></div></div></div></header>`;
}

// ── Page Router ──
function renderPage(){
  switch(page){
    case 'dashboard': return pageDashboard();
    case 'clients': return pageClients();
    case 'editors': return pageEditors();
    case 'projects': return pageProjects();
    case 'assignments': return pageAssignments();
    case 'invoices': return pageInvoices();
    case 'reports': return pageReports();
    case 'tickets': return pageTickets();
    case 'chat': return pageChat();
    case 'editor-dashboard': return pageEditorDash();
    case 'my-work': return pageMyWork();
    case 'submit-work': return pageSubmitWork();
    case 'my-invoices': return pageMyInvoices();
    case 'support': return pageSupport();
    case 'profile': return pageProfile();
    default: return pageDashboard();
  }
}

// ═══════════════════════════════════
//  ADMIN PAGES
// ═══════════════════════════════════

function pageDashboard(){
  const revenue = db.invoices.filter(i=>i.status==='paid').reduce((s,i)=>s+i.amount,0);
  const unpaid = db.invoices.filter(i=>i.status==='unpaid').reduce((s,i)=>s+i.amount,0);
  const active = db.projects.filter(p=>p.status==='in-progress').length;
  const pending = db.projects.filter(p=>p.status==='pending').length;
  const editors = db.users.filter(u=>u.role==='editor'&&u.approved).length;
  const pendingApp = db.users.filter(u=>u.role==='editor'&&!u.approved).length;

  return `
  <div class="ph"><div><h1>Dashboard</h1><p>Your business at a glance</p></div><div class="ph-actions"><button class="btn btn-primary" onclick="modalAddProject()"><i class="fa-solid fa-plus"></i>New Project</button></div></div>
  <div class="stats">
    <div class="stat"><div class="stat-top"><span class="stat-label">Revenue Collected</span><div class="stat-icon c1"><i class="fa-solid fa-indian-rupee-sign"></i></div></div><div class="stat-val">${fmtMoney(revenue)}</div><div class="stat-change up"><i class="fa-solid fa-arrow-up"></i> 12% this month</div></div>
    <div class="stat"><div class="stat-top"><span class="stat-label">Pending Payments</span><div class="stat-icon c2"><i class="fa-solid fa-clock"></i></div></div><div class="stat-val">${fmtMoney(unpaid)}</div><div class="stat-change down"><i class="fa-solid fa-circle-exclamation"></i> ${db.invoices.filter(i=>i.status==='unpaid').length} invoices</div></div>
    <div class="stat"><div class="stat-top"><span class="stat-label">Active Projects</span><div class="stat-icon c3"><i class="fa-solid fa-briefcase"></i></div></div><div class="stat-val">${active}</div><div class="stat-change text-muted"><i class="fa-solid fa-hourglass-half"></i> ${pending} pending start</div></div>
    <div class="stat"><div class="stat-top"><span class="stat-label">Team Editors</span><div class="stat-icon c4"><i class="fa-solid fa-users"></i></div></div><div class="stat-val">${editors}</div><div class="stat-change ${pendingApp?'down':'up'}">${pendingApp?`<i class="fa-solid fa-user-clock"></i> ${pendingApp} pending approval`:'<i class="fa-solid fa-check"></i> All active'}</div></div>
  </div>
  <div class="charts-row">
    <div class="chart-box"><h3>Monthly Revenue</h3><canvas id="revenueChart" height="200"></canvas></div>
    <div class="chart-box"><h3>Project Status</h3><canvas id="statusChart" height="200"></canvas></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div class="card"><div class="card-head"><h3>Recent Assignments</h3></div><div class="card-body" style="padding:0">${renderRecentAssignments()}</div></div>
    <div class="card"><div class="card-head"><h3>Upcoming Deadlines</h3></div><div class="card-body" style="padding:0">${renderUpcomingDeadlines()}</div></div>
  </div>`;
}

function renderRecentAssignments(){
  const items = db.workAssignments.slice(-5).reverse();
  if(!items.length) return '<div style="padding:32px;text-align:center;color:var(--fg3)">No assignments yet</div>';
  return items.map(w=>{
    const proj = db.projects.find(p=>p.id===w.projectId);
    const ed = db.users.find(u=>u.id===w.editorId);
    return `<div style="padding:12px 20px;border-bottom:1px solid var(--border2);display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:500;font-size:.88rem">${proj?.name||'—'}</div><div class="text-sm text-muted">${ed?.name||'Unassigned'}</div></div><span class="badge badge-${w.status==='completed'?'green':w.status==='in-progress'?'blue':'yellow'}">${w.status}</span></div>`;
  }).join('');
}

function renderUpcomingDeadlines(){
  const items = db.projects.filter(p=>p.deadline && p.status!=='completed').sort((a,b)=>new Date(a.deadline)-new Date(b.deadline)).slice(0,5);
  if(!items.length) return '<div style="padding:32px;text-align:center;color:var(--fg3)">No upcoming deadlines</div>';
  return items.map(p=>{
    const dl = daysLeft(p.deadline);
    const cls = dl!==null && dl<=3 ? 'deadline-soon' : 'deadline-ok';
    const client = db.clients.find(c=>c.id===p.clientId);
    return `<div style="padding:12px 20px;border-bottom:1px solid var(--border2);display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:500;font-size:.88rem">${p.name}</div><div class="text-sm text-muted">${client?.name||'—'}</div></div><span class="${cls} text-sm"><i class="fa-solid fa-calendar-day"></i> ${dl!==null?(dl<=0?'Overdue':dl+'d left'):fmtDate(p.deadline)}</span></div>`;
  }).join('');
}

// ── Clients ──
function pageClients(){
  return `<div class="ph"><div><h1>Clients</h1><p>${db.clients.length} total clients</p></div><div class="ph-actions"><button class="btn btn-primary" onclick="modalAddClient()"><i class="fa-solid fa-plus"></i>Add Client</button></div></div>
  <div class="card"><div class="card-body" style="padding:0;overflow-x:auto"><table class="tbl"><thead><tr><th>Client</th><th>Company</th><th>Email</th><th>Phone</th><th>Projects</th><th>Total Spent</th><th>Actions</th></tr></thead><tbody>
  ${db.clients.length?db.clients.map(c=>{
    const cp = db.projects.filter(p=>p.clientId===c.id);
    const spent = cp.reduce((s,p)=>s+(p.budget||0),0);
    return `<tr><td><div class="cell-user"><div class="sb-avatar" style="width:32px;height:32px;font-size:.7rem">${c.avatar}</div><span class="cell-name">${c.name}</span></div></td><td>${c.company||'—'}</td><td class="text-muted">${c.email}</td><td class="text-muted">${c.phone||'—'}</td><td>${cp.length}</td><td style="font-weight:600">${fmtMoney(spent)}</td><td><div class="dropdown"><button class="btn-icon" onclick="this.nextElementSibling.classList.toggle('open')"><i class="fa-solid fa-ellipsis"></i></button><div class="dd-menu"><button class="dd-item" onclick="modalEditClient('${c.id}');this.closest('.dd-menu').classList.remove('open')"><i class="fa-solid fa-pen"></i>Edit</button><button class="dd-item danger" onclick="deleteClient('${c.id}');this.closest('.dd-menu').classList.remove('open')"><i class="fa-solid fa-trash"></i>Delete</button></div></div></td></tr>`;
  }).join(''):'<tr class="empty-row"><td colspan="7">No clients yet. Add your first client.</td></tr>'}
  </tbody></table></div></div>`;
}

function modalAddClient(edit=null){
  const c = edit ? db.clients.find(x=>x.id===edit) : null;
  openModal(`<div class="modal-head"><h3>${c?'Edit':'Add'} Client</h3><button class="modal-close" onclick="closeModals()">&times;</button></div><div class="modal-body"><form id="clientForm"><div class="frow"><div class="fg"><label>Name</label><input class="fi" name="name" value="${c?.name||''}" required></div><div class="fg"><label>Company</label><input class="fi" name="company" value="${c?.company||''}"></div></div><div class="frow"><div class="fg"><label>Email</label><input class="fi" type="email" name="email" value="${c?.email||''}" required></div><div class="fg"><label>Phone</label><input class="fi" name="phone" value="${c?.phone||''}"></div></div><div class="fg"><label>Address</label><textarea class="fi" name="address" rows="2">${c?.address||''}</textarea></div></form></div><div class="modal-foot"><button class="btn btn-ghost" onclick="closeModals()">Cancel</button><button class="btn btn-primary" onclick="saveClient('${edit||''}')">${c?'Save':'Add Client'}</button></div>`);
}
function modalEditClient(id){ modalAddClient(id); }
function saveClient(editId){
  const f = new FormData($('#clientForm'));
  if(editId){
    const c = db.clients.find(x=>x.id===editId);
    Object.assign(c, {name:f.get('name'),company:f.get('company'),email:f.get('email'),phone:f.get('phone'),address:f.get('address'),avatar:initials(f.get('name'))});
    toast('success','Updated','Client updated');
  } else {
    if(db.clients.find(x=>x.email===f.get('email'))){toast('error','Duplicate','Email already exists');return;}
    db.clients.push({id:uid(),name:f.get('name'),company:f.get('company'),email:f.get('email'),phone:f.get('phone'),address:f.get('address'),avatar:initials(f.get('name'))});
    toast('success','Added','Client added successfully');
  }
  saveDB(db); closeModals(); render();
}
function deleteClient(id){
  openModal(`<div class="modal-head"><h3>Delete Client</h3><button class="modal-close" onclick="closeModals()">&times;</button></div><div class="modal-body"><p style="color:var(--fg2)">Are you sure? This will also remove all associated projects and invoices. This cannot be undone.</p></div><div class="modal-foot"><button class="btn btn-ghost" onclick="closeModals()">Cancel</button><button class="btn btn-danger" onclick="confirmDeleteClient('${id}')">Delete</button></div>`);
}
function confirmDeleteClient(id){
  db.projects = db.projects.filter(p=>p.clientId!==id);
  db.invoices = db.invoices.filter(i=>i.clientId!==id);
  db.clients = db.clients.filter(c=>c.id!==id);
  saveDB(db); closeModals(); render(); toast('success','Deleted','Client removed');
}

// ── Editors ──
function pageEditors(){
  const editors = db.users.filter(u=>u.role==='editor');
  return `<div class="ph"><div><h1>Editors</h1><p>${editors.length} team members</p></div><div class="ph-actions"><button class="btn btn-primary" onclick="modalAddEditor()"><i class="fa-solid fa-plus"></i>Add Editor</button></div></div>
  <div class="card"><div class="card-body" style="padding:0;overflow-x:auto"><table class="tbl"><thead><tr><th>Editor</th><th>Email</th><th>Work Time</th><th>Pending Salary</th><th>Status</th><th>Actions</th></tr></thead><tbody>
  ${editors.length?editors.map(e=>{
    const wc = db.workAssignments.filter(w=>w.editorId===e.id&&w.status==='completed').length;

function saveEditor(){

  const id=uid();
  db.users.push({id,name:f.get('name'),email:f.get('email'),password:f.get('password'),role:'editor',approved:false,avatar:initials(f.get('name')),phone:'',bio:'',totalWorkTime:0,pendingSalary:0,createdAt:new Date().toISOString()});

function approveEditor(id){

function modalUpdateSalary(id){

function modalAssignProject(editorId){

function assignProjectToEditor(editorId){
  const projId=$('#assignProj').value;const desc=$('#assignDesc').value;
  const proj=db.projects.find(p=>p.id===projId);if(!proj)return;
  proj.assignedEditorId=editorId; proj.status='in-progress';
  db.workAssignments.push({id:uid(),projectId:projId,editorId,description:desc||proj.description,deadline:proj.deadline,status:'pending',createdAt:new Date().toISOString()});
  addNotif(editorId,'New Assignment',`You've been assigned: ${proj.name}`);

}
function deleteEditor(id){
  openModal(`<div class="modal-head"><h3>Remove Editor</h3><button class="modal-close" onclick="closeModals()">&times;</button></div><div class="modal-body"><p class="text-muted">This will unassign all their work. This cannot be undone.</p></div><div class="modal-foot"><button class="btn btn-ghost" onclick="closeModals()">Cancel</button><button class="btn btn-danger" onclick="confirmDeleteEditor('${id}')">Remove</button></div>`);

function confirmDeleteEditor(id){
  db.workAssignments.forEach(w=>{if(w.editorId===id)w.editorId=null;});

function modalAddProject(edit=null){
  const p=edit?db.projects.find(x=>x.id===edit):null;
  openModal(`<div class="modal-head"><h3>${p?'Edit':'New'} Project</h3><button class="modal-close" onclick="closeModals()">&times;</button></div><div class="modal-body"><form id="projForm"><div class="fg"><label>Project Name</label><input class="fi" name="name" value="${p?.name||''}" required></div><div class="fg"><label>Description</label><textarea class="fi" name="desc" rows="2">${p?.description||''}</textarea></div><div class="frow"><div class="fg"><label>Client</label><select class="fi" name="clientId" required><option value="">Select client</option>${db.clients.map(c=>`<option value="${c.id}" ${p?.clientId===c.id?'selected':''}>${c.name}</option>`).join('')}</select></div><div class="fg"><label>Budget (₹)</label><input class="fi" type="number" name="budget" value="${p?.budget||''}" required></div></div><div class="frow"><div class="fg"><label>Assign Editor</label><select class="fi" name="editorId"><option value="">Unassigned</option>${db.users.filter(u=>u.role==='editor'&&u.approved).map(e=>`<option value="${e.id}" ${p?.assignedEditorId===e.id?'selected':''}>${e.name}</option>`).join('')}</select></div><div class="fg"><label>Deadline</label><input class="fi" type="date" name="deadline" value="${p?.deadline||''}"></div></div></form></div><div class="modal-foot"><button class="btn btn-ghost" onclick="closeModals()">Cancel</button><button class="btn btn-primary" onclick="saveProject('${edit||''}')">${p?'Save':'Create'}</button></div>`);
}
function modalEditProject(id){modalAddProject(id);}
function saveProject(editId){
  const f=new FormData($('#projForm'));
  if(editId){
    const p=db.projects.find(x=>x.id===editId);
    const oldEditor=p.assignedEditorId;
    Object.assign(p,{name:f.get('name'),description:f.get('desc'),clientId:f.get('clientId'),budget:parseFloat(f.get('budget')),assignedEditorId:f.get('editorId')||null,deadline:f.get('deadline')});
    if(f.get('editorId')&&f.get('editorId')!==oldEditor){
      db.workAssignments.push({id:uid(),projectId:p.id,editorId:f.get('editorId'),description:p.description,deadline:p.deadline,status:'pending',createdAt:new Date().toISOString()});
      addNotif(f.get('editorId'),'New Assignment',`Assigned to: ${p.name}`);
    }
    toast('success','Updated','Project updated');
  } else {
    const id=uid();
    db.projects.push({id,name:f.get('name'),description:f.get('desc'),clientId:f.get('clientId'),budget:parseFloat(f.get('budget')),assignedEditorId:f.get('editorId')||null,status:'pending',deadline:f.get('deadline'),createdAt:new Date().toISOString()});
    if(f.get('editorId')){
      db.workAssignments.push({id:uid(),projectId:id,editorId:f.get('editorId'),description:f.get('desc'),deadline:f.get('deadline'),status:'pending',createdAt:new Date().toISOString()});
      addNotif(f.get('editorId'),'New Assignment',`Assigned to: ${f.get('name')}`);
    }
    toast('success','Created','Project created');
  }
  saveDB(db);closeModals();render();
}
function completeProject(id){
  const p=db.projects.find(x=>x.id===id);if(!p)return;
  p.status='completed';
  db.workAssignments.filter(w=>w.projectId===id).forEach(w=>w.status='completed');
  // Auto-create invoice
  db.invoices.push({id:uid(),clientId:p.clientId,projectId:p.id,amount:p.budget,status:'unpaid',date:new Date().toISOString().split('T')[0],createdAt:new Date().toISOString()});
  saveDB(db);render();toast('success','Completed','Project marked complete. Invoice created.');
}
function deleteProject(id){
  openModal(`<div class="modal-head"><h3>Delete Project</h3><button class="modal-close" onclick="closeModals()">&times;</button></div><div class="modal-body"><p class="text-muted">This will remove the project and all related data.</p></div><div class="modal-foot"><button class="btn btn-ghost" onclick="closeModals()">Cancel</button><button class="btn btn-danger" onclick="db.projects=db.projects.filter(x=>x.id!=='${id}');db.workAssignments=db.workAssignments.filter(w=>w.projectId!=='${id}');db.files=db.files.filter(f=>f.projectId!=='${id}');saveDB(db);closeModals();render();toast('success','Deleted','Project removed')">Delete</button></div>`);
}

function pageAssignments(){
  return `<div class="ph"><div><h1>Work Assignments</h1><p>Track all editor work</p></div></div>

function filterAssignments(status,btn){

function renderAssignmentCards(items){
  if(!items.length) return '<div style="text-align:center;padding:40px;color:var(--fg3)">No assignments found</div>';
  return items.slice().reverse().map(w=>{
    const proj=db.projects.find(p=>p.id===w.projectId);
    const ed=db.users.find(u=>u.id===w.editorId);
    const dl=daysLeft(w.deadline);
    const files=db.files.filter(f=>f.assignmentId===w.id);
    return `<div class="wk"><div class="wk-head"><div class="wk-title">${proj?.name||'Unknown'}</div><span class="badge badge-${w.status==='completed'?'green':w.status==='in-progress'?'blue':'yellow'}">${w.status}</span></div><div class="wk-desc">${w.description||'No description'}</div><div class="wk-meta"><span><i class="fa-solid fa-user"></i>${ed?.name||'Unassigned'}</span><span><i class="fa-solid fa-calendar"></i>Deadline: <span class="${dl!==null&&dl<=3?'deadline-soon':'deadline-ok'}">${dl!==null?(dl<=0?'Overdue':dl+'d left'):fmtDate(w.deadline)}</span></span><span><i class="fa-solid fa-paperclip"></i>${files.length} files</span></div>${w.status!=='completed'?`<div class="wk-actions"><button class="btn btn-sm btn-ghost" onclick="modalCreateInvoice('${w.projectId}')"><i class="fa-solid fa-file-invoice-dollar"></i>Create Invoice</button></div>`:''}</div>`;
  }).join('');
}

  <div class="card mt-4"><div class="card-head"><h3>Upload Files</h3></div><div class="card-body">

  <div class="mt-4"><button class="btn btn-primary" onclick="submitWork()"><i class="fa-solid fa-paper-plane"></i>Submit for Review</button></div>`;
}

function handleFiles(files){
  Array.from(files).forEach(f=>{
    if(f.size>50*1024*1024){toast('error','Too Large',`${f.name} exceeds 50MB`);return;}
    uploadedFiles.push({name:f.name,size:f.size,type:f.type});
  });
  renderFileList();
}
function renderFileList(){
  $('#fileList').innerHTML=uploadedFiles.map((f,i)=>`<div class="file-item"><i class="fa-solid fa-file"></i><span class="file-name">${f.name}</span><span class="text-muted text-sm">${(f.size/1024).toFixed(0)}KB</span><button class="file-remove" onclick="uploadedFiles.splice(${i},1);renderFileList()"><i class="fa-solid fa-times"></i></button></div>`).join('');
}
function submitWork(){
  const workId=$('#submitWorkId')?.value;
  if(!workId){toast('error','Error','No work selected');return;}
  if(!uploadedFiles.length){toast('error','Error','Please upload at least one file');return;}
  const w=db.workAssignments.find(x=>x.id===workId);if(!w)return;
  uploadedFiles.forEach(f=>{
    db.files.push({id:uid(),assignmentId:workId,projectId:w.projectId,editorId:user.id,name:f.name,size:f.size,type:f.type,uploadedAt:new Date().toISOString()});
  });
  w.status='completed';w.completedAt=new Date().toISOString();
  const proj=db.projects.find(p=>p.id===w.projectId);
  if(proj) proj.status='completed';
  addNotif('u1','Work Submitted',`${user.name} submitted work for: ${proj?.name||'Project'}`);
  saveDB(db);render();toast('success','Submitted','Your work has been submitted for review');
}

function pageChat(){
  const contacts=db.users.filter(u=>u.id!==user.id);
  return `<div class="chat-wrap"><div class="chat-list"><div class="chat-list-head"><h3>Messages</h3></div><div class="chat-list-items">${contacts.map(c=>{const last=getLastMsg(user.id,c.id);return `<div class="chat-contact ${chatWith===c.id?'active':''}" onclick="openChat('${c.id}')"><div class="sb-avatar" style="width:36px;height:36px;font-size:.72rem;flex-shrink:0">${c.avatar}</div><div class="chat-contact-info"><div class="chat-contact-name">${c.name}</div><div class="chat-contact-prev">${last?last.text:'No messages yet'}</div></div><div class="chat-contact-time">${last?fmtTime(last.timestamp):''}</div></div>`;}).join('')}</div></div><div class="chat-main" id="chatMain"><div style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;color:var(--fg3)"><i class="fa-solid fa-comments" style="font-size:3rem;margin-bottom:16px;opacity:.3"></i><p>Select a conversation to start chatting</p></div></div></div>`;
}
function getLastMsg(u1,u2){
  const msgs=db.messages.filter(m=>(m.senderId===u1&&m.receiverId===u2)||(m.senderId===u2&&m.receiverId===u1)).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
  return msgs[0]||null;
}
function openChat(userId){
  chatWith=userId;
  const other=db.users.find(u=>u.id===userId);
  const msgs=db.messages.filter(m=>(m.senderId===user.id&&m.receiverId===userId)||(m.senderId===userId&&m.receiverId===user.id)).sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));
  // Re-render chat list to highlight
  $$('.chat-contact').forEach(el=>el.classList.remove('active'));
  event?.target?.closest('.chat-contact')?.classList.add('active');
  $('#chatMain').innerHTML=`<div class="chat-top"><div class="chat-top-user"><div class="sb-avatar" style="width:32px;height:32px;font-size:.7rem">${other.avatar}</div><div><div style="font-weight:500;font-size:.9rem">${other.name}</div><div class="text-sm text-muted">Online</div></div></div></div><div class="chat-msgs" id="chatMsgs">${msgs.length?msgs.map(m=>`<div class="msg ${m.senderId===user.id?'mine':''}"><div><div class="msg-bubble">${m.text}</div><div class="msg-time">${fmtTime(m.timestamp)}</div></div></div>`).join(''):'<div style="text-align:center;color:var(--fg3);padding:40px">No messages yet. Say hello!</div>'}</div><div class="chat-input-wrap"><input class="chat-input" id="chatInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendMsg('${userId}')"><button class="chat-send" onclick="sendMsg('${userId}')"><i class="fa-solid fa-paper-plane"></i></button></div>`;
  const msgsEl=$('#chatMsgs');if(msgsEl)msgsEl.scrollTop=msgsEl.scrollHeight;
}
function sendMsg(receiverId){
  const input=$('#chatInput');if(!input)return;
  const text=input.value.trim();if(!text)return;
  db.messages.push({id:uid(),senderId:user.id,receiverId,text,timestamp:new Date().toISOString()});
  saveDB(db);input.value='';
  openChat(receiverId);
  // Update sidebar preview
  const contacts=$$('.chat-contact');
  contacts.forEach(el=>{
    if(el.onclick?.toString().includes(receiverId)){
      const prev=el.querySelector('.chat-contact-prev');
      if(prev) prev.textContent=text;
      const time=el.querySelector('.chat-contact-time');
      if(time) time.textContent='Just now';
    }
  });
}

function destroyCharts(){ Object.values(chartInstances).forEach(c=>c.destroy()); chartInstances={}; }

function initCharts(){
  const gridColor='rgba(48,54,61,.6)';
  const tickColor='#8B949E';

  // Dashboard revenue chart
  const rc=$('#revenueChart');
  if(rc){
    const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const now=new Date();
    const paidInv=db.invoices.filter(i=>i.status==='paid');
    const monthlyData=months.map((_,i)=>{
      const m=i+1;
      return paidInv.filter(inv=>{const d=new Date(inv.date);return d.getMonth()===m&&d.getFullYear()===now.getFullYear();}).reduce((s,inv)=>s+inv.amount,0);
    });
    // Add some simulated historical data for visual appeal
    const simData=[12000,18000,15000,22000,28000,25000,32000,35000,30000,42000,38000,0];
    const finalData=monthlyData.map((v,i)=>v||simData[i]);
    finalData[now.getMonth()]=finalData[now.getMonth()]+(paidInv.reduce((s,i)=>s+i.amount,0));

    chartInstances.revenue=new Chart(rc,{type:'line',data:{labels:months,datasets:[{label:'Revenue',data:finalData,borderColor:'#FF6B35',backgroundColor:'rgba(255,107,53,.1)',fill:true,tension:.4,pointBackgroundColor:'#FF6B35',pointRadius:4,pointHoverRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:gridColor},ticks:{color:tickColor}},y:{grid:{color:gridColor},ticks:{color:tickColor,callback:v=>'₹'+v/1000+'K'}}}}});
  }

  // Dashboard status chart
  const sc=$('#statusChart');
  if(sc){
    const statuses=['pending','in-progress','completed'];
    const counts=statuses.map(s=>db.projects.filter(p=>p.status===s).length);
    chartInstances.status=new Chart(sc,{type:'doughnut',data:{labels:['Pending','In Progress','Completed'],datasets:[{data:counts,backgroundColor:['#D29922','#58A6FF','#2EA043'],borderWidth:0,hoverOffset:8}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:tickColor,padding:16,usePointStyle:true}}},cutout:'65%'}});
  }

  // Reports revenue chart
  const rrc=$('#reportRevenueChart');
  if(rrc){
    const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const simPaid=[12000,18000,15000,22000,28000,25000,32000,35000,30000,42000,38000,45000];
    const simUnpaid=[5000,8000,6000,10000,12000,9000,15000,18000,14000,20000,16000,22000];
    chartInstances.reportRev=new Chart(rrc,{type:'bar',data:{labels:months,datasets:[{label:'Paid',data:simPaid,backgroundColor:'#2EA043',borderRadius:4},{label:'Unpaid',data:simUnpaid,backgroundColor:'#D29922',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:tickColor,usePointStyle:true}}},scales:{x:{grid:{color:gridColor},ticks:{color:tickColor}},y:{grid:{color:gridColor},ticks:{color:tickColor,callback:v=>'₹'+v/1000+'K'}}}}});
  }

  // Reports distribution chart
  const rdc=$('#reportDistChart');
  if(rdc){
    const clients=db.clients.map(c=>({name:c.name,count:db.projects.filter(p=>p.clientId===c.id).length})).filter(c=>c.count>0);
    chartInstances.reportDist=new Chart(rdc,{type:'polarArea',data:{labels:clients.map(c=>c.name),datasets:[{data:clients.map(c=>c.count),backgroundColor:['rgba(255,107,53,.6)','rgba(0,201,167,.6)','rgba(88,166,255,.6)','rgba(210,153,34,.6)','rgba(46,160,67,.6)'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:tickColor,padding:12,usePointStyle:true}}},scales:{r:{grid:{color:gridColor},ticks:{display:false}}}}});
  }
}

// ═══════════════════════════════════
//  UTILITY / EVENT HANDLERS
// ═══════════════════════════════════

function resetAllData(){
  openModal(`<div class="modal-head"><h3>Reset All Data</h3><button class="modal-close" onclick="closeModals()">&times;</button></div><div class="modal-body"><p class="text-muted" style="color:var(--danger);font-weight:500">This will permanently delete all clients, projects, invoices, messages, and everything except your admin account. Type <strong>RESET</strong> to confirm.</p><input class="fi mt-4" id="resetConfirm" placeholder="Type RESET here"></div><div class="modal-foot"><button class="btn btn-ghost" onclick="closeModals()">Cancel</button><button class="btn btn-danger" onclick="if($('#resetConfirm').value==='RESET'){localStorage.removeItem(DB_KEY);db=loadDB();closeModals();render();toast('success','Reset','All data has been cleared')}else{toast('error','Error','Type RESET to confirm')}">Reset Everything</button></div>`);
}

// Global form handlers
document.addEventListener('submit',e=>{
  if(e.target.id==='profileForm'){
    e.preventDefault();
    const u=db.users.find(x=>x.id===user.id);if(!u)return;
    u.name=$('#profName')?.value||u.name;
    u.phone=$('#profPhone')?.value||'';
    if($('#profPortfolio')) u.portfolio=$('#profPortfolio').value||'';
    if($('#profBio')) u.bio=$('#profBio').value||'';
    u.avatar=initials(u.name);
    user=u;sessionStorage.setItem(AUTH_KEY,JSON.stringify(u));
    saveDB(db);render();toast('success','Saved','Profile updated');
  }
  if(e.target.id==='pwForm'){
    e.preventDefault();
    const curr=$('#pwCurr').value,nw=$('#pwNew').value,conf=$('#pwConf').value;
    if(curr!==user.password){toast('error','Error','Current password is incorrect');return;}
    if(nw!==conf){toast('error','Error','Passwords do not match');return;}
    if(nw.length<3){toast('error','Error','Password too short');return;}
    const u=db.users.find(x=>x.id===user.id);u.password=nw;
    user=u;sessionStorage.setItem(AUTH_KEY,JSON.stringify(u));
    saveDB(db);e.target.reset();toast('success','Updated','Password changed');
  }
});

// Close dropdowns on outside click
document.addEventListener('click',e=>{
  if(!e.target.closest('.dropdown')) $$('.dd-menu.open').forEach(m=>m.classList.remove('open'));
  if(!e.target.closest('.notif-panel')&&!e.target.closest('.tb-btn')){const p=$('#notifPanel');if(p)p.classList.remove('open');}
});

// Drag and drop for file upload
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{
  e.preventDefault();
  if(e.target.closest('.upload-zone')){
    handleFiles(e.dataTransfer.files);
  }
});

// Responsive sidebar
function checkMobile(){
  const btn=$('#menuBtn');
  if(btn) btn.style.display=window.innerWidth<=768?'flex':'none';
}
window.addEventListener('resize',checkMobile);

// ── Init ──
render();
checkMobile();
</script>
