<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typixel — Design Studio Management</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#1c2333;--sidebar:#010409;--accent:#FF6B35;--accent2:#00C9A7;--accent-glow:rgba(255,107,53,.12);--success:#2EA043;--warning:#D29922;--danger:#F85149;--info:#58A6FF;--fg:#E6EDF3;--fg2:#8B949E;--fg3:#484F58;--border:#30363D;--border2:#21262D;--radius:10px}
[data-theme="light"]{--bg:#f0f2f5;--bg2:#ffffff;--bg3:#e8eaed;--sidebar:#1a1d23;--accent:#E05520;--accent2:#009E82;--accent-glow:rgba(224,85,32,.08);--fg:#1f2937;--fg2:#6b7280;--fg3:#9ca3af;--border:#d1d5db;--border2:#e5e7eb}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--fg);overflow:hidden;height:100vh;transition:background .3s,color .3s}
h1,h2,h3,h4{font-family:'Space Grotesk',sans-serif}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--fg3);border-radius:3px}
.app{display:flex;height:100vh}
.sidebar{width:248px;background:var(--sidebar);border-right:1px solid var(--border2);display:flex;flex-direction:column;flex-shrink:0;z-index:50;transition:transform .3s}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:54px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;transition:background .3s}
.page{flex:1;overflow-y:auto;padding:24px;transition:background .3s}
.sb-logo{padding:18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border2)}
.sb-logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),#ff9a5c);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk';font-weight:700;font-size:1rem;color:#fff}
.sb-logo span{font-family:'Space Grotesk';font-weight:700;font-size:1.15rem;color:var(--fg)}
.sb-nav{flex:1;padding:10px 0;overflow-y:auto}
.sb-sec{padding:0 14px;margin-bottom:2px;font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:var(--fg3);font-weight:600}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 18px;color:var(--fg2);cursor:pointer;transition:all .12s;border:none;background:none;width:100%;text-align:left;font-size:.85rem;font-family:inherit}
.sb-item:hover{color:var(--fg);background:rgba(255,255,255,.04)}
.sb-item.active{color:var(--accent);background:var(--accent-glow)}
.sb-item i{width:16px;text-align:center;font-size:.85rem}
.sb-badge{margin-left:auto;background:var(--danger);color:#fff;font-size:.6rem;padding:1px 6px;border-radius:8px;font-weight:700}
.sb-footer{padding:14px;border-top:1px solid var(--border2)}
.sb-user{display:flex;align-items:center;gap:9px;padding:7px;border-radius:8px;background:rgba(255,255,255,.03)}
.sb-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.68rem;color:#fff;flex-shrink:0}
.sb-user-name{font-weight:600;font-size:.82rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-user-role{font-size:.68rem;color:var(--fg2)}
.topbar-left{display:flex;align-items:center;gap:14px}
.topbar-title{font-family:'Space Grotesk';font-weight:600;font-size:1rem}
.topbar-search{display:flex;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:6px 10px;width:260px;transition:border-color .2s}
.topbar-search:focus-within{border-color:var(--accent)}
.topbar-search i{color:var(--fg3);font-size:.8rem;margin-right:7px}
.topbar-search input{border:none;background:none;outline:none;color:var(--fg);font-size:.83rem;width:100%;font-family:inherit}
.topbar-right{display:flex;align-items:center;gap:6px}
.tb-btn{width:34px;height:34px;border-radius:7px;border:1px solid var(--border);background:var(--bg);color:var(--fg2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;font-size:.85rem;position:relative}
.tb-btn:hover{background:var(--bg3);color:var(--fg);border-color:var(--fg3)}
.tb-dot{position:absolute;top:5px;right:5px;width:7px;height:7px;background:var(--danger);border-radius:50%;border:2px solid var(--bg2)}
.sync-dot{width:6px;height:6px;border-radius:50%;margin-right:6px;flex-shrink:0}
.sync-dot.on{background:var(--success)}.sync-dot.ing{background:var(--warning);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.ph{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.ph h1{font-size:1.5rem;font-weight:700}
.ph p{color:var(--fg2);font-size:.88rem;margin-top:3px}
.ph-actions{display:flex;gap:7px;flex-wrap:wrap}
.btn{padding:7px 16px;border-radius:7px;font-weight:500;font-size:.83rem;border:1px solid transparent;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .12s;font-family:inherit;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--fg2);border-color:var(--border)}
.btn-ghost:hover{background:var(--bg3);color:var(--fg)}
.btn-success{background:var(--success);color:#fff}.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:4px 10px;font-size:.76rem}
.btn-lg{padding:11px 24px;font-size:.92rem;border-radius:9px}
.btn-icon{width:30px;height:30px;padding:0;justify-content:center;border-radius:6px;background:transparent;color:var(--fg2);border:1px solid transparent}
.btn-icon:hover{background:var(--bg3);color:var(--fg)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:background .3s,border-color .3s}
.card-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.card-head h3{font-size:.95rem;font-weight:600}
.card-body{padding:18px}
.stats{display:grid;gap:14px;margin-bottom:20px}
.stats-p{grid-template-columns:1.4fr 1fr;margin-bottom:16px}
.stats-s{grid-template-columns:repeat(3,1fr);margin-bottom:20px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:all .2s;position:relative;overflow:hidden}
.stat::after{content:'';position:absolute;top:0;right:0;width:80px;height:80px;border-radius:50%;filter:blur(40px);opacity:.08;pointer-events:none}
.stat:nth-child(1)::after{background:var(--accent)}.stat:nth-child(2)::after{background:var(--accent2)}
.stat:nth-child(3)::after{background:var(--warning)}.stat:nth-child(4)::after{background:var(--info)}
.stat:hover{transform:translateY(-2px);border-color:var(--fg3)}
.stat-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.stat-label{font-size:.8rem;color:var(--fg2);font-weight:500}
.stat-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.9rem}
.si-1{background:rgba(255,107,53,.1);color:var(--accent)}.si-2{background:rgba(0,201,167,.1);color:var(--accent2)}
.si-3{background:rgba(210,153,34,.1);color:var(--warning)}.si-4{background:rgba(88,166,255,.1);color:var(--info)}
.stat-val{font-family:'Space Grotesk';font-size:1.75rem;font-weight:700;line-height:1}
.stat-sub{font-size:.78rem;margin-top:6px;color:var(--fg2);line-height:1.4}
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;padding:9px 14px;font-size:.72rem;font-weight:600;color:var(--fg2);text-transform:uppercase;letter-spacing:.04em;background:var(--bg3);border-bottom:1px solid var(--border)}
.tbl td{padding:10px 14px;border-bottom:1px solid var(--border2);font-size:.85rem;vertical-align:middle}
.tbl tr:hover td{background:rgba(255,255,255,.015)}
.tbl .cu{display:flex;align-items:center;gap:9px}
.tbl .cn{font-weight:500}.tbl .cs{font-size:.72rem;color:var(--fg2)}
.empty-row td{text-align:center;color:var(--fg3);padding:36px 14px!important}
.badge{display:inline-flex;padding:2px 9px;border-radius:20px;font-size:.7rem;font-weight:600}
.bg-green{background:rgba(46,160,67,.12);color:var(--success)}.bg-yellow{background:rgba(210,153,34,.12);color:var(--warning)}
.bg-red{background:rgba(248,81,73,.12);color:var(--danger)}.bg-blue{background:rgba(88,166,255,.12);color:var(--info)}
.bg-orange{background:rgba(255,107,53,.12);color:var(--accent)}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:.78rem;font-weight:500;margin-bottom:5px;color:var(--fg2)}
.fi{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--fg);font-size:.85rem;font-family:inherit;transition:border-color .2s}
.fi:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,107,53,.08)}
select.fi{cursor:pointer}textarea.fi{resize:vertical;min-height:70px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal-bg.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:13px;width:92%;max-width:540px;max-height:85vh;overflow-y:auto;animation:mIn .22s ease}
@keyframes mIn{from{opacity:0;transform:translateY(-14px) scale(.97)}to{opacity:1;transform:none}}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-head h3{font-size:1.05rem;font-weight:600}
.modal-close{background:none;border:none;color:var(--fg2);font-size:1.25rem;cursor:pointer;padding:3px;line-height:1}
.modal-close:hover{color:var(--fg)}
.modal-body{padding:22px}
.modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:7px}
.toast-wrap{position:fixed;top:16px;right:16px;z-index:300;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:12px 16px;display:flex;align-items:flex-start;gap:9px;min-width:280px;max-width:400px;box-shadow:0 8px 20px rgba(0,0,0,.35);animation:tIn .25s ease;pointer-events:auto}
@keyframes tIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:none}}
.toast-icon{font-size:1rem;margin-top:1px;flex-shrink:0}
.toast.ts .toast-icon{color:var(--success)}.toast.te .toast-icon{color:var(--danger)}
.toast.tw .toast-icon{color:var(--warning)}.toast.ti .toast-icon{color:var(--info)}
.toast-body{flex:1;min-width:0}.toast-title{font-weight:600;font-size:.82rem;margin-bottom:1px}
.toast-msg{font-size:.78rem;color:var(--fg2);line-height:1.35}
.toast-x{background:none;border:none;color:var(--fg3);cursor:pointer;font-size:.85rem;padding:2px;flex-shrink:0}
.wk{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:10px;transition:all .15s}
.wk:hover{border-color:var(--fg3)}
.wk-head{display:flex;justify-content:space-between;align-items:start;margin-bottom:8px;gap:10px}
.wk-title{font-weight:600;font-size:.95rem}
.wk-desc{color:var(--fg2);font-size:.83rem;line-height:1.45;margin-bottom:10px}
.wk-meta{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:12px;font-size:.8rem;color:var(--fg2)}
.wk-meta span{display:flex;align-items:center;gap:4px}.wk-meta i{font-size:.75rem}
.wk-actions{display:flex;gap:7px;flex-wrap:wrap}
.dl-soon{color:var(--danger)!important;font-weight:600}.dl-ok{color:var(--success)!important}
.progress{height:5px;background:var(--bg);border-radius:3px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:3px;transition:width .4s}
.chat-wrap{display:flex;height:100%}
.chat-list{width:260px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.chat-list-head{padding:14px;border-bottom:1px solid var(--border)}
.chat-list-head h3{font-size:.95rem;font-weight:600}
.chat-contacts{flex:1;overflow-y:auto}
.chat-c{display:flex;align-items:center;gap:9px;padding:11px 14px;cursor:pointer;transition:background .12s;border-bottom:1px solid var(--border2)}
.chat-c:hover{background:var(--bg3)}.chat-c.active{background:var(--accent-glow);border-left:3px solid var(--accent)}
.chat-c-info{flex:1;min-width:0}
.chat-c-name{font-weight:500;font-size:.85rem}
.chat-c-prev{font-size:.73rem;color:var(--fg3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-c-time{font-size:.68rem;color:var(--fg3);flex-shrink:0}
.chat-main{flex:1;display:flex;flex-direction:column;min-width:0}
.chat-top{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.chat-msgs{flex:1;padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
.msg{display:flex}.msg.mine{justify-content:flex-end}
.msg-b{max-width:65%;padding:9px 13px;border-radius:13px;font-size:.85rem;line-height:1.4}
.msg:not(.mine) .msg-b{background:var(--bg3);border-bottom-left-radius:3px}
.msg.mine .msg-b{background:var(--accent);color:#fff;border-bottom-right-radius:3px}
.msg-t{font-size:.66rem;color:var(--fg3);margin-top:3px}.msg.mine .msg-t{color:rgba(255,255,255,.55);text-align:right}
.chat-iw{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:9px}
.chat-input{flex:1;padding:9px 14px;background:var(--bg);border:1px solid var(--border);border-radius:22px;color:var(--fg);font-size:.85rem;font-family:inherit;outline:none}
.chat-input:focus{border-color:var(--accent)}
.chat-send{width:38px;height:38px;border-radius:50%;background:var(--accent);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;font-size:.85rem}
.chat-send:hover{filter:brightness(1.1)}
.upload-zone{border:2px dashed var(--border);border-radius:9px;padding:28px;text-align:center;cursor:pointer;transition:all .15s}
.upload-zone:hover{border-color:var(--accent);background:var(--accent-glow)}
.upload-zone i{font-size:1.8rem;color:var(--fg3);margin-bottom:8px}
.upload-zone p{color:var(--fg2);font-size:.85rem}
.upload-zone span{font-size:.75rem;color:var(--fg3)}
.file-list{margin-top:10px;display:flex;flex-direction:column;gap:5px}
.file-item{display:flex;align-items:center;gap:9px;padding:7px 10px;background:var(--bg);border-radius:7px;font-size:.8rem}
.file-item i{color:var(--accent)}.file-item .fn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-item .fr{background:none;border:none;color:var(--fg3);cursor:pointer;font-size:.78rem}.file-item .fr:hover{color:var(--danger)}
.tabs{display:flex;gap:3px;margin-bottom:18px;border-bottom:1px solid var(--border);padding-bottom:0}
.tab-btn{padding:9px 16px;font-size:.83rem;font-weight:500;color:var(--fg2);cursor:pointer;border:none;background:none;font-family:inherit;border-bottom:2px solid transparent;transition:all .12s;margin-bottom:-1px}
.tab-btn:hover{color:var(--fg)}.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.notif-panel{position:fixed;top:54px;right:20px;width:360px;background:var(--bg2);border:1px solid var(--border);border-radius:11px;box-shadow:0 10px 28px rgba(0,0,0,.45);z-index:150;display:none;animation:mIn .18s ease}
.notif-panel.open{display:block}
.notif-ph{padding:14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.notif-ph h3{font-size:.92rem;font-weight:600}
.notif-list{max-height:320px;overflow-y:auto}
.notif-item{padding:12px 14px;border-bottom:1px solid var(--border2);transition:background .1s}
.notif-item.unread{border-left:3px solid var(--accent);background:rgba(255,107,53,.03)}
.notif-item-title{font-weight:500;font-size:.83rem;margin-bottom:2px}
.notif-item-msg{font-size:.75rem;color:var(--fg2);line-height:1.35}
.notif-item-time{font-size:.67rem;color:var(--fg3);margin-top:5px}
.notif-empty{padding:28px;text-align:center;color:var(--fg3);font-size:.85rem}
.dropdown{position:relative;display:inline-block}
.dd-menu{position:absolute;top:100%;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:7px;min-width:170px;box-shadow:0 8px 20px rgba(0,0,0,.35);z-index:100;display:none;padding:3px}
.dd-menu.open{display:block}
.dd-item{display:flex;align-items:center;gap:7px;padding:7px 10px;font-size:.82rem;color:var(--fg2);cursor:pointer;border-radius:5px;transition:all .08s;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.dd-item:hover{background:var(--bg3);color:var(--fg)}
.dd-item.danger{color:var(--danger)}.dd-item.danger:hover{background:rgba(248,81,73,.08)}
.dd-sep{height:1px;background:var(--border);margin:3px 0}
.login{display:flex;height:100vh;background:var(--bg)}
.login-left{width:440px;display:flex;align-items:center;justify-content:center;padding:36px;flex-shrink:0;border-right:1px solid var(--border2)}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:36px;width:100%;max-width:380px}
.login-logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:8px}
.login-logo .sb-logo-icon{width:44px;height:44px;font-size:1.3rem;border-radius:12px}
.login-logo span{font-family:'Space Grotesk';font-weight:700;font-size:1.4rem}
.login-box .tagline{text-align:center;color:var(--accent);font-size:.82rem;font-weight:600;letter-spacing:.02em;margin-bottom:20px}
.login-box h2{font-size:1.25rem;font-weight:700;text-align:center;margin-bottom:4px}
.login-box .sub{text-align:center;color:var(--fg2);font-size:.85rem;margin-bottom:24px}
.login-divider{display:flex;align-items:center;margin:18px 0;gap:10px;color:var(--fg3);font-size:.8rem}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.login-right{flex:1;display:flex;align-items:center;justify-content:center;padding:60px;position:relative;overflow:hidden}
.login-right::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 40%,rgba(255,107,53,.07) 0%,transparent 60%),radial-gradient(ellipse at 70% 70%,rgba(0,201,167,.05) 0%,transparent 50%);pointer-events:none}
.login-right-content{position:relative;z-index:1;max-width:520px}
.login-right .hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,107,53,.08);border:1px solid rgba(255,107,53,.15);color:var(--accent);font-size:.78rem;font-weight:600;padding:6px 14px;border-radius:20px;margin-bottom:24px}
.login-right h1{font-family:'Space Grotesk';font-size:2.6rem;font-weight:700;margin-bottom:16px;line-height:1.1;letter-spacing:-.02em}
.login-right h1 em{font-style:normal;color:var(--accent)}
.login-right .hero-desc{font-size:1.05rem;color:var(--fg2);line-height:1.6;margin-bottom:32px}
.login-right .trust-row{display:flex;align-items:center;gap:20px;margin-bottom:36px}
.login-right .trust-num{text-align:center}
.login-right .trust-num .val{font-family:'Space Grotesk';font-size:1.5rem;font-weight:700;color:var(--fg)}
.login-right .trust-num .lbl{font-size:.72rem;color:var(--fg3);text-transform:uppercase;letter-spacing:.04em}
.login-right .trust-sep{width:1px;height:36px;background:var(--border)}
.login-features{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.login-feat{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:9px}
.login-feat i{color:var(--accent);font-size:.85rem;width:16px;text-align:center;flex-shrink:0}
.login-feat span{font-size:.83rem;color:var(--fg2)}
.quick-actions{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.qa-btn{display:flex;flex-direction:column;align-items:center;gap:8px;padding:18px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .15s;color:var(--fg2);font-family:inherit;font-size:.8rem;font-weight:500}
.qa-btn:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 12px rgba(255,107,53,.08)}
.qa-btn i{font-size:1.1rem}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.note{padding:14px;border-radius:9px;background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--accent);margin-bottom:10px;transition:all .15s}
.note:hover{border-left-color:var(--accent2)}
.note-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.note-title{font-weight:600;font-size:.85rem}
.note-body{font-size:.8rem;color:var(--fg2);line-height:1.4;white-space:pre-wrap}
.note-time{font-size:.67rem;color:var(--fg3);margin-top:6px}
.log-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border2);font-size:.83rem}
.log-item:last-child{border-bottom:none}
.log-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);margin-top:5px;flex-shrink:0}
.log-text{flex:1;color:var(--fg2)}.log-text strong{color:var(--fg);font-weight:500}
.log-time{font-size:.72rem;color:var(--fg3);flex-shrink:0;white-space:nowrap}
.mini-stat{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border2)}
.mini-stat:last-child{border-bottom:none}
.mini-stat-icon{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0}
.mini-stat-info{flex:1;min-width:0}
.mini-stat-name{font-weight:500;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-stat-val{font-size:.78rem;color:var(--fg2)}
.loading-overlay{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.print-invoice{background:#fff;color:#111;padding:40px;max-width:700px;margin:0 auto;font-family:'DM Sans',sans-serif}
.print-invoice h1{color:#111}.print-invoice table{width:100%;border-collapse:collapse;margin:20px 0}
.print-invoice th,.print-invoice td{padding:10px 14px;border:1px solid #ddd;text-align:left;font-size:.9rem}
.print-invoice th{background:#f5f5f5}
.fade-in{animation:fadeIn .25s ease}@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.text-muted{color:var(--fg2)}.text-sm{font-size:.8rem}.mt-2{margin-top:6px}.mt-4{margin-top:14px}.mb-4{margin-bottom:14px}
.hidden{display:none!important}
.alert-bar{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:8px;font-size:.83rem;margin-bottom:12px;border:1px solid}
.alert-bar.alert-danger{background:rgba(248,81,73,.06);border-color:rgba(248,81,73,.15);color:var(--danger)}
.alert-bar.alert-warning{background:rgba(210,153,34,.06);border-color:rgba(210,153,34,.15);color:var(--warning)}
.alert-bar i{font-size:.9rem;flex-shrink:0}
.overdue-badge{display:inline-flex;align-items:center;gap:3px;color:var(--danger);font-size:.75rem;font-weight:600;background:rgba(248,81,73,.08);padding:2px 8px;border-radius:12px}
@media(max-width:768px){.sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);z-index:60}.sidebar.open{transform:none}.stats-p,.stats-s{grid-template-columns:1fr}.quick-actions{grid-template-columns:repeat(2,1fr)}.dash-grid{grid-template-columns:1fr}.frow{grid-template-columns:1fr}.chat-list{width:200px}.login{flex-direction:column}.login-right{display:none}.login-left{width:100%;border-right:none}.topbar-search{width:140px}.ph{flex-direction:column}.login-features{grid-template-columns:1fr}}
@media(max-width:480px){.quick-actions{grid-template-columns:1fr 1fr}.page{padding:14px}}
@media print{.sidebar,.topbar,.toast-wrap,.notif-panel{display:none!important}.main{margin:0}.page{padding:0;overflow:visible}}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast-wrap" id="toasts"></div>
<div class="notif-panel" id="notifPanel"></div>
<div class="loading-overlay hidden" id="loader"><div class="spinner"></div><div style="color:var(--fg2);font-size:.9rem">Connecting...</div></div>

<script>
var SHEET_URL='https://script.google.com/macros/s/AKfycbzc5eG28Od3nVYpzr2a5pmef4FZOGFTgZRF7EX_o273r2lRvb449JDzp_kealYBJCFbJQ/exec';
var CACHE_KEY='typixel_cache';
var AUTH_KEY='typixel_auth';
var THEME_KEY='typixel_theme';

function $(s){return document.querySelector(s);}
function $$(s){return document.querySelectorAll(s);}
function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function ini(n){return(n||'').split(' ').map(function(w){return w[0]}).join('').toUpperCase().slice(0,2);}
function fmtD(d){return d?new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}):'—';}
function fmtM(n){return '\u20B9'+Number(n||0).toLocaleString('en-IN');}
function fmtT(t){if(!t)return'';var d=new Date(t),n=new Date(),m=Math.floor((n-d)/60000);if(m<1)return'Just now';if(m<60)return m+'m ago';var h=Math.floor(m/60);if(h<24)return h+'h ago';return fmtD(t);}
function dlLeft(d){if(!d)return null;return Math.ceil((new Date(d)-new Date())/86400000);}
function futureD(n){return new Date(Date.now()+n*864e5).toISOString().split('T')[0];}
function pastD(n){return new Date(Date.now()-n*864e5).toISOString().split('T')[0];}

var DB={
  _data:null,_syncing:false,
  defaults:function(){
    return{
      users:[{id:'u1',name:'Admin',email:'rifadwork@gmail.com',password:'123',role:'admin',approved:true,avatar:'AD',phone:'',bio:'',portfolio:'',totalWorkTime:0,pendingSalary:0,createdAt:new Date().toISOString()}],
      clients:[
        {id:'c1',name:'Priya Sharma',company:'Sharma Enterprises',email:'priya@example.com',phone:'9876543210',address:'Mumbai',avatar:'PS'},
        {id:'c2',name:'Rahul Mehta',company:'Mehta Designs',email:'rahul@example.com',phone:'9876543211',address:'Delhi',avatar:'RM'},
        {id:'c3',name:'Anita Desai',company:'Desai Media',email:'anita@example.com',phone:'9876543212',address:'Bangalore',avatar:'AD'}
      ],
      projects:[
        {id:'p1',name:'Brand Identity Package',description:'Complete brand identity including logo, colors, typography',clientId:'c1',budget:45000,assignedEditorId:null,status:'pending',deadline:futureD(14),createdAt:new Date().toISOString()},
        {id:'p2',name:'Social Media Kit',description:'Instagram and Facebook post templates',clientId:'c2',budget:25000,assignedEditorId:null,status:'pending',deadline:futureD(7),createdAt:new Date().toISOString()},
        {id:'p3',name:'Product Packaging',description:'Packaging design for organic food products',clientId:'c3',budget:60000,assignedEditorId:null,status:'in-progress',deadline:futureD(21),createdAt:pastD(5)},
        {id:'p4',name:'Website Redesign',description:'Full website UI/UX redesign',clientId:'c1',budget:80000,assignedEditorId:null,status:'completed',deadline:pastD(2),createdAt:pastD(30)}
      ],
      workAssignments:[],messages:[],notifications:[],tickets:[],
      invoices:[
        {id:'inv1',clientId:'c1',projectId:'p4',editorId:null,amount:80000,status:'paid',date:pastD(2),createdAt:pastD(30)},
        {id:'inv2',clientId:'c2',projectId:'p2',editorId:null,amount:25000,status:'unpaid',date:futureD(7),createdAt:pastD(10)},
        {id:'inv3',clientId:'c3',projectId:'p3',editorId:null,amount:60000,status:'unpaid',date:futureD(21),createdAt:pastD(5)}
      ],
      files:[],
      activityLog:[
        {id:gid(),userId:'u1',action:'System',details:'Typixel initialized with sample data',createdAt:new Date().toISOString()},
        {id:gid(),userId:'u1',action:'Invoice',details:'Received \u20B980,000 \u2014 Website Redesign',createdAt:new Date(pastD(2)).toISOString()},
        {id:gid(),userId:'u1',action:'Project',details:'Created Product Packaging for Desai Media',createdAt:new Date(pastD(5)).toISOString()}
      ],
      notes:[]
    };
  },
  tables:['users','clients','projects','workAssignments','messages','notifications','tickets','invoices','files','activityLog','notes'],

  load:function(){
    var self=this;
    try{
      $('#loader').classList.remove('hidden');
      self._syncing=true;syncDot();
      return fetch(SHEET_URL+'?t='+Date.now()).then(function(r){return r.json();}).then(function(json){
        if(json.ok&&json.data){
          self._data={};
          self.tables.forEach(function(t){self._data[t]=json.data[t]||[];});
          if(!self._data.users||self._data.users.length===0){
            self._data=self.defaults();
            return self.pushAll().then(function(){return self._data;});
          }
          localStorage.setItem(CACHE_KEY,JSON.stringify(self._data));
          self._syncing=false;syncDot();
          $('#loader').classList.add('hidden');
          return self._data;
        }else{
          throw new Error(json.error||'Sheet error');
        }
      }).catch(function(e){
        console.log('Sheet failed, using cache:',e.message);
        self._syncing=false;syncDot();
        $('#loader').classList.add('hidden');
        try{self._data=JSON.parse(localStorage.getItem(CACHE_KEY));}catch(err){}
        if(!self._data||!self._data.users){self._data=self.defaults();self._cache();}
        return self._data;
      });
    }catch(e){
      self._syncing=false;syncDot();
      $('#loader').classList.add('hidden');
      self._data=self.defaults();self._cache();
      return Promise.resolve(self._data);
    }
  },

  push:function(table){
    var self=this;
    if(!self._data)return Promise.resolve();
    localStorage.setItem(CACHE_KEY,JSON.stringify(self._data));
    self._syncing=true;syncDot();
    return fetch(SHEET_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({key:table,data:self._data[table]||[]})}).then(function(r){return r.json();}).then(function(json){
      if(!json.ok)console.log('Push err',table,json.error);
      self._syncing=false;syncDot();
    }).catch(function(e){self._syncing=false;syncDot();});
  },

  pushAll:function(){
    var self=this;
    if(!self._data)return Promise.resolve();
    localStorage.setItem(CACHE_KEY,JSON.stringify(self._data));
    self._syncing=true;syncDot();
    var chain=Promise.resolve();
    self.tables.forEach(function(t){
      chain=chain.then(function(){return fetch(SHEET_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({key:t,data:self._data[t]||[]})});});
    });
    return chain.then(function(){self._syncing=false;syncDot();}).catch(function(e){self._syncing=false;syncDot();});
  },

  save:function(table){return this.push(table);},
  saveAll:function(){return this.pushAll();},
  _cache:function(){localStorage.setItem(CACHE_KEY,JSON.stringify(this._data));},
  log:function(action,details){
    if(!this._data)return;
    if(!this._data.activityLog)this._data.activityLog=[];
    this._data.activityLog.unshift({id:gid(),userId:user?user.id:'system',action:action,details:details,createdAt:new Date().toISOString()});
    if(this._data.activityLog.length>200)this._data.activityLog.length=200;
    this.save('activityLog');
  }
};

function syncDot(){var d=$('.sync-dot');if(!d)return;d.className='sync-dot'+(DB._syncing?' ing':' on');}

var db=null;
var user=null;
try{user=JSON.parse(sessionStorage.getItem(AUTH_KEY)||'null');}catch(e){user=null;}
var page=user?(user.role==='admin'?'dashboard':'editor-dashboard'):'login';
var chatWith=null,uploadedFiles=[],searchQuery='';

function applyTheme(){document.documentElement.setAttribute('data-theme',localStorage.getItem(THEME_KEY)||'dark');}
applyTheme();
function toggleTheme(){var c=document.documentElement.getAttribute('data-theme');var n=c==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem(THEME_KEY,n);}

function toast(type,title,msg){
  var ic={success:'fa-check-circle',error:'fa-times-circle',warning:'fa-exclamation-triangle',info:'fa-info-circle'};
  var cl={success:'ts',error:'te',warning:'tw',info:'ti'};
  var el=document.createElement('div');el.className='toast '+cl[type];
  el.innerHTML='<i class="fa-solid '+ic[type]+' toast-icon"></i><div class="toast-body"><div class="toast-title">'+title+'</div><div class="toast-msg">'+msg+'</div></div><button class="toast-x" onclick="this.parentElement.remove()"><i class="fa-solid fa-times"></i></button>';
  $('#toasts').appendChild(el);
  setTimeout(function(){if(el.parentElement)el.remove();},4000);
}

function addNotif(targetUserId,title,msg){
  if(!db)return;
  if(!db.notifications)db.notifications=[];
  db.notifications.unshift({id:gid(),userId:targetUserId,title:title,msg:msg,read:false,createdAt:new Date().toISOString()});
  DB.save('notifications');
}

function unreadCount(){return db?db.notifications.filter(function(n){return n.userId===user.id&&!n.read;}).length:0;}

function toggleNotifPanel(){
  var p=$('#notifPanel');
  if(p.classList.contains('open')){
    p.classList.remove('open');
    if(db&&db.notifications){
      db.notifications.filter(function(n){return n.userId===user.id&&!n.read;}).forEach(function(n){n.read=true;});
      DB.save('notifications');
    }
    render();
  }else{
    var ns=(db?db.notifications:[]).filter(function(n){return n.userId===user.id;}).slice(0,15);
    var html='<div class="notif-ph"><h3>Notifications</h3></div><div class="notif-list">';
    if(ns.length){
      ns.forEach(function(n){html+='<div class="notif-item '+(n.read?'':'unread')+'"><div class="notif-item-title">'+n.title+'</div><div class="notif-item-msg">'+n.msg+'</div><div class="notif-item-time">'+fmtT(n.createdAt)+'</div></div>';});
    }else{
      html+='<div class="notif-empty"><i class="fa-solid fa-bell-slash" style="font-size:1.5rem;opacity:.3;display:block;margin-bottom:8px"></i>No notifications</div>';
    }
    html+='</div>';
    p.innerHTML=html;
    p.classList.add('open');
  }
}

function openModal(html){
  closeModals();
  var bg=document.createElement('div');bg.className='modal-bg open';bg.id='modalBg';
  bg.innerHTML='<div class="modal">'+html+'</div>';
  bg.addEventListener('click',function(e){if(e.target===bg)closeModals();});
  document.body.appendChild(bg);
}
function closeModals(){var m=$('#modalBg');if(m)m.remove();}

function exportCSV(table,headers){
  var rows=db[table]||[];
  if(!rows.length){toast('warning','Empty','No data');return;}
  var csv=headers.join(',')+'\n';
  rows.forEach(function(r){csv+=headers.map(function(h){return '"'+(r[h]||'').toString().replace(/"/g,'""')+'"';}).join(',')+'\n';});
  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=table+'.csv';a.click();
  toast('success','Exported');
}

function printInvoice(id){
  var inv=db.invoices.find(function(i){return i.id===id;});
  if(!inv)return;
  var cl=db.clients.find(function(c){return c.id===inv.clientId;});
  var pr=db.projects.find(function(p){return p.id===inv.projectId;});
  var w=document.createElement('div');
  w.innerHTML='<div class="print-invoice"><div style="display:flex;justify-content:space-between;margin-bottom:30px"><div><h1 style="font-size:1.8rem;margin-bottom:4px">Typixel</h1><p style="color:#666">Design Studio</p></div><div style="text-align:right"><h2 style="font-size:1.4rem;margin-bottom:4px">INVOICE</h2><p style="color:#666">#'+inv.id.slice(-5).toUpperCase()+'</p></div></div><div style="display:flex;justify-content:space-between;margin-bottom:30px"><div><strong>Bill To:</strong><br>'+(cl?cl.name:'\u2014')+'<br>'+(cl?cl.company:'')+'<br>'+(cl?cl.email:'')+'</div><div style="text-align:right"><strong>Date:</strong> '+fmtD(inv.date)+'<br><strong>Status:</strong> '+inv.status.toUpperCase()+'</div></div><table><thead><tr><th>Description</th><th style="text-align:right">Amount</th></tr></thead><tbody><tr><td>'+(pr?pr.name:'Project')+'</td><td style="text-align:right;font-weight:600">'+fmtM(inv.amount)+'</td></tr></tbody><tfoot><tr><td style="text-align:right;font-weight:700;border-top:2px solid #111;padding-top:10px">Total</td><td style="text-align:right;font-weight:700;font-size:1.1rem;border-top:2px solid #111;padding-top:10px">'+fmtM(inv.amount)+'</td></tr></tfoot></table><div style="margin-top:40px;text-align:center;color:#999;font-size:.85rem">Thank you \u2014 Typixel</div></div>';
  document.body.appendChild(w);window.print();w.remove();
}

function login(email,pw){
  var u=db.users.find(function(x){return x.email===email&&x.password===pw;});
  if(!u){toast('error','Login Failed','Invalid email or password');return;}
  if(u.role==='editor'&&!u.approved){toast('warning','Pending','Your account is awaiting admin approval');return;}
  user=u;sessionStorage.setItem(AUTH_KEY,JSON.stringify(u));
  page=u.role==='admin'?'dashboard':'editor-dashboard';
  DB.log('Login',u.name+' logged in');render();toast('success','Welcome back','Hi '+u.name);
}

function logout(){user=null;sessionStorage.removeItem(AUTH_KEY);page='login';chatWith=null;render();}

function register(name,email,pw,portfolio,bio){
  if(!name||!email||!pw){toast('error','Missing','Name, email, and password required');return;}
  if(pw.length<4){toast('error','Weak','Password must be at least 4 characters');return;}
  if(db.users.find(function(x){return x.email===email;})){toast('error','Taken','An account with this email already exists');return;}
  db.users.push({id:gid(),name:name,email:email,password:pw,role:'editor',approved:false,avatar:ini(name),phone:'',bio:bio||'',portfolio:portfolio||'',totalWorkTime:0,pendingSalary:0,createdAt:new Date().toISOString()});
  addNotif('u1','New Editor Applied',name+' wants to join the team');
  DB.log('Register','New application from '+name);
  DB.save('users');
  toast('success','Application Sent','We will review your profile shortly');
}

function navigate(p){page=p;chatWith=null;searchQuery='';render();}

function searchFilter(arr,fields){
  if(!searchQuery)return arr;
  var q=searchQuery.toLowerCase();
  return arr.filter(function(i){return fields.some(function(f){return(i[f]||'').toString().toLowerCase().indexOf(q)!==-1;});});
}

function render(){
  if(!user){renderLogin();return;}
  var sidebarHtml=rSidebar();
  var topbarHtml=rTopbar();
  var pageHtml=rPage();
  $('#app').innerHTML='<div class="app">'+sidebarHtml+'<div class="main">'+topbarHtml+'<div class="page fade-in" id="pc">'+pageHtml+'</div></div></div>';
  var si=$('.topbar-search input');
  if(si)si.oninput=function(e){searchQuery=e.target.value;var pc=$('#pc');if(pc)pc.innerHTML=rPage();};
  var pf=$('#profileForm');
  if(pf)pf.onsubmit=function(e){e.preventDefault();saveProfile();};
  var pwf=$('#pwForm');
  if(pwf)pwf.onsubmit=function(e){e.preventDefault();changePw();};
  syncDot();
}

function rSidebar(){
  var isAdmin=user.role==='admin';
  var items=isAdmin?[
    {s:'OVERVIEW'},{id:'dashboard',i:'fa-gauge-high',l:'Dashboard'},
    {s:'MANAGE'},{id:'clients',i:'fa-users',l:'Clients'},{id:'editors',i:'fa-user-pen',l:'Editors'},{id:'projects',i:'fa-briefcase',l:'Projects'},{id:'assignments',i:'fa-clipboard-list',l:'Assignments'},
    {s:'FINANCE'},{id:'invoices',i:'fa-file-invoice-dollar',l:'Invoices'},
    {s:'TOOLS'},{id:'activity',i:'fa-clock-rotate-left',l:'Activity Log'},{id:'notes',i:'fa-note-sticky',l:'Quick Notes'},{id:'tickets',i:'fa-life-ring',l:'Tickets'},{id:'chat',i:'fa-comments',l:'Messages'}
  ]:[
    {s:'OVERVIEW'},{id:'editor-dashboard',i:'fa-gauge-high',l:'Dashboard'},
    {s:'WORK'},{id:'my-work',i:'fa-briefcase',l:'My Work'},{id:'submit-work',i:'fa-cloud-arrow-up',l:'Submit Work'},{id:'my-invoices',i:'fa-file-invoice-dollar',l:'My Invoices'},
    {s:'TOOLS'},{id:'notes',i:'fa-note-sticky',l:'Quick Notes'},{id:'support',i:'fa-life-ring',l:'Get Help'},{id:'chat',i:'fa-comments',l:'Messages'}
  ];
  items.push({s:''},{id:'profile',i:'fa-gear',l:'Settings'});
  var openTix=db.tickets?db.tickets.filter(function(t){return !t.resolved;}).length:0;
  var h='<div class="sb-logo"><div class="sb-logo-icon">T</div><span>Typixel</span></div><nav class="sb-nav">';
  items.forEach(function(it){
    if(it.s)h+='<div class="sb-sec">'+it.s+'</div>';
    else{
      var badge=it.id==='tickets'&&openTix?'<span class="sb-badge">'+openTix+'</span>':'';
      h+='<button class="sb-item '+(page===it.id?'active':'')+'" onclick="navigate(\''+it.id+'\')"><i class="fa-solid '+it.i+'"></i>'+it.l+badge+'</button>';
    }
  });
  h+='</nav><div class="sb-footer"><div class="sb-user"><div class="sb-avatar">'+user.avatar+'</div><div><div class="sb-user-name">'+user.name+'</div><div class="sb-user-role">'+(user.role==='admin'?'Admin':'Editor')+'</div></div></div></div>';
  return '<aside class="sidebar" id="sidebar">'+h+'</aside>';
}

function rTopbar(){
  var titles={dashboard:'Dashboard',clients:'Clients',editors:'Editors',projects:'Projects',assignments:'Assignments',invoices:'Invoices',activity:'Activity Log',notes:'Quick Notes',tickets:'Tickets',chat:'Messages','editor-dashboard':'Dashboard','my-work':'My Work','submit-work':'Submit Work','my-invoices':'My Invoices',support:'Get Help',profile:'Settings'};
  var uc=unreadCount();
  var themeIcon=document.documentElement.getAttribute('data-theme')==='dark'?'fa-sun':'fa-moon';
  return '<header class="topbar"><div class="topbar-left"><span class="sync-dot on"></span><span class="topbar-title">'+(titles[page]||'Typixel')+'</span></div><div class="topbar-right"><div class="topbar-search"><i class="fa-solid fa-magnifying-glass"></i><input type="text" placeholder="Search..." value="'+searchQuery+'"></div><button class="tb-btn" onclick="toggleTheme()" title="Toggle theme"><i class="fa-solid '+themeIcon+'"></i></button><button class="tb-btn" onclick="toggleNotifPanel()"><i class="fa-solid fa-bell"></i>'+(uc?'<span class="tb-dot"></span>':'')+'</button><div class="dropdown"><button class="tb-btn" onclick="this.nextElementSibling.classList.toggle(\'open\')"><i class="fa-solid fa-ellipsis-vertical"></i></button><div class="dd-menu"><button class="dd-item" onclick="navigate(\'profile\');this.closest(\'.dd-menu\').classList.remove(\'open\')"><i class="fa-solid fa-gear"></i>Settings</button><div class="dd-sep"></div><button class="dd-item danger" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i>Logout</button></div></div></div></header>';

function rPage(){
  switch(page){
    case 'dashboard':return pgDash();
    case 'clients':return pgClients();
    case 'editors':return pgEditors();
    case 'projects':return pgProjects();
    case 'assignments':return pgAssign();
    case 'invoices':return pgInv();
    case 'activity':return pgAct();
    case 'notes':return pgNotes();
    case 'tickets':return pgTix();
    case 'chat':return pgChat();
    case 'editor-dashboard':return pgED();
    case 'my-work':return pgMW();
    case 'submit-work':return pgSW();
    case 'my-invoices':return pgMI();
    case 'support':return pgSup();
    case 'profile':return pgProf();
    default:return pgDash();
  }
}

function pgDash(){
  var rev=db.invoices.filter(function(i){return i.status==='paid';}).reduce(function(s,i){return s+i.amount;},0);
  var unp=db.invoices.filter(function(i){return i.status==='unpaid';}).reduce(function(s,i){return s+i.amount;},0);
  var unpCount=db.invoices.filter(function(i){return i.status==='unpaid';}).length;
  var act=db.projects.filter(function(p){return p.status==='in-progress';}).length;
  var pend=db.projects.filter(function(p){return p.status==='pending';}).length;
  var comp=db.projects.filter(function(p){return p.status==='completed';}).length;
  var tp=db.projects.length;
  var eds=db.users.filter(function(u){return u.role==='editor'&&u.approved;}).length;
  var pa=db.users.filter(function(u){return u.role==='editor'&&!u.approved;}).length;
  var overdue=db.projects.filter(function(p){var d=dlLeft(p.deadline);return d!==null&&d<=0&&p.status!=='completed';});
  var openTix=db.tickets?db.tickets.filter(function(t){return !t.resolved;}).length:0;
  var recentAct=(db.activityLog||[]).slice(0,6);
  var clientSpend=db.clients.map(function(c){var invs=db.invoices.filter(function(i){return i.clientId===c.id&&i.status==='paid';});return{id:c.id,name:c.name,avatar:c.avatar,total:invs.reduce(function(s,i){return s+i.amount;},0),count:invs.length};}).sort(function(a,b){return b.total-a.total;}).slice(0,5);

  var alerts='';
  if(overdue.length)alerts+='<div class="alert-bar alert-danger"><i class="fa-solid fa-triangle-exclamation"></i><span><strong>'+overdue.length+' project'+(overdue.length>1?'s':'')+' overdue</strong> \u2014 '+overdue.map(function(p){return p.name;}).join(', ')+'</span></div>';
  if(unpCount>0)alerts+='<div class="alert-bar alert-warning"><i class="fa-solid fa-clock"></i><span><strong>'+fmtM(unp)+' pending</strong> across '+unpCount+' unpaid invoice'+(unpCount>1?'s':'')+'</span></div>';
  if(pa>0)alerts+='<div class="alert-bar alert-warning"><i class="fa-solid fa-user-clock"></i><span><strong>'+pa+' editor'+(pa>1?'s':'')+' awaiting approval</strong></span></div>';
  if(openTix>0)alerts+='<div class="alert-bar alert-danger"><i class="fa-solid fa-life-ring"></i><span><strong>'+openTix+' open ticket'+(openTix>1?'s':''+'</strong>')+'</span></div>';

  var recentHtml='';
  if(recentAct.length){
    recentAct.forEach(function(l){
      var u=db.users.find(function(x){return x.id===l.userId;});
      recentHtml+='<div class="log-item"><div class="log-dot"></div><div class="log-text"><strong>'+(u?u.name:'System')+'</strong> '+(l.details||l.action)+'</div><div class="log-time">'+fmtT(l.createdAt)+'</div></div>';
    });
  }else{recentHtml='<div style="text-align:center;padding:20px;color:var(--fg3)">No activity yet</div>';}

  var clientHtml='';
  if(clientSpend.length){
    clientSpend.forEach(function(c,i){
      var bg=i===0?'rgba(255,107,53,.1)':'rgba(255,255,255,.03)';
      var col=i===0?'var(--accent)':'var(--fg3)';
      var ico=i===0?'fa-trophy':'fa-user';
      clientHtml+='<div class="mini-stat"><div class="mini-stat-icon" style="background:'+bg+';color:'+col+'"><i class="fa-solid '+ico+'"></i></div><div class="mini-stat-info"><div class="mini-stat-name">'+c.name+'</div><div class="mini-stat-val">'+c.count+' paid invoice'+(c.count!==1?'s':'')+'</div></div><div style="font-weight:600;font-size:.88rem;color:var(--accent2)">'+fmtM(c.total)+'</div></div>';
    });
  }else{clientHtml='<div style="text-align:center;padding:20px;color:var(--fg3)">No clients</div>';}

  return '<div class="ph"><div><h1>Dashboard</h1><p>'+tp+' projects, '+db.clients.length+' clients, '+eds+' editors</p></div></div>'
    +alerts
    +'<div class="quick-actions">'
    +'<button class="qa-btn" onclick="modalAddProject()"><i class="fa-solid fa-plus"></i>New Project</button>'
    +'<button class="qa-btn" onclick="modalAddClient()"><i class="fa-solid fa-user-plus"></i>Add Client</button>'
    +'<button class="qa-btn" onclick="modalManualInv()"><i class="fa-solid fa-file-invoice"></i>Create Invoice</button>'
    +'<button class="qa-btn" onclick="navigate(\'assignments\')"><i class="fa-solid fa-list-check"></i>View Tasks</button>'
    +'</div>'
    +'<div class="stats stats-p">'
    +'<div class="stat"><div class="stat-top"><span class="stat-label">Revenue Collected</span><div class="stat-icon si-2"><i class="fa-solid fa-arrow-trend-up"></i></div></div><div class="stat-val" style="color:var(--accent2)">'+fmtM(rev)+'</div><div class="stat-sub">'+comp+' completed project'+(comp!==1?'s':'')+' generating revenue</div></div>'
    +'<div class="stat"><div class="stat-top"><span class="stat-label">Pending Payments</span><div class="stat-icon si-3"><i class="fa-solid fa-hourglass-half"></i></div></div><div class="stat-val" style="color:var(--warning)">'+fmtM(unp)+'</div><div class="stat-sub">'+unpCount+' invoice'+(unpCount!==1?'s':'')+' awaiting payment'+(overdue.length?' \u2014 <span style="color:var(--danger)">'+overdue.length+' overdue</span>':'')+'</div></div>'
    +'</div>'
    +'<div class="stats stats-s">'
    +'<div class="stat"><div class="stat-top"><span class="stat-label">Active Projects</span><div class="stat-icon si-1"><i class="fa-solid fa-briefcase"></i></div></div><div class="stat-val">'+act+'</div><div class="stat-sub">'+pend+' pending, '+comp+' done</div></div>'
    +'<div class="stat"><div class="stat-top"><span class="stat-label">Team Editors</span><div class="stat-icon si-4"><i class="fa-solid fa-users"></i></div></div><div class="stat-val">'+eds+'</div><div class="stat-sub">'+(pa?'<span style="color:var(--warning)">'+pa+' pending</span>':'All active')+'</div></div>'
    +'<div class="stat"><div class="stat-top"><span class="stat-label">Completion</span><div class="stat-icon si-2"><i class="fa-solid fa-chart-pie"></i></div></div><div class="stat-val">'+(tp?Math.round(comp/tp*100):0)+'%</div><div class="progress" style="margin-top:8px"><div class="progress-fill" style="width:'+(tp?Math.round(comp/tp*100):0)+'%;background:linear-gradient(90deg,var(--accent),var(--accent2))"></div></div></div>'
    +'</div>'
    +'<div class="dash-grid">'
    +'<div class="card"><div class="card-head"><h3>Recent Activity</h3><button class="btn btn-sm btn-ghost" onclick="navigate(\'activity\')">View All</button></div><div class="card-body">'+recentHtml+'</div></div>'
    +'<div class="card"><div class="card-head"><h3>Top Clients</h3><button class="btn btn-sm btn-ghost" onclick="navigate(\'clients\')">View All</button></div><div class="card-body">'+clientHtml+'</div></div>'
    +'</div>';
}

function pgClients(){
  var items=searchFilter(db.clients,['name','company','email']);
  var rows='';
  items.forEach(function(c){
    var cp=db.projects.filter(function(p){return p.clientId===c.id;});

function modalAddClient(editId){
  var c=editId?db.clients.find(function(x){return x.id===editId;}):null;
  openModal('<div class="modal-head"><h3>'+(c?'Edit':'Add')+' Client</h3><button class="modal-close" onclick="closeModals()">&times;</button></div><div class="modal-body"><form id="cf"><div class="frow"><div class="fg"><label>Name *</label><input class="fi" name="name" value="'+(c?c.name:'')+'" required></div><div class="fg"><label>Company</label><input class="fi" name="company" value="'+(c?c.company:'')+'"></div></div><div class="frow"><div class="fg"><label>Email *</label><input class="fi" type="email" name="email" value="'+(c?c.email:'')+'" required></div><div class="fg"><label>Phone</label><input class="fi" name="phone" value="'+(c?c.phone:'')+'"></div></div><div class="fg"><label>Address</label><textarea class="fi" name="address" rows="2">'+(c?c.address:'')+'</textarea></div></form></div><div class="modal-foot"><button class="btn btn-ghost" onclick="closeModals()">Cancel</button><button class="btn btn-primary" onclick="saveClient(\''+(editId||'')+'\')">'+(c?'Save':'Add Client')+'</button></div>');
}
function modalEditClient(id){modalAddClient(id);}

function saveClient(eid){
  var f=new FormData($('#cf'));
  if(!f.get('name')||!f.get('email')){toast('error','Error','Name and email required');return;}
  if(eid){
    var c=db.clients.find(function(x){return x.id===eid;});
    c.name=f.get('name');c.company=f.get('company');c.email=f.get('email');c.phone=f.get('phone');c.address=f.get('address');c.avatar=ini(f.get('name'));
    DB.log('Edit Client',f.get('name'));
  }else{
    if(db.clients.find(function(x){return x.email===f.get('email');})){toast('error','Duplicate','Email already exists');return;}
    db.clients.push({id:gid(),name:f.get('name'),company:f.get('company'),email:f.get('email'),phone:f.get('phone'),address:f.get('address'),avatar:ini(f.get('name'))});
    DB.log('Add Client',f.get('name'));
  }
  DB.save('clients');closeModals();render();toast('success','Done');
}

function deleteClient(id){
  openModal('<div class="modal-head"><h3>Delete Client</h3><button class="modal-close" onclick="closeModals()">&times;</button></div><div class="modal-body"><p class="text-muted">Removes client and all associated data.</p></div><div class="modal-foot"><button class="btn btn-ghost" onclick="closeModals()">Cancel</button><button class="btn btn-danger" onclick="db.projects=db.projects.filter(function(p){return p.clientId!==\''+id+'\';});db.invoices=db.invoices.filter(function(i){return i.clientId!==\''+id+'\';});db.clients=db.clients.filter(function(c){return c.id!==\''+id+'\';});DB.saveAll();closeModals();render();toast(\'success\',\'Deleted\')">Delete</button></div>');
}

  var items=searchFilter(db.users.filter(function(u){return u.role==='editor';}),['name','email']);
  var rows='';
  items.forEach(function(e){
    var done=db.workAssignments.filter(function(w){return w.editorId===e.id&&w.status==='completed';}).length;
    var menuItems='';
    if(!e.approved){
      menuItems+='<button class="dd-item" onclick="approveEditor(\''+e.id+'\')"><i class="fa-solid fa-check"></i>Approve</button>';
      menuItems+='<button class="dd-item danger" onclick="deleteEditor(\''+e.id+'\')"><i class="fa-solid fa-trash"></i>Reject</button>';
    }else{
      menuItems+='<button class="dd-item" onclick="modalSalary(\''+e.id+'\')"><i class="fa-solid fa-indian-rupee-sign"></i>Salary</button>';
      menuItems+='<button class="dd-item" onclick="modalAssignProj(\''+e.id+'\')"><i class="fa-solid fa-briefcase"></i>Assign</button>';
      menuItems+='<button class="dd-item danger" onclick="deleteEditor(\''+e.id+'\')"><i class="fa-solid fa-trash"></i>Remove</button>';
    }
    rows+='<tr><td><div class="cu"><div class="sb-avatar" style="width:30px;height:30px;font-size:.65rem">'+e.avatar+'</div><div><div class="cn">'+e.name+'</div><div class="cs">'+done+' completed</div></div></div></td><td class="text-muted">'+e.email+'</td><td>'+(e.totalWorkTime||0)+'h</td><td style="font-weight:600">'+fmtM(e.pendingSalary||0)+'</td><td><span class="badge '+(e.approved?'bg-green':'bg-yellow')+'">'+(e.approved?'Active':'Pending')+'</span></td><td><div class="dropdown"><button class="btn-icon" onclick="this.nextElementSibling.classList.toggle(\'open\')"><i class="fa-solid fa-ellipsis"></i></button><div class="dd-menu">'+menuItems+'</div></div></td></tr>';
  });

function modalAddEditor(){
  openModal('<div class="modal-head"><h3>Add Editor</h3><button class="modal-close" onclick="closeModals()">&times;</button></div><div class="modal-body"><form id="ef"><div class="frow"><div class="fg"><label>Name *</label><input class="fi" name="name" required></div><div class="fg"><label>Email *</label><input class="fi" type="email" name="email" required></div></div><div class="fg"><label>Password *</label><input class="fi" type="password" name="password" required minlength="4"></div><p class="text-sm text-muted">They will need admin approval before accessing the system.</p></form></div><div class="modal-foot"><button class="btn btn-ghost" onclick="closeModals()">Cancel</button><button class="btn btn-primary" onclick="saveEditor()">Add Editor</button></div>');
}

function saveEditor(){
  var f=new FormData($('#ef'));
  if(!f.get('name')||!f.get('email')||!f.get('password')){toast('error','Error','All fields required');return;}
  if(db.users.find(function(x){return x.email===f.get('email');})){toast('error','Duplicate','Email already exists');return;}
  db.users.push({id:gid(),name:f.get('name'),email:f.get('email'),password:f.get('password'),role:'editor',approved:false,avatar:ini(f.get('name')),phone:'',bio:'',portfolio:'',totalWorkTime:0,pendingSalary:0,createdAt:new Date().toISOString()});
  addNotif('u1','New Editor Added',f.get('name')+' added by admin');
  DB.log('Add Editor',f.get('name'));DB.save('users');closeModals();render();toast('success','Added','Editor requires approval');
}

function approveEditor(id){
  var e=db.users.find(function(u){return u.id===id;});if(!e)return;
  e.approved=true;
  addNotif(id,'Account Approved','Your editor account has been approved. You can now log in.');
  DB.log('Approve',e.name);DB.save('users');render();toast('success','Approved',e.name+' can now log in');
}

function modalSalary(id){
  var e=db.users.find(function(u){return u.id===id;});if(!e)return;
  openModal('<div class="modal-head"><h3>Update Salary \u2014 '+e.name+'</h3><button class="modal-close" onclick="closeModals()">&times;</button></div><div class="modal-body"><div style="padding:12px;background:var(--bg);border-radius:8px;margin-bottom:14px"><span class="text-muted">Pending:</span> <strong>'+fmtM(e.pendingSalary||0)+'</strong> | <span class="text-muted">Hours:</span> <strong>'+(e.totalWorkTime||0)+'h</strong></div><div class="frow"><div class="fg"><label>Add Amount (\u20B9)</label><input class="fi" type="number" id="sAmt" min="0"></div><div class="fg"><label>Add Hours</label><input class="fi" type="number" id="sHrs" min="0"></div></div></div><div class="modal-foot"><button class="btn btn-ghost" onclick="closeModals()">Cancel</button><button class="btn btn-primary" onclick="doSalary(\''+id+'\')">Update</button></div>');
}

function doSalary(id){
  var amt=parseFloat($('#sAmt').value)||0;var hrs=parseFloat($('#sHrs').value)||0;
  if(!amt&&!hrs){toast('error','Error','Enter amount or hours');return;}
  var e=db.users.find(function(u){return u.id===id;});
  e.pendingSalary=(e.pendingSalary||0)+amt;e.totalWorkTime=(e.totalWorkTime||0)+hrs;
  addNotif(id,'Salary Updated','+'+fmtM(amt)+' ('+hrs+'h)');
  DB.log('Salary',e.name+': +'+fmtM(amt));DB.save('users');closeModals();render();toast('success','Updated');
}

function modalAssignProj(eid){
  var e=db.users.find(function(u){return u.id===eid;});
  var av=db.projects.filter(function(p){return p.status!=='completed'&&!p.assignedEditorId;});
  if(!av.length){toast('warning','None','No unassigned projects');return;}
  var opts='';av.forEach(function(p){opts+='<option value="'+p.id+'">'+p.name+' \u2014 '+fmtM(p.budget)+'</option>';});
  openModal('<div class="modal-head"><h3>Assign to '+e.name+'</h3><button class="modal-close" onclick="closeModals()">&times;</button></div><div class="modal-body"><div class="fg"><label>Project *</label><select class="fi" id="aProj">'+opts+'</select></div><div class="fg"><label>Instructions</label><textarea class="fi" id="aDesc" rows="3"></textarea></div></div><div class="modal-foot"><button class="btn btn-ghost" onclick="closeModals()">Cancel</button><button class="btn btn-primary" onclick="doAssign(\''+eid+'\')">Assign</button></div>');
}

function doAssign(eid){
  var pid=$('#aProj').value;var desc=$('#aDesc').value;
  var p=db.projects.find(function(x){return x.id===pid;});if(!p)return;
  p.assignedEditorId=eid;p.status='in-progress';
  db.workAssignments.push({id:gid(),projectId:pid,editorId:eid,description:desc||p.description,deadline:p.deadline,status:'pending',createdAt:new Date().toISOString()});
  addNotif(eid,'New Assignment','You have been assigned: '+p.name);
  var edName=db.users.find(function(u){return u.id===eid;});
  DB.log('Assign',p.name+' \u2192 '+(edName?edName.name:''));
  DB.save('projects');DB.save('workAssignments');closeModals();render();toast('success','Assigned');
}

function deleteEditor(id){
  openModal('<div class="modal-head"><h3>Remove Editor</h3><button class="modal-close" onclick="closeModals()">&times;</button></div><div class="modal-body"><p class="text-muted">Their assignments will be unassigned.</p></div><div class="modal-foot"><button class="btn btn-ghost" onclick="closeModals()">Cancel</button><button class="btn btn-danger" onclick="db.workAssignments.forEach(function(w){if(w.editorId===\''+id+'\'){w.editorId=null;w.status=\'pending\';}});db.users=db.users.filter(function(u){return u.id!==\''+id+'\';});DB.saveAll();closeModals();render();toast(\'success\',\'Removed\')">Remove</button></div>');
}

function pgProjects(){
  var items=searchFilter(db.projects,['name','description']);
  return '<div class="ph"><div><h1>Projects</h1><p>'+db.projects.length+' total</p></div><div class="ph-actions"><button class="btn btn-ghost" onclick="exportCSV(\'projects\',[\'id\',\'name\',\'clientId\',\'budget\',\'status\',\'deadline\'])"><i class="fa-solid fa-download"></i>Export</button><button class="btn btn-primary btn-lg" onclick="modalAddProject()"><i class="fa-solid fa-plus"></i>New Project</button></div></div><div class="tabs"><button class="tab-btn active" onclick="filterProj(\'all\',this)">All ('+db.projects.length+')</button><button class="tab-btn" onclick="filterProj(\'pending\',this)">Pending</button><button class="tab-btn" onclick="filterProj(\'in-progress\',this)">Active</button><button class="tab-btn" onclick="filterProj(\'completed\',this)">Completed</button><button class="tab-btn" onclick="filterProj(\'overdue\',this)" style="color:var(--danger)">Overdue</button></div><div id="projList">'+rProjRows(items)+'</div>';
}

function filterProj(s,btn){
  $$('.tab-btn').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');
  var f;if(s==='overdue')f=db.projects.filter(function(p){return dlLeft(p.deadline)<=0&&p.status!=='completed';});else if(s==='all')f=db.projects;else f=db.projects.filter(function(p){return p.status===s;});
  $('#projList').innerHTML=rProjRows(searchFilter(f,['name','description']));
}

function rProjRows(items){
  if(!items.length)return '<div class="card"><div class="card-body" style="text-align:center;padding:36px;color:var(--fg3)">No projects match</div></div>';
  var rows='';
  items.forEach(function(p){
    var cl=db.clients.find(function(c){return c.id===p.clientId;});

function saveProj(eid){
  var f=new FormData($('#pf2'));
  if(!f.get('name')||!f.get('clientId')||!f.get('budget')){toast('error','Error','Name, client, and budget required');return;}
  if(eid){
    var p=db.projects.find(function(x){return x.id===eid;});var oldEd=p.assignedEditorId;
    p.name=f.get('name');p.description=f.get('desc');p.clientId=f.get('clientId');p.budget=+f.get('budget');p.assignedEditorId=f.get('editorId')||null;p.deadline=f.get('deadline');
    if(f.get('editorId')&&f.get('editorId')!==oldEd){db.workAssignments.push({id:gid(),projectId:p.id,editorId:f.get('editorId'),description:p.description,deadline:p.deadline,status:'pending',createdAt:new Date().toISOString()});addNotif(f.get('editorId'),'Assigned',p.name);}
    DB.log('Edit Project',p.name);
  }else{
    var id=gid();db.projects.push({id:id,name:f.get('name'),description:f.get('desc'),clientId:f.get('clientId'),budget:+f.get('budget'),assignedEditorId:f.get('editorId')||null,status:'pending',deadline:f.get('deadline'),createdAt:new Date().toISOString()});
    if(f.get('editorId')){db.workAssignments.push({id:gid(),projectId:id,editorId:f.get('editorId'),description:f.get('desc'),deadline:f.get('deadline'),status:'pending',createdAt:new Date().toISOString()});addNotif(f.get('editorId'),'Assigned',f.get('name'));}
    DB.log('Add Project',f.get('name'));
  }
  DB.save('projects');DB.save('workAssignments');closeModals();render();toast('success','Done');
}

function completeProj(id){

  p.status='completed';
  db.workAssignments.filter(function(w){return w.projectId===id;}).forEach(function(w){w.status='completed';});
  db.invoices.push({id:gid(),clientId:p.clientId,projectId:p.id,editorId:p.assignedEditorId,amount:p.budget,status:'unpaid',date:new Date().toISOString().split('T')[0],createdAt:new Date().toISOString()});
  if(p.assignedEditorId)addNotif(p.assignedEditorId,'Completed',p.name+' is done');
  DB.log('Complete',p.name);DB.saveAll();render();toast('success','Completed','Invoice created for '+fmtM(p.budget));
}
