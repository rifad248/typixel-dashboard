function openChat(cid,el){
  chatWith=cid;$$('.chat-c').forEach(function(e){e.classList.remove('active');});if(el)el.classList.add('active');
  var other=db.users.find(function(u){return u.id===cid;});if(!other)return;
  var msgs=db.messages.filter(function(m){return(m.senderId===user.id&&m.receiverId===cid)||(m.senderId===cid&&m.receiverId===user.id);}).sort(function(a,b){return new Date(a.timestamp)-new Date(b.timestamp);});
  var msgsHtml='';if(msgs.length){msgs.forEach(function(m){msgsHtml+='<div class="msg '+(m.senderId===user.id?'mine':'')+'"><div><div class="msg-b">'+m.text+'</div><div class="msg-t">'+fmtT(m.timestamp)+'</div></div></div>';});}else{msgsHtml='<div style="text-align:center;color:var(--fg3);padding:36px"><p>No messages yet</p><p class="text-sm">Say hello to '+other.name+'</p></div>';}
  $('#chatMain').innerHTML='<div class="chat-top"><div class="sb-avatar" style="width:30px;height:30px;font-size:.65rem">'+other.avatar+'</div><div><div style="font-weight:500;font-size:.88rem">'+other.name+'</div><div class="text-sm text-muted">'+(other.role==='admin'?'Admin':'Editor')+'</div></div></div><div class="chat-msgs" id="chatMsgs">'+msgsHtml+'</div><div class="chat-iw"><input class="chat-input" id="chatInput" placeholder="Type a message..." onkeydown="if(event.key===\'Enter\')sendMsg(\''+cid+'\')"><button class="chat-send" onclick="sendMsg(\''+cid+'\')"><i class="fa-solid fa-paper-plane"></i></button></div>';
  var el2=$('#chatMsgs');if(el2)el2.scrollTop=el2.scrollHeight;
}

function sendMsg(rid){
  var inp=$('#chatInput');if(!inp)return;var txt=inp.value.trim();if(!txt)return;
  db.messages.push({id:gid(),senderId:user.id,receiverId:rid,text:txt,timestamp:new Date().toISOString()});
  DB.save('messages');inp.value='';openChat(rid);
}

function pgED(){
  var my=db.workAssignments.filter(function(w){return w.editorId===user.id;});
  var pending=my.filter(function(w){return w.status==='pending';}).length;
  var inp2=my.filter(function(w){return w.status==='in-progress';}).length;
  var done=my.filter(function(w){return w.status==='completed';}).length;
  var overdue=my.filter(function(w){return dlLeft(w.deadline)<=0&&w.status!=='completed';}).length;
  var alerts='';
  if(overdue)alerts+='<div class="alert-bar alert-danger"><i class="fa-solid fa-triangle-exclamation"></i><span><strong>'+overdue+' overdue</strong></span></div>';
  if(pending)alerts+='<div class="alert-bar alert-warning"><i class="fa-solid fa-clock"></i><span><strong>'+pending+' new assignment'+(pending>1?'s':'')+'</strong> \u2014 accept to proceed</span></div>';
  var recentHtml='';my.slice(-3).reverse().forEach(function(w){recentHtml+=rEWK(w);});
  return '<div class="ph"><div><h1>Dashboard</h1><p>Welcome back, '+user.name+'</p></div></div>'+alerts+'<div class="stats stats-p"><div class="stat"><div class="stat-top"><span class="stat-label">Pending Salary</span><div class="stat-icon si-1"><i class="fa-solid fa-indian-rupee-sign"></i></div></div><div class="stat-val" style="color:var(--accent)">'+fmtM(user.pendingSalary||0)+'</div><div class="stat-sub">'+(user.totalWorkTime||0)+' hours logged</div></div><div class="stat"><div class="stat-top"><span class="stat-label">Work Done</span><div class="stat-icon si-4"><i class="fa-solid fa-list-check"></i></div></div><div class="stat-val">'+done+'<span style="font-size:1rem;color:var(--fg3)"> / '+my.length+'</span></div><div class="stat-sub">'+pending+' pending, '+inp2+' active</div></div></div>'+(recentHtml?'<div class="card"><div class="card-head"><h3>Recent Work</h3><button class="btn btn-sm btn-ghost" onclick="navigate(\'my-work\')">View All</button></div><div class="card-body">'+recentHtml+'</div></div>':'');
}

function rEWK(w){
  var p=db.projects.find(function(x){return x.id===w.projectId;});var dl=dlLeft(w.deadline);var isOver=dl!==null&&dl<=0&&w.status!=='completed';
  var actions='';
  if(w.status==='pending')actions='<div class="wk-actions"><button class="btn btn-sm btn-primary" onclick="acceptW(\''+w.id+'\')"><i class="fa-solid fa-check"></i>Accept</button><button class="btn btn-sm btn-ghost" style="color:var(--danger)" onclick="rejectW(\''+w.id+'\')"><i class="fa-solid fa-times"></i>Reject</button></div>';
  else if(w.status==='in-progress')actions='<div class="wk-actions"><button class="btn btn-sm btn-primary" onclick="navigate(\'submit-work\')"><i class="fa-solid fa-cloud-arrow-up"></i>Submit Work</button></div>';
  return '<div class="wk"'+(isOver?' style="border-left:3px solid var(--danger)"':'')+'><div class="wk-head"><div class="wk-title">'+(p?p.name:'Unknown')+'</div><div style="display:flex;gap:6px"><span class="badge bg-'+(w.status==='completed'?'green':w.status==='in-progress'?'blue':'yellow')+'">'+w.status+'</span>'+(isOver?'<span class="overdue-badge"><i class="fa-solid fa-triangle-exclamation"></i>Overdue</span>':'')+'</div></div><div class="wk-desc">'+(w.description||'')+'</div><div class="wk-meta"><span><i class="fa-solid fa-calendar"></i>'+(isOver?'<span style="color:var(--danger)">Overdue</span>':dl!==null?dl+'d left':fmtD(w.deadline))+'</span></div>'+actions+'</div>';
}

function pgMW(){
  var my=db.workAssignments.filter(function(w){return w.editorId===user.id;});
  var html='';my.slice().reverse().forEach(function(w){html+=rEWK(w);});
  if(!my.length)html='<div style="text-align:center;padding:60px;color:var(--fg3)"><i class="fa-solid fa-briefcase" style="font-size:2.5rem;opacity:.15;display:block;margin-bottom:16px"></i><p>No work assigned yet</p></div>';
  return '<div class="ph"><div><h1>My Work</h1><p>'+my.length+' assignment'+(my.length!==1?'s':'')+'</p></div></div><div class="tabs"><button class="tab-btn active" onclick="filterMW(\'all\',this)">All</button><button class="tab-btn" onclick="filterMW(\'pending\',this)">Pending</button><button class="tab-btn" onclick="filterMW(\'in-progress\',this)">Active</button><button class="tab-btn" onclick="filterMW(\'completed\',this)">Done</button></div><div id="mwList">'+html+'</div>';
}
function filterMW(s,btn){$$('.tab-btn').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');var my=db.workAssignments.filter(function(w){return w.editorId===user.id;});var f=s==='all'?my:my.filter(function(w){return w.status===s;});var html='';f.slice().reverse().forEach(function(w){html+=rEWK(w);});if(!f.length)html='<div style="text-align:center;padding:48px;color:var(--fg3)">None</div>';$('#mwList').innerHTML=html;}

function acceptW(id){var w=db.workAssignments.find(function(x){return x.id===id;});if(!w)return;w.status='in-progress';var pn=db.projects.find(function(p){return p.id===w.projectId;});addNotif('u1','Accepted',user.name+' started: '+(pn?pn.name:''));DB.log('Accept',(pn?pn.name:''));DB.save('workAssignments');render();toast('success','Accepted');}
function rejectW(id){var w=db.workAssignments.find(function(x){return x.id===id;});if(!w)return;w.status='rejected';var pn=db.projects.find(function(p){return p.id===w.projectId;});addNotif('u1','Rejected',user.name+' rejected: '+(pn?pn.name:''));DB.log('Reject',(pn?pn.name:''));DB.save('workAssignments');render();toast('info','Rejected');}

function pgSW(){
  var inp2=db.workAssignments.filter(function(w){return w.editorId===user.id&&w.status==='in-progress';});uploadedFiles=[];
  var projSel='';inp2.forEach(function(w){var p=db.projects.find(function(x){return x.id===w.projectId;});projSel+='<option value="'+w.id+'">'+(p?p.name:'Unknown')+'</option>';});
  var projHtml=inp2.length?'<div class="card"><div class="card-head"><h3>Select Assignment</h3></div><div class="card-body"><div class="fg"><select class="fi" id="swId">'+projSel+'</select></div></div></div>':'<div class="card"><div class="card-body" style="text-align:center;padding:36px;color:var(--fg3)">No in-progress work</div></div>';
  return '<div class="ph"><div><h1>Submit Work</h1></div></div>'+projHtml+'<div class="card mt-4"><div class="card-head"><h3>Upload Files</h3></div><div class="card-body"><div class="upload-zone" onclick="$(\'#fInput\').click()"><i class="fa-solid fa-cloud-arrow-up"></i><p>Click or drag files here</p><span>PNG, JPG, PDF, PSD, AI</span></div><input type="file" id="fInput" multiple accept=".png,.jpg,.jpeg,.pdf,.psd,.ai" style="display:none" onchange="handleFiles(this.files)"><div class="file-list" id="fList"></div></div></div><div class="card mt-4"><div class="card-head"><h3>Notes</h3></div><div class="card-body"><textarea class="fi" id="swNotes" rows="3" placeholder="Notes for admin..."></textarea></div></div><div class="mt-4"><button class="btn btn-primary btn-lg" onclick="submitWork()"><i class="fa-solid fa-paper-plane"></i>Submit</button></div>';
}

function handleFiles(files){Array.from(files).forEach(function(f){if(f.size>52428800){toast('error','Too Large',f.name);return;}uploadedFiles.push({name:f.name,size:f.size,type:f.type});});renderFL();}
function renderFL(){var html='';uploadedFiles.forEach(function(f,i){html+='<div class="file-item"><i class="fa-solid fa-file"></i><span class="fn">'+f.name+'</span><span class="text-muted text-sm">'+(f.size/1024).toFixed(0)+'KB</span><button class="fr" onclick="uploadedFiles.splice('+i+',1);renderFL()"><i class="fa-solid fa-times"></i></button></div>';});$('#fList').innerHTML=html;}

function submitWork(){
  var wid=$('#swId')?$('#swId').value:null;if(!wid){toast('error','Error','Select assignment');return;}
  if(!uploadedFiles.length){toast('error','Error','Upload files');return;}
  var w=db.workAssignments.find(function(x){return x.id===wid;});if(!w)return;
  if(!db.files)db.files=[];
  uploadedFiles.forEach(function(f){db.files.push({id:gid(),assignmentId:wid,projectId:w.projectId,editorId:user.id,name:f.name,size:f.size,type:f.type,uploadedAt:new Date().toISOString()});});
  w.status='completed';var p=db.projects.find(function(x){return x.id===w.projectId;});if(p)p.status='completed';
  db.invoices.push({id:gid(),clientId:p?p.clientId:'',projectId:p?p.id:'',editorId:user.id,amount:p?p.budget:0,status:'unpaid',date:new Date().toISOString().split('T')[0],createdAt:new Date().toISOString()});
  addNotif('u1','Work Submitted',user.name+' completed: '+(p?p.name:''));
  DB.log('Submit',(p?p.name:''));DB.saveAll();render();toast('success','Submitted');
}

function pgMI(){
  var my=db.invoices.filter(function(i){return i.editorId===user.id;});
  var total=my.reduce(function(s,i){return s+i.amount;},0);var paid=my.filter(function(i){return i.status==='paid';}).reduce(function(s,i){return s+i.amount;},0);
  var rows='';my.forEach(function(inv){var pr=db.projects.find(function(p){return p.id===inv.projectId;});rows+='<tr><td style="font-family:\'Space Grotesk\';font-weight:600">#'+inv.id.slice(-5).toUpperCase()+'</td><td>'+(pr?pr.name:'\u2014')+'</td><td style="font-weight:600">'+fmtM(inv.amount)+'</td><td class="text-muted">'+fmtD(inv.date)+'</td><td><span class="badge bg-'+(inv.status==='paid'?'green':'yellow')+'">'+inv.status+'</span></td><td><button class="btn-icon" onclick="printInvoice(\''+inv.id+'\')"><i class="fa-solid fa-print"></i></button></td></tr>';});
  if(!my.length)rows='<tr class="empty-row"><td colspan="6">No invoices</td></tr>';
  return '<div class="ph"><div><h1>My Invoices</h1><p>'+my.length+' total \u2014 '+fmtM(paid)+' collected</p></div></div><div class="stats" style="grid-template-columns:1fr 1fr;margin-bottom:18px"><div class="stat"><div class="stat-top"><span class="stat-label">Total</span><div class="stat-icon si-1"><i class="fa-solid fa-indian-rupee-sign"></i></div></div><div class="stat-val">'+fmtM(total)+'</div></div><div class="stat"><div class="stat-top"><span class="stat-label">Collected</span><div class="stat-icon si-2"><i class="fa-solid fa-check-circle"></i></div></div><div class="stat-val" style="color:var(--accent2)">'+fmtM(paid)+'</div><div class="stat-sub">'+fmtM(total-paid)+' pending</div></div></div><div class="card"><div class="card-body" style="padding:0;overflow-x:auto"><table class="tbl"><thead><tr><th>Invoice</th><th>Project</th><th>Amount</th><th>Date</th><th>Status</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}

function pgSup(){
  var my=db.tickets.filter(function(t){return t.userId===user.id;});
  var tixHtml='';my.slice().reverse().forEach(function(t){tixHtml+='<div class="wk" style="border-left:3px solid '+(t.priority==='high'?'var(--danger)':t.priority==='medium'?'var(--warning)':'var(--success')+'')+'"><div class="wk-head"><div class="wk-title">'+t.subject+'</div><div style="display:flex;gap:6px"><span class="badge bg-'+(t.priority==='high'?'red':t.priority==='medium'?'yellow':'green')+'">'+t.priority+'</span>'+(t.resolved?'<span class="badge bg-green">Resolved</span>':'<span class="badge bg-yellow">Open</span>')+'</div></div><div class="wk-desc">'+t.description+'</div><div class="text-sm text-muted">'+fmtT(t.createdAt)+'</div></div>';});
  return '<div class="ph"><div><h1>Get Help</h1></div></div><div class="card"><div class="card-head"><h3>New Ticket</h3></div><div class="card-body"><div class="fg"><label>Subject *</label><input class="fi" id="tSubj"></div><div class="fg"><label>Priority</label><select class="fi" id="tPri"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option></select></div><div class="fg"><label>Description *</label><textarea class="fi" id="tDesc" rows="4"></textarea></div><button class="btn btn-primary" onclick="var s=$(\'#tSubj\').value.trim(),d=$(\'#tDesc\').value.trim();if(!s||!d){toast(\'error\',\'Error\',\'Fill all fields\');return;}db.tickets.push({id:gid(),userId:user.id,subject:s,priority:$(\'#tPri\').value,description:d,resolved:false,createdAt:new Date().toISOString()});addNotif(\'u1\',\'Ticket\',s);DB.log(\'Ticket\',s);DB.save(\'tickets\');render();toast(\'success\',\'Sent\')"><i class="fa-solid fa-paper-plane"></i>Submit</button></div></div>'+(my.length?'<div class="card mt-4"><div class="card-head"><h3>My Tickets</h3></div><div class="card-body">'+tixHtml+'</div></div>':'');
}

function pgProf(){
  var themeIcon=document.documentElement.getAttribute('data-theme')==='dark'?'fa-sun':'fa-moon';
  var themeLabel=document.documentElement.getAttribute('data-theme')==='dark'?'Light Mode':'Dark Mode';
  var editorFields=user.role==='editor'?'<div class="fg"><label>Portfolio URL</label><input class="fi" value="'+(user.portfolio||'')+'" id="pPort"></div><div class="fg"><label>Bio</label><textarea class="fi" id="pBio" rows="3">'+(user.bio||'')+'</textarea></div>':'';
  var dangerZone=user.role==='admin'?'<div class="card mt-4" style="border-color:rgba(248,81,73,.2)"><div class="card-head"><h3 style="color:var(--danger)">Danger Zone</h3></div><div class="card-body"><p class="text-muted mb-4">Permanently reset all data.</p><button class="btn btn-danger" onclick="openModal(\'<div class=\\\\\'modal-head\\\\\'><h3 style=\\\\\'color:var(--danger)\\\\\'>Reset All</h3><button class=\\\\\'modal-close\\\\\' onclick=\\\\\'closeModals()\\\\\'>\\&times;</button></div><div class=\\\\\'modal-body\\\\\'><p class=\\\\\'text-muted\\\\\'>Type RESET to confirm.</p><input class=\\\\\'fi mt-4\\\\\' id=\\\\\'resetC\\\\\'></div><div class=\\\\\'modal-foot\\\\\'><button class=\\\\\'btn btn-ghost\\\\\' onclick=\\\\\'closeModals()\\\\\'>Cancel</button><button class=\\\\\'btn btn-danger\\\\\' onclick=\\\\\'if($(\\\\\"#resetC\\\\\").value===\\\"RESET\\\"){localStorage.removeItem(CACHE_KEY);db=null;init();closeModals();toast(\\\"success\\\",\\\"Reset\\\")}else{toast(\\\"error\\\",\\\"Type RESET\\\")}\\\\\'>Reset</button></div>\')"><i class="fa-solid fa-trash"></i>Reset All Data</button></div></div>':'';
  return '<div class="ph"><div><h1>Settings</h1></div></div><div class="card"><div class="card-head"><h3>Profile</h3></div><div class="card-body"><form id="profileForm"><div class="frow"><div class="fg"><label>Name</label><input class="fi" value="'+user.name+'" '+(user.role==='admin'?'readonly':'')+' id="pName"></div><div class="fg"><label>Email</label><input class="fi" value="'+user.email+'" readonly style="opacity:.6"></div></div><div class="fg"><label>Phone</label><input class="fi" value="'+(user.phone||'')+'" id="pPhone"></div>'+editorFields+'<button type="submit" class="btn btn-primary mt-4"><i class="fa-solid fa-save"></i>Save</button></form></div></div><div class="card mt-4"><div class="card-head"><h3>Change Password</h3></div><div class="card-body"><form id="pwForm"><div class="fg"><label>Current *</label><input class="fi" type="password" id="pwC" required></div><div class="frow"><div class="fg"><label>New *</label><input class="fi" type="password" id="pwN" required minlength="4"></div><div class="fg"><label>Confirm *</label><input class="fi" type="password" id="pwF" required></div></div><button type="submit" class="btn btn-primary mt-4"><i class="fa-solid fa-key"></i>Update</button></form></div></div><div class="card mt-4"><div class="card-head"><h3>Appearance</h3></div><div class="card-body"><div style="display:flex;align-items:center;justify-content:space-between"><div><div style="font-weight:500">Theme</div><div class="text-sm text-muted">Switch dark/light mode</div></div><button class="btn btn-ghost" onclick="toggleTheme();render()"><i class="fa-solid '+themeIcon+'"></i>'+themeLabel+'</button></div></div></div>'+dangerZone;
}

function saveProfile(){var u=db.users.find(function(x){return x.id===user.id;});if(!u)return;u.phone=$('#pPhone')?$('#pPhone').value:'';if($('#pPort'))u.portfolio=$('#pPort').value;if($('#pBio'))u.bio=$('#pBio').value;u.avatar=ini(u.name);user=u;sessionStorage.setItem(AUTH_KEY,JSON.stringify(u));DB.log('Profile','Updated');DB.save('users');render();toast('success','Saved');}

function changePw(){var c=$('#pwC').value,n=$('#pwN').value,f=$('#pwF').value;if(c!==user.password){toast('error','Wrong','Current password incorrect');return;}if(n!==f){toast('error','Mismatch','Passwords don\'t match');return;}if(n.length<4){toast('error','Short','Min 4 characters');return;}var u=db.users.find(function(x){return x.id===user.id;});u.password=n;user=u;sessionStorage.setItem(AUTH_KEY,JSON.stringify(u));DB.save('users');$('#pwForm').reset();toast('success','Updated');}

function renderLogin(){
  var projCount=(db?db.projects.length:0)+126;var clientCount=(db?db.clients.length:0)+47;var revVal=(db?db.invoices.filter(function(i){return i.status==='paid';}).reduce(function(s,i){return s+i.amount;},0):80000)+2400000;
  return '<div class="login"><div class="login-left"><div class="login-box"><div class="login-logo"><div class="sb-logo-icon">T</div><span>Typixel</span></div><p class="tagline">Built for Designers Who Handle Multiple Clients</p><h2>Sign in to your studio</h2><p class="sub">Manage clients, projects, and payments in one place</p><form onsubmit="event.preventDefault();login($(\'#lE\').value,$(\'#lP\').value)"><div class="fg"><label>Email</label><input class="fi" type="email" id="lE" placeholder="you@example.com" required></div><div class="fg"><label>Password</label><input class="fi" type="password" id="lP" placeholder="Enter password" required></div><button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center"><i class="fa-solid fa-right-to-bracket"></i>Sign In</button></form><div class="login-divider">or</div><button class="btn btn-ghost" style="width:100%;justify-content:center" onclick="modalJoin()"><i class="fa-solid fa-user-plus"></i>Join as an Editor</button></div></div><div class="login-right"><div class="login-right-content"><div class="hero-badge"><i class="fa-solid fa-bolt"></i>Freelance Design Studio OS</div><h1>Stop juggling spreadsheets.<br>Start <em>delivering.</em></h1><p class="hero-desc">Typixel replaces your scattered Google Sheets, WhatsApp chats, and sticky notes with one organized workspace built for freelance designers.</p><div class="trust-row"><div class="trust-num"><div class="val">'+projCount+'</div><div class="lbl">Projects Managed</div></div><div class="trust-sep"></div><div class="trust-num"><div class="val">'+clientCount+'</div><div class="lbl">Active Clients</div></div><div class="trust-sep"></div><div class="trust-num"><div class="val">'+fmtM(revVal).replace('\u20B9','')+'</div><div class="lbl">Revenue Tracked</div></div></div><div class="login-features"><div class="login-feat"><i class="fa-solid fa-users"></i><span>Client management</span></div><div class="login-feat"><i class="fa-solid fa-file-invoice-dollar"></i><span>Invoice tracking</span></div><div class="login-feat"><i class="fa-solid fa-clipboard-list"></i><span>Work assignments</span></div><div class="login-feat"><i class="fa-solid fa-comments"></i><span>Team chat</span></div></div></div></div></div>';
}

function modalJoin(){
  openModal('<div class="modal-head"><h3>Join as an Editor</h3><button class="modal-close" onclick="closeModals()">&times;</button></div><div class="modal-body"><p class="text-muted mb-4">Your account will need admin approval before you can access projects.</p><form id="jf"><div class="frow"><div class="fg"><label>Full Name *</label><input class="fi" name="name" required></div><div class="fg"><label>Email *</label><input class="fi" type="email" name="email" required></div></div><div class="fg"><label>Password *</label><input class="fi" type="password" name="password" required minlength="4"></div><div class="fg"><label>Portfolio URL</label><input class="fi" name="portfolio" placeholder="https://..."></div><div class="fg"><label>About You</label><textarea class="fi" name="bio" rows="3"></textarea></div></form></div><div class="modal-foot"><button class="btn btn-ghost" onclick="closeModals()">Cancel</button><button class="btn btn-primary" onclick="var f=new FormData($(\'#jf\'));register(f.get(\'name\'),f.get(\'email\'),f.get(\'password\'),f.get(\'portfolio\'),f.get(\'bio\'))">Submit Application</button></div>');
}

document.addEventListener('dragover',function(e){e.preventDefault();});
document.addEventListener('drop',function(e){e.preventDefault();if(e.target.closest('.upload-zone'))handleFiles(e.dataTransfer.files);});
document.addEventListener('click',function(e){
  if(!e.target.closest('.dropdown'))$$('.dd-menu.open').forEach(function(m){m.classList.remove('open');});
  if(!e.target.closest('.notif-panel')&&!e.target.closest('[onclick*="toggleNotif"]')){var p=$('#notifPanel');if(p)p.classList.remove('open');}
});

function init(){
  DB.load().then(function(data){
    db=data;
    if(user){var f=db.users.find(function(u){return u.id===user.id;});if(f){user=f;sessionStorage.setItem(AUTH_KEY,JSON.stringify(f));}else{user=null;sessionStorage.removeItem(AUTH_KEY);}}
    render();
  });
}
init();
</script>
</body>
</html>
