<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typixel — Design Management</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#1c2333;--sidebar:#010409;--accent:#FF6B35;--accent2:#00C9A7;--accent-glow:rgba(255,107,53,.12);--success:#2EA043;--warning:#D29922;--danger:#F85149;--info:#58A6FF;--fg:#E6EDF3;--fg2:#8B949E;--fg3:#484F58;--border:#30363D;--border2:#21262D;--shadow:0 2px 8px rgba(0,0,0,.4);--radius:10px}
[data-theme="light"]{--bg:#f0f2f5;--bg2:#ffffff;--bg3:#e8eaed;--sidebar:#1a1d23;--accent:#E05520;--accent2:#009E82;--accent-glow:rgba(224,85,32,.08);--fg:#1f2937;--fg2:#6b7280;--fg3:#9ca3af;--border:#d1d5db;--border2:#e5e7eb;--shadow:0 2px 8px rgba(0,0,0,.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--fg);overflow:hidden;height:100vh;transition:background .3s,color .3s}
h1,h2,h3,h4{font-family:'Space Grotesk',sans-serif}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--fg3);border-radius:3px}
.app{display:flex;height:100vh}
.sidebar{width:248px;background:var(--sidebar);border-right:1px solid var(--border2);display:flex;flex-direction:column;flex-shrink:0;z-index:50;transition:transform .3s}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:54px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;transition:background .3s}
.page{flex:1;overflow-y:auto;padding:24px;transition:background .3s}
.sb-logo{padding:18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border2)}
.sb-logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),#ff9a5c);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk';font-weight:700;font-size:1rem;color:#fff}
.sb-logo span{font-family:'Space Grotesk';font-weight:700;font-size:1.15rem;color:var(--fg)}
.sb-nav{flex:1;padding:10px 0;overflow-y:auto}
.sb-sec{padding:0 14px;margin-bottom:2px;font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:var(--fg3);font-weight:600}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 18px;color:var(--fg2);cursor:pointer;transition:all .12s;border:none;background:none;width:100%;text-align:left;font-size:.85rem;font-family:inherit}
.sb-item:hover{color:var(--fg);background:rgba(255,255,255,.04)}
.sb-item.active{color:var(--accent);background:var(--accent-glow)}
.sb-item i{width:16px;text-align:center;font-size:.85rem}
.sb-badge{margin-left:auto;background:var(--danger);color:#fff;font-size:.6rem;padding:1px 6px;border-radius:8px;font-weight:700}
.sb-footer{padding:14px;border-top:1px solid var(--border2)}
.sb-user{display:flex;align-items:center;gap:9px;padding:7px;border-radius:8px;background:rgba(255,255,255,.03)}
.sb-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.68rem;color:#fff;flex-shrink:0}
.sb-user-name{font-weight:600;font-size:.82rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-user-role{font-size:.68rem;color:var(--fg2)}
.topbar-left{display:flex;align-items:center;gap:14px}
.topbar-title{font-family:'Space Grotesk';font-weight:600;font-size:1rem}
.topbar-search{display:flex;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:6px 10px;width:240px;transition:border-color .2s}
.topbar-search:focus-within{border-color:var(--accent)}
.topbar-search i{color:var(--fg3);font-size:.8rem;margin-right:7px}
.topbar-search input{border:none;background:none;outline:none;color:var(--fg);font-size:.83rem;width:100%;font-family:inherit}
.topbar-right{display:flex;align-items:center;gap:6px}
.tb-btn{width:34px;height:34px;border-radius:7px;border:1px solid var(--border);background:var(--bg);color:var(--fg2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;font-size:.85rem;position:relative}
.tb-btn:hover{background:var(--bg3);color:var(--fg);border-color:var(--fg3)}
.tb-dot{position:absolute;top:5px;right:5px;width:7px;height:7px;background:var(--danger);border-radius:50%;border:2px solid var(--bg2)}
.sync-dot{width:6px;height:6px;border-radius:50%;margin-right:6px;flex-shrink:0}
.sync-dot.on{background:var(--success)}.sync-dot.off{background:var(--danger)}.sync-dot.ing{background:var(--warning);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.ph{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.ph h1{font-size:1.5rem;font-weight:700}
.ph p{color:var(--fg2);font-size:.88rem;margin-top:3px}
.ph-actions{display:flex;gap:7px;flex-wrap:wrap}
.btn{padding:7px 16px;border-radius:7px;font-weight:500;font-size:.83rem;border:1px solid transparent;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .12s;font-family:inherit;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--fg2);border-color:var(--border)}
.btn-ghost:hover{background:var(--bg3);color:var(--fg)}
.btn-success{background:var(--success);color:#fff}.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:4px 10px;font-size:.76rem}
.btn-icon{width:30px;height:30px;padding:0;justify-content:center;border-radius:6px;background:transparent;color:var(--fg2);border:1px solid transparent}
.btn-icon:hover{background:var(--bg3);color:var(--fg)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:background .3s,border-color .3s}
.card-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.card-head h3{font-size:.95rem;font-weight:600}
.card-body{padding:18px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:20px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;transition:all .2s;position:relative;overflow:hidden}
.stat::after{content:'';position:absolute;top:0;right:0;width:70px;height:70px;border-radius:50%;filter:blur(35px);opacity:.1;pointer-events:none}
.stat:nth-child(1)::after{background:var(--accent)}.stat:nth-child(2)::after{background:var(--accent2)}
.stat:nth-child(3)::after{background:var(--warning)}.stat:nth-child(4)::after{background:var(--info)}
.stat:hover{transform:translateY(-2px);border-color:var(--fg3)}
.stat-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.stat-label{font-size:.78rem;color:var(--fg2);font-weight:500}
.stat-icon{width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.85rem}
.si-1{background:rgba(255,107,53,.1);color:var(--accent)}.si-2{background:rgba(0,201,167,.1);color:var(--accent2)}
.si-3{background:rgba(210,153,34,.1);color:var(--warning)}.si-4{background:rgba(88,166,255,.1);color:var(--info)}
.stat-val{font-family:'Space Grotesk';font-size:1.6rem;font-weight:700;line-height:1}
.stat-chg{font-size:.75rem;margin-top:5px;display:flex;align-items:center;gap:3px}
.stat-chg.up{color:var(--success)}.stat-chg.dn{color:var(--danger)}
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;padding:9px 14px;font-size:.72rem;font-weight:600;color:var(--fg2);text-transform:uppercase;letter-spacing:.04em;background:var(--bg3);border-bottom:1px solid var(--border)}
.tbl td{padding:10px 14px;border-bottom:1px solid var(--border2);font-size:.85rem;vertical-align:middle}
.tbl tr:hover td{background:rgba(255,255,255,.015)}
.tbl .cu{display:flex;align-items:center;gap:9px}
.tbl .cn{font-weight:500}.tbl .cs{font-size:.72rem;color:var(--fg2)}
.empty-row td{text-align:center;color:var(--fg3);padding:36px 14px!important}
.badge{display:inline-flex;padding:2px 9px;border-radius:20px;font-size:.7rem;font-weight:600;letter-spacing:.01em}
.bg-green{background:rgba(46,160,67,.12);color:var(--success)}.bg-yellow{background:rgba(210,153,34,.12);color:var(--warning)}
.bg-red{background:rgba(248,81,73,.12);color:var(--danger)}.bg-blue{background:rgba(88,166,255,.12);color:var(--info)}
.bg-orange{background:rgba(255,107,53,.12);color:var(--accent)}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:.78rem;font-weight:500;margin-bottom:5px;color:var(--fg2)}
.fi{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--fg);font-size:.85rem;font-family:inherit;transition:border-color .2s}
.fi:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,107,53,.08)}
select.fi{cursor:pointer}textarea.fi{resize:vertical;min-height:70px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal-bg.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:13px;width:92%;max-width:540px;max-height:85vh;overflow-y:auto;animation:mIn .22s ease}
@keyframes mIn{from{opacity:0;transform:translateY(-14px) scale(.97)}to{opacity:1;transform:none}}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-head h3{font-size:1.05rem;font-weight:600}
.modal-close{background:none;border:none;color:var(--fg2);font-size:1.25rem;cursor:pointer;padding:3px;line-height:1}
.modal-close:hover{color:var(--fg)}
.modal-body{padding:22px}
.modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:7px}
.toast-wrap{position:fixed;top:16px;right:16px;z-index:300;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:12px 16px;display:flex;align-items:flex-start;gap:9px;min-width:280px;max-width:400px;box-shadow:0 8px 20px rgba(0,0,0,.35);animation:tIn .25s ease;pointer-events:auto}
@keyframes tIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:none}}
.toast-icon{font-size:1rem;margin-top:1px;flex-shrink:0}
.toast.ts .toast-icon{color:var(--success)}.toast.te .toast-icon{color:var(--danger)}
.toast.tw .toast-icon{color:var(--warning)}.toast.ti .toast-icon{color:var(--info)}
.toast-body{flex:1;min-width:0}.toast-title{font-weight:600;font-size:.82rem;margin-bottom:1px}
.toast-msg{font-size:.78rem;color:var(--fg2);line-height:1.35}
.toast-x{background:none;border:none;color:var(--fg3);cursor:pointer;font-size:.85rem;padding:2px;flex-shrink:0}
.wk{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:10px;transition:all .15s}
.wk:hover{border-color:var(--fg3)}
.wk-head{display:flex;justify-content:space-between;align-items:start;margin-bottom:8px;gap:10px}
.wk-title{font-weight:600;font-size:.95rem}
.wk-desc{color:var(--fg2);font-size:.83rem;line-height:1.45;margin-bottom:10px}
.wk-meta{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:12px;font-size:.8rem;color:var(--fg2)}
.wk-meta span{display:flex;align-items:center;gap:4px}.wk-meta i{font-size:.75rem}
.wk-actions{display:flex;gap:7px;flex-wrap:wrap}
.dl-soon{color:var(--danger)!important;font-weight:600}.dl-ok{color:var(--success)!important}
.progress{height:5px;background:var(--bg);border-radius:3px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:3px;transition:width .4s}
.chat-wrap{display:flex;height:100%}
.chat-list{width:260px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.chat-list-head{padding:14px;border-bottom:1px solid var(--border)}
.chat-list-head h3{font-size:.95rem;font-weight:600}
.chat-contacts{flex:1;overflow-y:auto}
.chat-c{display:flex;align-items:center;gap:9px;padding:11px 14px;cursor:pointer;transition:background .12s;border-bottom:1px solid var(--border2)}
.chat-c:hover{background:var(--bg3)}.chat-c.active{background:var(--accent-glow);border-left:3px solid var(--accent)}
.chat-c-info{flex:1;min-width:0}
.chat-c-name{font-weight:500;font-size:.85rem}
.chat-c-prev{font-size:.73rem;color:var(--fg3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-c-time{font-size:.68rem;color:var(--fg3);flex-shrink:0}
.chat-main{flex:1;display:flex;flex-direction:column;min-width:0}
.chat-top{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.chat-msgs{flex:1;padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
.msg{display:flex}.msg.mine{justify-content:flex-end}
.msg-b{max-width:65%;padding:9px 13px;border-radius:13px;font-size:.85rem;line-height:1.4}
.msg:not(.mine) .msg-b{background:var(--bg3);border-bottom-left-radius:3px}
.msg.mine .msg-b{background:var(--accent);color:#fff;border-bottom-right-radius:3px}
.msg-t{font-size:.66rem;color:var(--fg3);margin-top:3px}.msg.mine .msg-t{color:rgba(255,255,255,.55);text-align:right}
.chat-iw{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:9px}
.chat-input{flex:1;padding:9px 14px;background:var(--bg);border:1px solid var(--border);border-radius:22px;color:var(--fg);font-size:.85rem;font-family:inherit;outline:none}
.chat-input:focus{border-color:var(--accent)}
.chat-send{width:38px;height:38px;border-radius:50%;background:var(--accent);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;font-size:.85rem}
.chat-send:hover{filter:brightness(1.1)}
.upload-zone{border:2px dashed var(--border);border-radius:9px;padding:28px;text-align:center;cursor:pointer;transition:all .15s}
.upload-zone:hover{border-color:var(--accent);background:var(--accent-glow)}
.upload-zone i{font-size:1.8rem;color:var(--fg3);margin-bottom:8px}
.upload-zone p{color:var(--fg2);font-size:.85rem}
.upload-zone span{font-size:.75rem;color:var(--fg3)}
.file-list{margin-top:10px;display:flex;flex-direction:column;gap:5px}
.file-item{display:flex;align-items:center;gap:9px;padding:7px 10px;background:var(--bg);border-radius:7px;font-size:.8rem}
.file-item i{color:var(--accent)}.file-item .fn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-item .fr{background:none;border:none;color:var(--fg3);cursor:pointer;font-size:.78rem}.file-item .fr:hover{color:var(--danger)}
.tabs{display:flex;gap:3px;margin-bottom:18px;border-bottom:1px solid var(--border);padding-bottom:0}
.tab-btn{padding:9px 16px;font-size:.83rem;font-weight:500;color:var(--fg2);cursor:pointer;border:none;background:none;font-family:inherit;border-bottom:2px solid transparent;transition:all .12s;margin-bottom:-1px}
.tab-btn:hover{color:var(--fg)}.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.notif-panel{position:fixed;top:54px;right:20px;width:360px;background:var(--bg2);border:1px solid var(--border);border-radius:11px;box-shadow:0 10px 28px rgba(0,0,0,.45);z-index:150;display:none;animation:mIn .18s ease}
.notif-panel.open{display:block}
.notif-ph{padding:14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.notif-ph h3{font-size:.92rem;font-weight:600}
.notif-list{max-height:320px;overflow-y:auto}
.notif-item{padding:12px 14px;border-bottom:1px solid var(--border2);transition:background .1s}
.notif-item.unread{border-left:3px solid var(--accent)}
.notif-item-title{font-weight:500;font-size:.83rem;margin-bottom:2px}
.notif-item-msg{font-size:.75rem;color:var(--fg2);line-height:1.35}
.notif-item-time{font-size:.67rem;color:var(--fg3);margin-top:5px}
.notif-empty{padding:28px;text-align:center;color:var(--fg3);font-size:.85rem}
.dropdown{position:relative;display:inline-block}
.dd-menu{position:absolute;top:100%;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:7px;min-width:170px;box-shadow:0 8px 20px rgba(0,0,0,.35);z-index:100;display:none;padding:3px}
.dd-menu.open{display:block}
.dd-item{display:flex;align-items:center;gap:7px;padding:7px 10px;font-size:.82rem;color:var(--fg2);cursor:pointer;border-radius:5px;transition:all .08s;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.dd-item:hover{background:var(--bg3);color:var(--fg)}
.dd-item.danger{color:var(--danger)}.dd-item.danger:hover{background:rgba(248,81,73,.08)}
.dd-sep{height:1px;background:var(--border);margin:3px 0}
.login{display:flex;height:100vh;background:var(--bg)}
.login-left{flex:1;display:flex;align-items:center;justify-content:center;padding:28px}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:32px;width:100%;max-width:400px}
.login-logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:24px}
.login-logo .sb-logo-icon{width:42px;height:42px;font-size:1.2rem;border-radius:11px}
.login-logo span{font-family:'Space Grotesk';font-weight:700;font-size:1.3rem}
.login-box h2{font-size:1.3rem;font-weight:700;text-align:center;margin-bottom:5px}
.login-box .sub{text-align:center;color:var(--fg2);font-size:.88rem;margin-bottom:22px}
.login-divider{display:flex;align-items:center;margin:18px 0;gap:10px;color:var(--fg3);font-size:.8rem}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.login-right{flex:1;display:flex;align-items:center;justify-content:center;padding:28px;position:relative;overflow:hidden}
.login-right::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,107,53,.06),rgba(0,201,167,.06));pointer-events:none}
.login-right-content{position:relative;z-index:1;max-width:460px;text-align:center}
.login-right h1{font-family:'Space Grotesk';font-size:2.3rem;font-weight:700;margin-bottom:14px;line-height:1.12}
.login-right p{font-size:1rem;color:var(--fg2);line-height:1.65}
.login-right .features{display:flex;flex-direction:column;gap:12px;margin-top:28px;text-align:left}
.login-right .feat{display:flex;align-items:center;gap:10px;color:var(--fg2);font-size:.9rem}
.login-right .feat i{color:var(--accent);width:18px;text-align:center}
.note{padding:12px;border-radius:8px;border-left:3px solid var(--accent);background:var(--bg3);margin-bottom:8px;transition:all .15s}
.note:hover{border-left-color:var(--accent2)}
.note-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.note-title{font-weight:600;font-size:.85rem}
.note-body{font-size:.8rem;color:var(--fg2);line-height:1.4;white-space:pre-wrap}
.note-time{font-size:.67rem;color:var(--fg3);margin-top:6px}
.log-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border2);font-size:.83rem}
.log-item:last-child{border-bottom:none}
.log-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);margin-top:5px;flex-shrink:0}
.log-text{flex:1;color:var(--fg2)}.log-text strong{color:var(--fg);font-weight:500}
.log-time{font-size:.72rem;color:var(--fg3);flex-shrink:0;white-space:nowrap}
.loading-overlay{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.print-invoice{background:#fff;color:#111;padding:40px;max-width:700px;margin:0 auto;font-family:'DM Sans',sans-serif}
.print-invoice h1{color:#111}.print-invoice table{width:100%;border-collapse:collapse;margin:20px 0}
.print-invoice th,.print-invoice td{padding:10px 14px;border:1px solid #ddd;text-align:left;font-size:.9rem}
.print-invoice th{background:#f5f5f5}
.fade-in{animation:fadeIn .25s ease}@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.text-muted{color:var(--fg2)}.text-sm{font-size:.8rem}.mt-2{margin-top:6px}.mt-4{margin-top:14px}.mb-4{margin-bottom:14px}
.flex{display:flex}.items-center{align-items:center}.gap-2{gap:7px}.gap-3{gap:10px}
.flex-1{flex:1}.justify-between{justify-content:space-between}.hidden{display:none!important}
@media(max-width:768px){.sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);z-index:60}.sidebar.open{transform:none}.stats{grid-template-columns:1fr 1fr}.frow{grid-template-columns:1fr}.chat-list{width:200px}.login{flex-direction:column}.login-right{display:none}.topbar-search{width:140px}.ph{flex-direction:column}}
@media(max-width:480px){.stats{grid-template-columns:1fr}.page{padding:14px}}
@media print{.sidebar,.topbar,.toast-wrap,.notif-panel{display:none!important}.main{margin:0}.page{padding:0;overflow:visible}}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast-wrap" id="toasts"></div>
<div class="notif-panel" id="notifPanel"></div>
<div class="loading-overlay hidden" id="loader"><div class="spinner"></div><div style="color:var(--fg2);font-size:.9rem">Syncing with Google Sheets...</div></div>

<script>
const SHEET_URL='https://script.google.com/macros/s/AKfycbzc5eG28Od3nVYpzr2a5pmef4FZOGFTgZRF7EX_o273r2lRvb449JDzp_kealYBJCFbJQ/exec';
const CACHE_KEY='typixel_cache';
const AUTH_KEY='typixel_auth';
const THEME_KEY='typixel_theme';
const $=s=>document.querySelector(s);
const $$=s=>document.querySelectorAll(s);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const ini=n=>n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
const fmtD=d=>d?new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}):'—';
const fmtM=n=>'₹'+Number(n||0).toLocaleString('en-IN');
const fmtT=t=>{const d=new Date(t),n=new Date(),m=Math.floor((n-d)/60000);if(m<1)return'Just now';if(m<60)return m+'m ago';const h=Math.floor(m/60);if(h<24)return h+'h ago';return fmtD(t);};
const dlLeft=d=>{if(!d)return null;return Math.ceil((new Date(d)-new Date())/86400000);};
const futureD=n=>new Date(Date.now()+n*864e5).toISOString().split('T')[0];
const pastD=n=>new Date(Date.now()-n*864e5).toISOString().split('T')[0];

const DB={
  _data:null,_syncing:false,
  defaults(){return{users:[{id:'u1',name:'Admin',email:'rifadwork@gmail.com',password:'123',role:'admin',approved:true,avatar:'AD',phone:'',bio:'',portfolio:'',totalWorkTime:0,pendingSalary:0,createdAt:new Date().toISOString()}],clients:[{id:'c1',name:'Priya Sharma',company:'Sharma Enterprises',email:'priya@example.com',phone:'9876543210',address:'Mumbai',avatar:'PS'},{id:'c2',name:'Rahul Mehta',company:'Mehta Designs',email:'rahul@example.com',phone:'9876543211',address:'Delhi',avatar:'RM'},{id:'c3',name:'Anita Desai',company:'Desai Media',email:'anita@example.com',phone:'9876543212',address:'Bangalore',avatar:'AD'}],projects:[{id:'p1',name:'Brand Identity Package',description:'Complete brand identity including logo, colors, typography',clientId:'c1',budget:45000,assignedEditorId:null,status:'pending',deadline:futureD(14),createdAt:new Date().toISOString()},{id:'p2',name:'Social Media Kit',description:'Instagram and Facebook post templates',clientId:'c2',budget:25000,assignedEditorId:null,status:'pending',deadline:futureD(7),createdAt:new Date().toISOString()},{id:'p3',name:'Product Packaging',description:'Packaging design for organic food products',clientId:'c3',budget:60000,assignedEditorId:null,status:'in-progress',deadline:futureD(21),createdAt:pastD(5)},{id:'p4',name:'Website Redesign',description:'Full website UI/UX redesign',clientId:'c1',budget:80000,assignedEditorId:null,status:'completed',deadline:pastD(2),createdAt:pastD(30)}],workAssignments:[],messages:[],notifications:[],tickets:[],invoices:[{id:'inv1',clientId:'c1',projectId:'p4',editorId:null,amount:80000,status:'paid',date:pastD(2),createdAt:pastD(30)},{id:'inv2',clientId:'c2',projectId:'p2',editorId:null,amount:25000,status:'unpaid',date:futureD(7),createdAt:pastD(10)},{id:'inv3',clientId:'c3',projectId:'p3',editorId:null,amount:60000,status:'unpaid',date:futureD(21),createdAt:pastD(5)}],files:[],activityLog:[],notes:[]};},
  get tables(){return['users','clients','projects','workAssignments','messages','notifications','tickets','invoices','files','activityLog','notes'];},
  async load(){
    try{$('#loader').classList.remove('hidden');this._syncing=true;syncDot();const res=await fetch(SHEET_URL+'?t='+Date.now());const json=await res.json();if(json.ok&&json.data){this._data={};this.tables.forEach(t=>{this._data[t]=json.data[t]||[];});if(!this._data.users||this._data.users.length===0){this._data=this.defaults();await this.pushAll();}localStorage.setItem(CACHE_KEY,JSON.stringify(this._data));this._syncing=false;syncDot();$('#loader').classList.add('hidden');return this._data;}else{throw new Error(json.error||'Sheet error');}}catch(e){console.log('Sheet load failed, using cache:',e.message);this._syncing=false;syncDot();$('#loader').classList.add('hidden');try{this._data=JSON.parse(localStorage.getItem(CACHE_KEY));}catch(err){}if(!this._data||!this._data.users){this._data=this.defaults();this._cache();}return this._data;}},
  async push(table){if(!this._data)return;localStorage.setItem(CACHE_KEY,JSON.stringify(this._data));try{this._syncing=true;syncDot();await fetch(SHEET_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({key:table,data:this._data[table]||[]})});this._syncing=false;syncDot();}catch(e){this._syncing=false;syncDot();console.log('Push failed:',table,e.message);}},
  async pushAll(){if(!this._data)return;localStorage.setItem(CACHE_KEY,JSON.stringify(this._data));try{this._syncing=true;syncDot();for(const t of this.tables){await fetch(SHEET_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({key:t,data:this._data[t]||[]})});}this._syncing=false;syncDot();}catch(e){this._syncing=false;syncDot();}},
  async save(table){await this.push(table);},async saveAll(){await this.pushAll();},
  _cache(){localStorage.setItem(CACHE_KEY,JSON.stringify(this._data));},
  log(action,details){if(!this._data)return;this._data.activityLog.unshift({id:uid(),userId:user?.id||'system',action,details,createdAt:new Date().toISOString()});if(this._data.activityLog.length>200)this._data.activityLog.length=200;this.save('activityLog');}
};
function syncDot(){const d=$('.sync-dot');if(!d)return;d.className='sync-dot'+(DB._syncing?' ing':' on');}
let db=null,user=JSON.parse(sessionStorage.getItem(AUTH_KEY)||'null');
let page=user?(user.role==='admin'?'dashboard':'editor-dashboard'):'login';
let chatWith=null,uploadedFiles=[],searchQuery='';
function applyTheme(){document.documentElement.setAttribute('data-theme',localStorage.getItem(THEME_KEY)||'dark');}applyTheme();
function toggleTheme(){const c=document.documentElement.getAttribute('data-theme');const n=c==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem(THEME_KEY,n);}
function toast(type,title,msg){const ic={success:'fa-check-circle',error:'fa-times-circle',warning:'fa-exclamation-triangle',info:'fa-info-circle'};const cl={success:'ts',error:'te',warning:'tw',info:'ti'};const el=document.createElement('div');el.className=`toast ${cl[type]}`;el.innerHTML=`<i class="fa-solid ${ic[type]} toast-icon"></i><div class="toast-body"><div class="toast-title">${title}</div><div class="toast-msg">${msg}</div></div><button class="toast-x" onclick="this.parentElement.remove()"><i class="fa-solid fa-times"></i></button>`;$('#toasts').appendChild(el);setTimeout(()=>{if(el.parentElement)el.remove();},4000);}
function addNotif(uid,title,msg){if(!db)return;db.notifications.unshift({id:uid(),userId:uid,title,msg,read:false,createdAt:new Date().toISOString()});DB.save('notifications');}
function unreadCount(){return db?db.notifications.filter(n=>n.userId===user?.id&&!n.read).length:0;}
function toggleNotifPanel(){const p=$('#notifPanel');if(p.classList.contains('open')){p.classList.remove('open');db.notifications.filter(n=>n.userId===user?.id&&!n.read).forEach(n=>n.read=true);DB.save('notifications');render();}else{const ns=db.notifications.filter(n=>n.userId===user?.id).slice(0,15);p.innerHTML=`<div class="notif-ph"><h3>Notifications</h3><span class="text-sm text-muted">${ns.length}</span></div><div class="notif-list">${ns.length?ns.map(n=>`<div class="notif-item ${n.read?'':'unread'}"><div class="notif-item-title">${n.title}</div><div class="notif-item-msg">${n.msg}</div><div class="notif-item-time">${fmtT(n.createdAt)}</div></div>`).join(''):'<div class="notif-empty">No notifications</div>'}</div>`;p.classList.add('open');}}
function openModal(html){closeModals();const bg=document.createElement('div');bg.className='modal-bg open';bg.id='modalBg';bg.innerHTML=`<div class="modal">${html}</div>`;bg.addEventListener('click',e=>{if(e.target===bg)closeModals();});document.body.appendChild(bg);}
function closeModals(){const m=$('#modalBg');if(m)m.remove();}
function exportCSV(table,headers){const rows=db[table]||[];if(!rows.length){toast('warning','Empty','No data');return;}let csv=headers.join(',')+'\n';rows.forEach(r=>{csv+=headers.map(h=>`"${(r[h]||'').toString().replace(/"/g,'""')}"`).join(',')+'\n';});const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=table+'.csv';a.click();toast('success','Exported');}
function printInvoice(id){const inv=db.invoices.find(i=>i.id===id);if(!inv)return;const cl=db.clients.find(c=>c.id===inv.clientId);const pr=db.projects.find(p=>p.id===inv.projectId);const w=document.createElement('div');w.innerHTML=`<div class="print-invoice"><div style="display:flex;justify-content:space-between;margin-bottom:30px"><div><h1 style="font-size:1.8rem;margin-bottom:4px">Typixel</h1><p style="color:#666">Graphic Design Studio</p></div><div style="text-align:right"><h2 style="font-size:1.4rem;margin-bottom:4px">INVOICE</h2><p style="color:#666">#${inv.id.slice(-5).toUpperCase()}</p></div></div><div style="display:flex;justify-content:space-between;margin-bottom:30px"><div><strong>Bill To:</strong><br>${cl?.name||'—'}<br>${cl?.company||''}<br>${cl?.email||''}</div><div style="text-align:right"><strong>Date:</strong> ${fmtD(inv.date)}<br><strong>Status:</strong> ${inv.status.toUpperCase()}</div></div></div><table><thead><tr><th>Description</th><th style="text-align:right">Amount</th></tr></thead><tbody><tr><td>${pr?.name||'Project'}</td><td style="text-align:right;font-weight:600">${fmtM(inv.amount)}</td></tr></tbody><tfoot><tr><td style="text-align:right;font-weight:700;border-top:2px solid #111;padding-top:10px">Total</td><td style="text-align:right;font-weight:700;font-size:1.1rem;border-top:2px solid #111;padding-top:10px">${fmtM(inv.amount)}</td></tr></tfoot></table><div style="margin-top:40px;text-align:center;color:#999;font-size:.85rem">Thank you — Typixel</div></div>`;document.body.appendChild(w);window.print();w.remove();}
function login(email,pw){const u=db.users.find(x=>x.email===email&&x.password===pw);if(!u){toast('error','Login Failed','Invalid credentials');return;}if(u.role==='editor'&&!u.approved){toast('warning','Pending','Awaiting approval');return;}user=u;sessionStorage.setItem(AUTH_KEY,JSON.stringify(u));page=u.role==='admin'?'dashboard':'editor-dashboard';DB.log('Login',u.name+' logged in');render();toast('success','Welcome','Hi '+u.name+'!');}
function logout(){user=null;sessionStorage.removeItem(AUTH_KEY);page='login';chatWith=null;render();toast('info','Logged out');}
function register(name,email,pw,portfolio,bio){if(db.users.find(x=>x.email===email)){toast('error','Taken','Email exists');return;}db.users.push({id:uid(),name,email,password:pw,role:'editor',approved:false,avatar:ini(name),phone:'',bio:bio:bio||'',portfolio:portfolio||'',totalWorkTime:0,pendingSalary:0,createdAt:new Date().toISOString()});addNotif('u1','New Editor Applied',name);DB.log('Register',name);DB.save('users');toast('success','Sent','Application submitted');}
function navigate(p){page=p;chatWith=null;searchQuery='';render();}
function searchFilter(arr,fields){if(!searchQuery)return arr;const q=searchQuery.toLowerCase();return arr.filter(i=>fields.some(f=>(i[f]||'').toString().toLowerCase().includes(q));}
async function render(){if(!user){renderLogin();return;}$('#app').innerHTML=`<div class="app">${rSidebar()}<div class="main">${rTopbar()}<div class="page fade-in" id="pc">${rPage()}</div></div></div></div>`;const si=$('.topbar-search input');if(si)si.oninput=e=>{searchQuery=e.target.value;const pc=$('#pc');if(pc)pc.innerHTML=rPage();};const pf=$('#profileForm');if(pf)pf.onsubmit=e=>{e.preventDefault();saveProfile();};const pwf=$('#pwForm');if(pwf)pwf.onsubmit=e=>{e.preventDefault();changePw();};syncDot();}
function rSidebar(){const items=user.role==='admin'?[{s:'MAIN'},{id:'dashboard',i:'fa-gauge-high',l:'Dashboard'},{s:'MANAGE'},{id:'clients',i:'fa-users',l:'Clients'},{id:'editors',i:'fa-user-pen',l:'Editors'},{id:'projects',i:'fa-briefcase',l:'Projects'},{id:'assignments',i:'fa-clipboard-list',l:'Assignments'},{s:'FINANCE'},{id:'invoices',i:'fa-file-invoice-dollar',l:'Invoices'},{s:'TOOLS'},{id:'activity',i:'fa-clock-rotate-left',l:'Activity Log'},{id:'notes',i:'fa-note-sticky',l:'Quick Notes'},{id:'tickets',i:'fa-life-ring',l:'Tickets'},{id:'chat',i:'fa-comments',l:'Chat'}]:[{s:'OVERVIEW'},{id:'editor-dashboard',i:'fa-gauge-high',l:'Dashboard'},{s:'WORK'},{id:'my-work',i:'fa-briefcase',l:'My Work'},{id:'submit-work',i:'fa-cloud-arrow-up',l:'Submit Work'},{id:'my-invoices',i:'fa-file-invoice-dollar',l:'My Invoices'},{s:'TOOLS'},{id:'notes',i:'fa-note-sticky',l:'Quick Notes'},{id:'support',i:'fa-life-ring',l:'Get Help'},{id:'chat',i:'fa-comments',l:'Chat'}];items.push({s:''},{id:'profile',i:'fa-gear',l:'Settings'}]);let h=`<div class="sb-logo"><div class="sb-logo-icon">T</div><span>Typixel</span></div></nav class="sb-nav">`;items.forEach(it=>{if(it.s)h+=`<div class="sb-sec">${it.s}</div>`;else h+=`<button class="sb-item ${page===it.id?'active':''}" onclick="navigate('${it.id}')"><i class="fa-solid ${it.i}"></i>${it.l}${it.id==='tickets'?`<span class="sb-badge">${db.tickets.filter(t=>!t.resolved).length||''}</span>`:''}</button>`;});h+=`</nav><div class="sb-footer"><div class="sb-user"><div class="sb-avatar">${user.avatar}</div><div><div class="sb-user-name">${user.name}</div><div class="sb-user-role">${user.role==='admin'?'Admin':'Editor'}</div></div></div></div>`;return`<aside class="sidebar" id="sidebar">${h}</aside>`;}
function rTopbar(){const t={dashboard:'Dashboard',clients:'Clients',editors:'Editors',projects:'Projects',assignments:'Assignments',invoices:'Invoices',activity:'Activity Log',notes:'Quick Notes',tickets:'Tickets',chat:'Chat','editor-dashboard':'Dashboard','my-work':'My Work','submit-work':'Submit Work','my-invoices':'My Invoices',support:'Get Help',profile:'Settings'};const uc=unreadCount();return`<header class="topbar"><div class="topbar-left"><span class="sync-dot on"></span><span class="topbar-title">${t[page]||'Typixel'}</span></div><div class="topbar-right"><div class="topbar-search"><i class="fa-solid fa-magnifying-glass"></i><input type="text" placeholder="Search..." value="${searchQuery}"></div><button class="tb-btn" onclick="toggleTheme()" title="Theme"><i class="fa-solid ${document.documentElement.getAttribute('data-theme')==='dark'?'fa-sun':'fa-moon'}"></i></button><button class="tb-btn" onclick="toggleNotifPanel()"><i class="fa-solid fa-bell"></i>${uc?'<span class="tb-dot"></span>':''}</button><div class="dropdown"><button class="tb-btn" onclick="this.nextElementSibling.classList.toggle('open')"><i class="fa-solid fa-ellipsis-vertical"></i></button><div class="dd-menu"><button class="dd-item" onclick="navigate('profile');this.closest('.dd-menu').classList.remove('open')"><i class="fa-solid fa-gear"></i>Settings</button><div class="dd-sep"></div><button class="dd-item danger" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i>Logout</button></div></div></div></div></header>`;}
function rPage(){switch(page){case'dashboard':return pgDash();case'clients':return pgClients();case'editors':return pgEditors();case'projects':return pgProjects();case'assignments':return pgAssign();case'invoices':return pgInv();case'activity':return pgAct();case'notes':return pgNotes();case'tickets':return pgTix();case'chat':return pgChat();case'editor-dashboard':return pgED();case'my-work':return pgMW();case'submit-work':return pgSW();case'my-invoices':return pgMI();case'support':return pgSup();case'profile':return pgProf();default:return pgDash();}}

function pgDash(){const rev=db.invoices.filter(i=>i.status==='paid').reduce((s,i)=>s+i.amount,0);const unp=db.invoices.filter(i=>i.status==='unpaid').reduce((s,i)=>s+i.amount,0);const act=db.projects.filter(p=>p.status==='in-progress').length;const eds=db.users.filter(u=>u.role==='editor'&&u.approved).length;const pa=db.users.filter(u=>u.role==='editor'&&!u.approved).length;const tp=db.projects.length,dp=db.projects.filter(p=>p.status==='completed').length;const prog=Math.round(tp?(dp/tp)*100:0);const up=db.projects.filter(p=>p.deadline&&p.status!=='completed').sort((a,b)=>new Date(a.deadline)-new Date(b.deadline)).slice(0,5);const rw=db.workAssignments.slice(-5).reverse();return`<div class="ph"><div><h1>Dashboard</h1><p>Your studio at a glance</p></div><div class="ph-actions"><button class="btn btn-primary" onclick="modalAddProject()"><i class="fa-solid fa-plus"></i>New Project</button></div></div></div><div class="stats"><div class="stat"><div class="stat-top"><span class="stat-label">Revenue</span><div class="stat-icon si-1"><i class="fa-solid fa-indian-rupee-sign"></i></div></div><div class="stat-val">${fmtM(rev)}</div><div class="stat-chg up"><i class="fa-solid fa-arrow-up"></i>Collected</div></div><div class="stat"><div class="stat-top"><span class="stat-label">Pending</span><div class="stat-icon si-2"><i class="fa-solid fa-clock"></i></div></div><div class="stat-val">${fmtM(unp)}</div><div class="stat-chg dn"><i class="fa-solid fa-circle-exclamation"></i>${db.invoices.filter(i=>i.status==='unpaid').length} invoices</div></div><div class="stat"><div class="stat-top"><span class="stat-label">Active</span><div class="stat-icon si-3"><i class="fa-solid fa-briefcase"></i></div></div><div class="stat-val">${act}</div><div class="stat-chg text-muted"><i class="fa-solid fa-hourglass-half"></i>${db.projects.filter(p=>p.status==='pending').length} pending</div></div><div class="stat"><div class="stat-top"><span class="stat-label">Editors</span><div class="stat-icon si-4"><i class="fa-solid fa-users"></i></div></div><div class="stat-val">${eds}</div><div class="stat-chg ${pa?'dn':'up'}">${pa?`<i class="fa-solid fa-user-clock"></i>${pa} pending`:'<i class="fa-solid fa-check"></i>All active'}</div></div></div></div><div class="card mb-4"><div class="card-head"><h3>Overall Progress</h3><span class="text-sm text-muted">${dp}/${tp} completed</span></div><div class="card-body"><div class="progress" style="height:8px;border-radius:4px"><div class="progress-fill" style="width:${prog}%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px"></div></div><div class="text-sm text-muted mt-2">${prog}% completion</div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:14px"><div class="card"><div class="card-head"><h3>Recent Assignments</h3></div><div class="card-body" style="padding:0">${rw.length?rw.map(w=>{const p=db.projects.find(x=>x.id===w.projectId);const e=db.users.find(x=>x.id===w.editorId);return`<div style="padding:10px 18px;border-bottom:1px solid var(--border2);display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:500;font-size:.85rem">${p?.name||'—'}</div><div class="text-sm text-muted">${e?.name||'Unassigned'}</div></div><span class="badge bg-${w.status==='completed'?'green':w.status==='in-progress'?'blue':'yellow'}">${w.status}</span></div>`;}).join(''):'<div style="padding:28px;text-align:center;color:var(--fg3)">None yet</div>'}</div></div><div class="card"><div class="card-head"><h3>Upcoming Deadlines</h3></div><div class="card-body" style="padding:0">${up.length?up.map(p=>{const dl=dlLeft(p.deadline);const cl=db.clients.find(c=>c.id===p.clientId);return`<div style="padding:10px 18px;border-bottom:1px solid var(--border2);display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:500;font-size:.85rem">${p.name}</div><div class="text-sm text-muted">${cl?.name||'—'}</div></div><span class="${dl!==null&&dl<=3?'dl-soon':'dl-ok'} text-sm"><i class="fa-solid fa-calendar-day"></i> ${dl!==null?(dl<=0?'Overdue':dl+'d left'):fmtD(p.deadline)}</span></div></div>`;}).join(''):'<div style="padding:28px;text-align:center;color:var(--fg3)">No deadlines</div>'}</div></div></div>`;}

}')"><i class="fa-solid fa-trash"></i>Delete</button></div></div></div></td></tr>`;}).join(''):'<tr class="empty-row"><td colspan="7">No projects</td></tr>'}</tbody></table></div></div>`;}
function modalAddProject(edit=null){const p=edit?db.projects.find(x=>x.id===edit):null;openModal(`<div class="modal-head"><h3>${p?'Edit':'New'} Project</h3><button class="modal-close" onclick="closeModals()">&times;</button></div><div class="modal-body"><form id="pf2"><div class="fg"><label>Name</label><input class="fi" name="name" value="${p?.name||''}" required></div><div class="fg"><label>Description</label><textarea class="fi" name="desc" rows="2">${p?.description||''}</textarea></div><div class="frow"><div class="fg"><label>Client</label><select class="fi" name="clientId" required><option value="">Select</option>${db.clients.map(c=>`<option value="${c.id}" ${p?.clientId===c.id?'selected':''}>${c.name}</option>`).join('')}</select></div><div class="fg"><label>Budget (₹)</label><input class="fi" type="number" name="budget" value="${p?.budget||''}" required></div><div class="frow"><div class="fg"><label>Editor</label><select class="fi" name="editorId"><option value="">Unassigned</option>${db.users.filter(u=>u.role==='editor'&&u.approved).map(e=>`<option value="${e.id}" ${p?.assignedEditorId===e.id?'selected':''}>${e.name}</option>`).join('')}</select></div><div class="fg"><label>Deadline</label><input class="fi" type="date" name="deadline" value="${p?.deadline||''}"></div></div></form></div><div class="modal-foot"><button class="btn btn-ghost" onclick="closeModals()">Cancel</button><button class="btn btn-primary" onclick="saveProj('${edit||''}')">${p?'Save':'Create'}</button></div></div>`);}

async function saveProj(eid){const f=new FormData($('#pf2'));if(eid){const p=db.projects.find(x=>x.id===eid);const old=p.assignedEditorId;Object.assign(p,{name:f.get('name'),description:f.get('desc'),clientId:f.get('clientId'),budget:+f.get('budget'),assignedEditorId:f.get('editorId')||null,deadline:f.get('deadline')});if(f.get('editorId')&&f.get('editorId')!==old){db.workAssignments.push({id:uid(),projectId:p.id,editorId:f.get('editorId'),description:p.description,deadline:p.deadline,status:'pending',createdAt:new Date().toISOString()});addNotif(f.get('editorId'),'Assigned',p.name);DB.log('Edit Project',p.name);}else{const id=uid();db.projects.push({id,name:f.get('name'),description:f.get('desc'),clientId:f.get('clientId'),budget:+f.get('budget'),assignedEditorId:f.get('editorId')||null,status:'pending',deadline:f.get('deadline'),createdAt:new Date().toISOString()});if(f.get('editorId')){db.workAssignments.push({id:uid(),projectId:id,editorId:f.get('editorId'),description:f.get('desc'),deadline:f.get('deadline'),status:'pending',createdAt:new Date().toISOString()});addNotif(f.get('editorId'),'Assigned',f.get('name'));}DB.log('Add Project',f.get('name'));}await DB.save('projects');await DB.save('workAssignments');closeModals();render();toast('success','Done');}

function modalManualInv(){openModal(`<div class="modal-head"><h3>New Invoice</h3><button class="modal-close" onclick="closeModals()">&times;</button></div><div class="modal-body"><div class="fg"><label>Client</label><select class="fi" id="miCl"><option value="">Select</option>${db.clients.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}</select></div><div class="fg"><label>Project</label><select class="fi" id="miPr"><option value="">Select</option>${db.projects.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select></div><div class="frow"><div class="fg"><label>Amount (₹)</label><input class="fi" type="number" id="miAmt"></div><div class="fg"><label>Date</label><input class="fi" type="date" id="miDate"></div></div></div></div><div class="modal-foot"><button class="btn btn-ghost" onclick="closeModals()">Cancel</button><button class="btn btn-primary" onclick="const cl=$('#miCl').value,pr=$('#miPr').value,amt=parseFloat($('#miAmt').value);if(!cl||!amt){toast('error','Error','Client & amount required');return;}db.invoices.push({id:uid(),clientId:cl,projectId:pr,editorId:null,amount:amt,status:'unpaid',date:$('#miDate').value||new Date().toISOString().split('T')[0],createdAt:new Date().toISOString()});DB.log('Invoice','Manual: '+amt);DB.save('invoices');closeModals();render();toast('success','Created')">Create</button></div>`);}
async function markPaid(id){const inv=db.invoices.find(i=>i.id===id);if(!inv)return;inv.status='paid';DB.log('Paid','#'+inv.id.slice(-5).toUpperCase());await DB.save('invoices');render();toast('success','Paid');}

function pgNotes(){const my=(db.notes||[]).filter(n=>n.userId===user.id).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));return`<div class="ph"><div><h1>Quick Notes</h1><p>${my.length} notes</p></div><div class="ph-actions"><button class="btn btn-primary" onclick="modalAddNote()"><i class="fa-solid fa-plus"></i>New Note</button></div></div>${my.length?my.map(n=>`<div class="note"><div class="note-head"><div class="note-title">${n.title}</div><button class="btn-icon" onclick="db.notes=db.notes.filter(x=>x.id!=='${n.id}');DB.save('notes');render();toast('success','Deleted')}</button></div><div class="note-body">${n.content}</div><div class="note-time">${fmtT(n.createdAt)}</div></div>`).join(''):'<div class="card"><div class="card-body" style="text-align:center;padding:36px;color:var(--fg3)">No notes yet</div></div>'}`;}

function pgTix(){return`<div class="ph"><div><h1>Support Tickets</h1><p>${db.tickets.filter(t=>!t.resolved).length} open</p></div></div>${db.tickets.length?db.tickets.slice().reverse().map(t=>`<div class="wk" style="border-left:3px solid ${t.priority==='high'?'var(--danger)':t.priority==='medium'?'var(--warning)':'var(--success)'}"><div class="wk-head"><div><div class="wk-title">${t.subject}</div><div class="text-sm text-muted mt-2">From: ${ed?.name||'Unknown'} — ${fmtT(t.createdAt)}</div></div><div style="display:flex;gap:6px;align-items:center"><span class="badge bg-${t.priority==='high'?'red':t.priority==='medium'?'yellow':'green'}">${t.priority}</span>${t.resolved?'<span class="badge bg-green">Resolved</span>':`<button class="btn btn-sm btn-success" onclick="resolveTix('${t.id}')"><i class="fa-solid fa-check"></i></button></div></div><div class="wk-desc">${t.description}</div></div></div>`).join(''):'<div style="text-align:center;padding:48px;color:var(--fg3)">No tickets</div>'}</div>`;}

function pgChat(){const ct=db.users.filter(u=>u.id!==user.id);return`<div class="chat-wrap"><div class="chat-list"><div class="chat-list-head"><h3>Messages</h3></div class="chat-contacts">${ct.map(c=>{const l=getLM(user.id,c.id);return`<div class="chat-c ${chatWith===c.id?'active':''}" onclick="openChat('${c.id}',this)"><div class="sb-avatar" style="width:34px;height:34px;font-size:.7rem;flex-shrink:0">${c.avatar}</div><div class="chat-c-info"><div class="chat-c-name">${c.name}</div><div class="chat-c-prev">${l?l.text:'No messages'}</div></div><div class="chat-c-time">${l?fmtT(l.timestamp):''}</div></div></div></div></div><div class="chat-main" id="chatMain"><div style="flex:1;display:flex;flex-direction:column;min-width:0"><div style="flex:1;display:flex;align-items:center;flex-direction:column;justify-content:center;flex-direction:column;background:var(--bg);border-radius:12px;margin:0 auto 24px;max-width:600px;box-shadow:0 4px 12px rgba(0,0,0,.15);z-index:10px"><div class="chat-top"><div class="sb-avatar" style="width:30px;height:30px;font-size:.65rem">${other.avatar}</div><div><div><div style="font-weight:500;font-size:.88rem">${other.name}</div><div class="text-sm text-muted">Online</div></div></div></div><div class="chat-msgs" id="chatMsgs">${ct.length?ct.map(m=>`<div class="msg ${m.senderId===user.id?'mine':''}"><div><div class="msg-b">${m.text}</div><div class="msg-t">${fmtT(m.timestamp)}</div></div></div>`).join(''):'<div style="text-align:center;color:var(--fg3);padding:36px"><i class="fa-solid fa-comments" style="font-size:2.5rem;margin-bottom:14px;opacity:.25"><p>Select a conversation</p></div></div></div></div></div></div></div>`);}
function getLM(u1,u2){const m=db.messages.filter(x=>(x.senderId===u1&&x.receiverId===u2)||(x.senderId===u2&&x.receiverId===u1)).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));return m[0];}
function openChat(cid,el){chatWith=cid;$$('.chat-c').forEach(e=>e.classList.remove('active'));if(el)el.classList.add('active');const other=db.users.find(u=>u.id===cid);const msgs=db.messages.filter(m=>(m.senderId===user.id&&m.receiverId===cid)||(m.senderId===cid&&m.receiverId===user.id).sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));$('#chatMain').innerHTML=`<div class="chat-top"><div class="sb-avatar" style="width:30px;height:30px;font-size:.65rem">${other.avatar}</div><div><div style="font-weight:500;font-size:.88rem">${other.name}</div><div class="text-sm text-muted">Online</div></div></div></div><div class="chat-msgs" id="chatMsgs">${msgs.length?msgs.map(m=>`<div class="msg ${m.senderId===user.id?'mine':''}"><div><div class="msg-b">${m.text}</div><div class="msg-t">${fmtT(m.timestamp)}</div></div></div>`).join(''):'<div style="text-align:center;color:var(--fg3);padding:36px"><i class="fa-solid fa-comments" style="font-size:2.5rem;margin-bottom:14px;opacity:.25"></i><p>Select a conversation</p></div></div></div></div>`;}
async function sendMsg(rid){const inp=$('#chatInput');if(!inp)return;const txt=inp.value.trim();if(!txt)return;db.messages.push({id:uid(),senderId:user.id,receiverId:rid,text:txt,timestamp:new Date().toISOString()});await DB.save('messages');inp.value='';openChat(rid);}
async function pgMI(){const my=db.invoices.filter(i=>i.editorId===user.id);return`<div class="ph"><h1>My Invoices</h1><p>Payment history</p></div></div><div class="card"><div class="card-body" style="padding:0;overflow-x:auto"><table class="tbl"><thead><tr><th>Invoice</th><th>Project</th><th>Amount</th><th>Date</th><th>Status</th><th></th></tr></thead><tbody>${my.length?my.map(inv=>{const pr=db.projects.find(p=>p.id===inv.projectId);return`<tr><td style="font-family:'Space Grotesk';font-weight:600">#${inv.id.slice(-5).toUpperCase()}</td><td>${pr?.name||'—'}</td><td style="font-weight:600">${fmtM(inv.amount)}</td><td class="text-muted">${fmtD(inv.date)}</td><td><span class="badge bg-${inv.status==='paid'?'green':'yellow'}">${inv.status}</span></td><td><button class="btn-icon" onclick="printInvoice('${inv.id}')"><i class="fa-solid fa-print"></i></button></td></tr>`;}).join(''):'<tr class="empty-row"><td colspan="6">No invoices</td></tr>'}</tbody></table></div></div>`;}
function pgSW(){const inp=db.workAssignments.filter(w=>w.editorId===user.id&&w.status==='in-progress');uploadedFiles=[];return`<div class="ph"><div><h1>Submit Work</h1><p>Upload completed files</p></div>${inp.length?`<div class="card"><div class="card-head"><h3>Select Assignment</h3></div><div class="card-body"><div class="fg"><select class="fi" id="swId">${inp.map(w=>{const p=db.projects.find(x=>x.id===w.projectId);return`<option value="${w.id}">${p?.name||'Unknown'}</option>`).join('')}</select></div></div></div>'<div class="card mt-4"><div class="card-head"><h3>Upload Files</h3></div><div class="card-body"><div class="upload-zone" onclick="$('#fInput').click()"><i class="fa-solid fa-cloud-arrow-up"></i><p>Click or drag files</p><span>PNG, JPG, PDF, PSD, AI — Max 50MB</span></div><input type="file" id="fInput" multiple accept=".png,.jpg,.jpeg,.pdf,.psd,.ai" style="display:none" onchange="handleFiles(this.files)"><div class="file-list" id="fList"></div></div></div></div><div class="card mt-4"><div class="card-head"><h3>Notes</h3></div><div class="card-body"><textarea class="fi" id="swNotes" rows="3" placeholder="Notes for admin..."></textarea></div></div></div><div class="mt-4"><button class="btn btn-primary" onclick="submitWork()"><i class="fa-solid fa-paper-plane"></i>Submit</button></div></div>`;}

function renderFL(){$('#fList').innerHTML=uploadedFiles.map((f,i)=>`<div class="file-item"><i class="fa-solid fa-file"></i><span class="fn">${f.name}</span><span class="text-muted text-sm">${(f.size/1024).toFixed(0)}KB</span><button class="fr" onclick="uploadedFiles.splice(${i},1);renderFL()"><i class="fa-solid fa-times"></i></button></div>`);join('');}
async function submitWork(){const wid=$('#swId')?.value;if(!wid){toast('error','Error','Select work');return;}if(!uploadedFiles.length){toast('error','Error','Upload files');return;}const w=db.workAssignments.find(x=>x.id===wid);if(!w)return;db.files.push({id:uid(),assignmentId:wid,projectId:w.projectId,editorId:user.id,name:f.name,size:f.size,type:f.type,uploadedAt:new Date().toISOString()});w.status='completed';const p=db.projects.find(x=>x.id===w.projectId);if(p)p.status='completed';addNotif('u1','Submitted',user.name+': '+(p?.name||'');DB.log('Submit',p?.name||'');await DB.saveAll();render();toast('success','Submitted');}

async function sendMsg(rid){const inp=$('#chatInput);if(!inp)return;const txt=inp.value.trim();if(!txt)return;db.messages.push({id:uid(),senderId:user.id,receiverId:rid,text:txt,timestamp:new Date().toISOString()});await DB.save('messages');inp.value='';openChat(rid);}

function pgProf(){return`<div class="ph"><div><h1>Settings</h1><p>Manage your account</p></div></div><div class="card"><div class="card-head"><h3>Profile</h3></div><div class="card-body"><form id="profileForm"><div class="frow"><div class="fg"><label>Name</label><input class="fi" value="${user.name}" ${user.role==='admin'?'readonly':''}>Id: ${user.id}</div><div class="fg"><label>Email</label><input class="fi" value="${user.email}" readonly></div><div class="fg"><label>Phone</label><input class="fi" value="${user.phone||''}" id="pPhone"></div>${user.role==='editor'?`:`<div class="fg"><label>Portfolio</label><input class="fi" value="${user.portfolio||''}" id="pPort"></div><div class="fg"><label>Bio</label><textarea class="fi" id="pBio" rows="3">${user.bio||''}</textarea></div>`:''}<button type="submit" class="btn btn-primary mt-4"><i class="fa-solid fa-save"></i>Save</button></form></div></div></div><div class="card mt-4"><div class="card-head"><h3>Change Password</h3></div><div class="card-body"><form id="pwForm"><div class="fg"><label>Current</label><input class="fi" type="password" id="pwC" required></div><div class="frow"><div class="fg"><label>New</label><input class="fi" type="password" id="pwN" required></div><div class="fg"><label>Confirm</label><input class="fi" type="password" id="pwF" required></div></div></div><button type="submit" class="btn btn-primary mt-4"><i class="fa-solid fa-key"></i>Update</button></form></div></div></div><div class="card mt-4"><div class="card-head"><h3>Google Sheets</h3></div><div class="card-body"><p class="text-muted mb-4">Status: <span style="color:var(--success)">Connected</span></div><div class="fg"><label>Web App URL</label><input class="fi" value="${SHEET_URL}" readonly style="opacity:.6"></div><p class="text-sm text-muted mt-2">Data syncs to Google Sheets on every action.</p></div></div>${user.role==='admin'?`:`<div class="card mt-4" style="border-color:var(--danger)"><div class="card-head"><h3 style="color:var(--danger)">Danger Zone</h3></div><div class="card-body"><p class="text-muted mb-4">Permanently reset all data.</p></div><button class="btn btn-danger" onclick="openModal('<div class=\\'modal-head\\'><h3>Reset All</h3><button class=\\'modal-close\\' onclick=\\'closeModals()\\'>&times;</button></div><div class=\\'modal-body\\'><p class=\\'text-muted\\' style=\\'color:var(--danger)\\'>Type RESET to confirm.</p><input class=\\'fi mt-4\\' id=\\'resetC\\'></div><div class=\\'modal-foot\\'><button class=\\'btn btn-ghost\\' onclick=\\'closeModals()\\'>Cancel</button><button class=\\'btn btn-danger\\' onclick=\\'if($(\\\"#resetC\\\").value===\"RESET\\\"){localStorage.removeItem(CACHE_KEY);db=null;init();closeModals();render();toast(\\\"success\\\",\\\"Reset\\\",\\\"Cleared\\\")}\\'>Reset</button></div>'>`:''}`:''}`;}

function renderLogin(){$('#app').innerHTML=`<div class="login"><div class="login-left"><div class="login-box"><div class="login-logo"><div class="login-logo"><div class="sb-logo-icon">T</div><span>Typixel</span></div></div><h2>Welcome Back</h2><p class="sub">Sign in to your design studio</p><form onsubmit="event.preventDefault();login($('#lE').value,$('#lP').value,$('#lP').value)"><div class="login-divider">or</div><button class="btn btn-ghost" style="width:100%;justify-content:center" onclick="modalJoin()"><i class="fa-solid fa-user-plus"></i>Join Our Team</button></div></div></div></div></div><div class="login-right"><div class="login-right-content"><div class="login-right-content"><h1>Design. Collaborate.<br><span style="color:var(--accent)">Deliver.</span></h1><p>Typixel streamlines your graphic design workflow — fully synced to Google Sheets.</p><div class="features"><div class="feat"><i class="fa-solid fa-check-circle"></i>Google Sheets as your database</div><div class="feat"><i class="fa-solid fa-check-circle"></i>Deadline tracking with alerts</div><div class="feat"><i class="fa-solid fa-check-circle"></i>Team chat and notifications</div><div class="feat"><i class="fa-solid fa-check-circle"></i>Print invoices and export CSV</div><div class="feat"><i class="fa-solid fa-check-circle"></i>Activity log and quick notes</div><div class="feat"><i class="fa-solid fa-check-circle"></i>Dark and light themes</div></div></div></div></div></div></div></div>`;
}
function modalJoin(){openModal(`<div class="modal-head"><h3>Join Our Team</h3><button class="modal-close" onclick="closeModals()">&times;</button></div><div class="modal-body"><form id="jf"><div class="frow"><div class="fg"><label>Name</label><input class="fi" name="name" required></div><div class="fg"><label>Email</label><input class="fi" type="email" name="email" required></div></div><div class="fg"><label>Password</label><input class="fi" type="password" required></div><div class="fg"><label>Portfolio</label><input class="fi" name="portfolio" placeholder="https://..."></div><div class="fg"><label>About You</label><textarea class="fi" name="bio" rows="3"></textarea></div></form></div><div class="modal-foot"><button class="btn btn-ghost" onclick="closeModals()">Cancel</button class="btn btn-primary" onclick="const f=new FormData($('#jf'));register(f.get('name'),f.get('email'),f.get('password'),f.get('portfolio'),f.get('bio'))">Submit</button></div></div>`);}
function renderLogin(){$('#app').innerHTML=`<div class="login"><div class="login"><div class="login-left"><div class="login-box"><div class="login-logo"><div class="sb-logo-icon">T</div><span>Typixel</span></div></div><h2>Welcome Back</h2><p class="sub">Sign in to your design studio</p><form onsubmit="event.preventDefault();login($('#lE').value,$('#lP').value,$('#lP').value)"><button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:11px"><i class="fa-solid fa-right-to-bracket"></i>Sign In</button></form></form></div><div class="login-divider">or</div><button class="btn btn-ghost" style="width:100%;justify-content:center" onclick="modalJoin()"><i class="fa-solid fa-user-plus"></i>Join Our Team</button></div></div></div></div></div>`;}
function renderLogin(){if(!user){renderLogin();return;}$('#app').innerHTML=`<div class="app"><div class="main">${rSidebar()}<div class="main">${rTopbar()}<div class="page fade-in" id="pc">${rPage()}</div></div></div></div>`;const si=$('.topbar-search input');if(si)si.oninput=e=>{searchQuery=e.target.value;const pc=$('#pc');if(pc)pc.innerHTML=rPage();};const pf=$('#profileForm');if(pf)pf.onsubmit=e=>{e.preventDefault();saveProfile();};const pwf=$('#pwForm');if(pwf)pwf.onsubmit=e=>{e.preventDefault();changePw();}await DB.save('users');$('#pwForm').reset();toast('success','Updated');}
async function saveProfile(){const u=db.users.find(x=>x.id===user.id);if(!u)return;u.phone=$('#pPhone')?.value||'';if($('#pPort'))u.portfolio=$('#pPort').value;if($('#pBio'))u.bio=$('#pBio').value;u.avatar=ini(u.name);user=u;sessionStorage.setItem(AUTH_KEY,JSON.stringify(u));DB.log('Profile',u.name);await DB.save('users');render();toast('success','Saved');}
async function changePw(){const c=$('#pwC').value,n=$('#pwN').value,f=$('#pwF').value;if(c!==user.password){toast('error','Error','Wrong password');return;}if(n!==f){toast('error','Error','Mismatch');return;}if(n.length<3){toast('error','Too short');return;}const u=db.users.find(x=>x.id===user.id);u.password=n;user=u;sessionStorage.setItem(AUTH_KEY,JSON.stringify(u));await DB.save('users');$('#pwForm').reset();toast('success','Updated');}
function pgProf(){return`<div class="ph"><div class="ph"><h3>Profile</h3></div><div class="card mt-4"><div class="card-head"><h3>Change Password</h3></div><div class="card-body"><form id="pwForm"><div class="fg"><label>Current</label><input class="fi" type="password" id="pwC" required></div><div class="frow"><div class="fg"><label>New</label><input class="fi" type="password" id="pwN" required></div><div class="fg"><label>Confirm</label><input class="fi" type="password" id="pwF" required></div></div></form></div></div></div><div class="card mt-4"><div class="card-head"><h3>Change Password</h3></div><div class="card-body"><p class="text-muted mb-4">Status: <span style="color:var(--success)">Connected</span></div></div></div></div>${user.role==='admin'?`:`<div class="card mt-4" style="border-color:var(--danger)"><div class="card-head"><h3 style="color:var(--danger)">Danger Zone</h3></div><div class="card-body"><p class="text-muted mb-4">Permanently reset all data.</p></div><button class="btn btn-danger" onclick="openModal('<div class=\\'modal-head\\'><h3>Reset All</h3><button class=\\'modal-foot\\'><button class=\\'btn btn-danger\\' onclick=\\'if($(\\\"#resetC\\\").value===\"RESET\\\"){localStorage.removeItem(CACHE_KEY);db=null;init();closeModals();render();toast(\\\"success\\\",\\\"Reset\\\",\\\"Cleared\\\")\\'>Reset</button></div>'}`:''}`;}

document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('click',e=>{if(!e.target.closest('.upload-zone'))handleFiles(e.dataTransfer.files);});
document.addEventListener('click',e=>{if(!e.target.closest('.dropdown'))$$('.dd-menu.open').forEach(m=>m.classList.remove('open'));if(!e.target.closest('.notif-panel')&&!e.target.closest('.tb-btn')){const p=$('#notifPanel');if(p)p.classList.remove('open');};});
async function init(){db=await DB.load();if(user){const f=db.users.find(u=>u.id===user.id);if(f){user=f;sessionStorage.setItem(AUTH_KEY,JSON.stringify(f));}else{user=null;sessionStorage.removeItem(AUTH_KEY);page=user.role==='admin'?'dashboard':'editor-dashboard':'editor-dashboard';}render();toast('success','Welcome','Hi '+u.name+'!');}
</script>
</script>
